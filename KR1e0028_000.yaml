body:
  text: 春秋經解春秋類提要臣等謹案春秋經解十二卷宋崔子方撰子方涪陵人字彦直號西疇居士晁說之集又稱其字伯直葢有二字也朱彝尊經義考稱其嘗知滁州曽子開為作茶仙亭記經解諸書皆罷官後所作考子方宋史無傳惟李心傳建炎以來繫年要録稱其于紹聖間三上疏乞置春秋博士不報乃隠居真州六合縣杜門著書者三十餘年陳振孫書録解題所載大略相同朱震進書劄子亦稱為東川布衣彞尊之說不知何據惟永樂大典引儀真志一條云子方與蘇黄游嘗為知滁州曽子開作茶仙亭記刻石醉翁亭側黄庭堅稱為六合佳士殆彞尊誤記是事故云然歟考子方著是書時王安石之說方盛行故不能表見于世至南渡以後其書始顯王應麟玉海載建炎二年六月江端友請下湖州取崔子方所著春秋傳藏秘書紹興六年八月子方之孫若上之是時朱震為翰林學士亦有劄子上請當時葢甚重其書矣子方自序云聖人欲以繩當世之是非著來世之懲勸故辭之難明者著例以見之例不可盡故有日月之例有變例慎思精考若網在綱又後序一篇具述其疏解之宗㫖大抵推本經義于三傳多所糾正如以晉文圍鄭謂罰其不㑹翟泉以郕伯來奔為見迫于齊以齊侯滅萊不書名辨禮記諸侯滅同姓名之誤類皆諸家所未發雖其中過泥日月之例持論不無偏駁而條其長義實足自成一家所撰凡經解本例例要三書通志堂經解刋本僅有本例今從永樂大典裒輯成編各還其舊自僖公十四年秋至三十二年襄公十六年夏至三十一年永樂大典並闕則取黄震日抄所引及本例補之其他本例所釋有引伸此書所未發或與此書小有異同者並節取附録而卷袠書名則並遵宋史至子方原書經文已不可見今以所解㕘證知大略皆從左氏而亦間有從公穀者故與胡安國春秋傳或有異同焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋經解自序始余讀左氏愛其文辭知有左氏而不知有春秋也其後益讀公羊穀梁愛其論説又知有二書而不知有春秋也左氏之事證於前二家之例明於後以為當世之事與聖人之意舉在乎是矣然考其事則於情有不合稽其意則於理有不通意者傳之妄而求之過歟乃取春秋之經治之伏讀三年然後知所書之事與所以書之之意是非成敗襃貶勸戒之説具在夫萬有八千言之間雖無傳者一言之辯而春秋了可知也或曰舍三傳則春秋之事不見不見其事而自為之説是誣也雖然彼惡知三家之善誣也哉或先經以始其事或後經以終其説曰某日為某事某人為某辭其詳至於數百千言又臆聖人之意此某事也諱之而後云某也此某為之也欲有所見而後云某也觀之經則簡畧而難知尋之傳則明白而易見故後之學者甘心於見誣而有志之士雖有疑於其説欲質之而莫得其術於是是非蜂起各習其師務立朋黨以相詆訾甚於操戈㦸而相伐也豈不悲哉彼惡知古今雖異時然情之歸則一也聖賢雖異用然理之致則一也合情與理舉而錯諸天下之事無難矣且嘗謂聖人之辭至約也然而不懼後之人惑者何也恃情與理以自託其言而傳之於後世後之賢者亦恃情與理而能知聖人於千百世之上而不疑六經之傳由此道也且聖人之有作欲以繩當時之是非著來世之懲勸使人皆知善之可就而罪之可避也故明著之經今曰考之經而無見必待傳者之説而後明是聖人之經徒為虚文而已且聖人豈必後世有三家者為之傳乎其無為傳則春秋遂無用於世矣假如聖人知後世必有為之傳者豈不曰吾經之不明則傳者得為異説以紛綸吾辭吾辭將不信於後世安得不為此慮也耶是故其辭必完具於一經之間其事必完具於一辭之中雖然聖人豈敢以一辭之約而使後世之人曉然知吾之所喻哉故辭之難明者則著例以見之例不可盡也則又有日月之例焉又有變例以為言者然後褒貶是非之意見矣夫事之多變則辭之不同例之不一與日月之叅差不齊蓋不可勝視及其慎思而精考則若網在綱舉而振焉順乎其有條理也聖人以辭與例成其書以情與理而自託其言則所以慮後世者亦至矣辭與例其文也情與理其質也文質不備君子不為完人文質不備春秋不為完經世之學者舍情理而專求乎辭例之間是以多惑而至於失也左氏之失也淺公羊之失也險穀梁之失也迂左氏求聖人之意而不得一皆以事言之而畧其褒貶故常取於近而失之淺公羊謂聖人欲以成後世法必有驚動人之耳目而難言者故常志於難而失之險穀梁謂聖人苟致意焉不當淺近易知必有委曲而深者故常求於逺而失之迂雖然是三家之失其又有説左氏自以為所傳當時之事足以取信於後世雖失之淺而不嫌公羊穀梁自以為傳當時之事畧矣不得不為險迂之論以自見嗚呼學聖人之道而方且以自見為心宜其不合而多失也今余非固薄三家之論以為三家之論不去則學者之疑不决而聖人之經終不可復見故度當時之事以情考聖人之言以理情理之不違然後辭可明而例可通也於經之下各析而解之名曰春秋經解噫後之君子其有意於情理之説乎吾言其有取焉爾其無意於情理之説乎吾言其有罪焉爾朱震劄子二通故東川布衣崔子方當熈寧間宰相王安石用事不喜春秋之學正經三傳不列學官是時潁隂處士常秩號知春秋盡諱其學追逐時好况不知者乎逮于元豐習已成俗莫敢議其非者而子方獨抱遺經閉門研究著春秋經解本例例要三書相為表裏自成一家之言以遺子孫人雖云亡其書尚存欲望朝廷下平江府於崔若家繕冩投進翰林學士知制誥兼侍讀兼資善堂翊善朱震先奉指揮准中使降出崔子方春秋經解一十六冊令震校正者震契勘熈寧元豐間王安石獨任私意誣衊聖經春秋大典不得列于學官一時學者以治春秋為諱而子方獨抱遺經閉門講習專意著述究見本㫖而自成一家非特立獨行之士不能如此今子方雖没其後尚存欲望敷奏特賜旌褒以勸來者奉聖㫖與一子恩澤
