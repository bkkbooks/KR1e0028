body:
  text: 春秋經解卷三宋崔子方撰莊公元年春王正月莊公不言即位知桓公之弒也三月夫人孫于齊此奔也內諱奔猶曰辭孫而去云爾且夫人已在齊矣而此復言孫于齊何見夫人之久于齊也何以知夫人不於此始孫乎先君之喪既葬嗣君之立既踰年魯國之難已定而夫人有君母之尊於內可以無畏矣則無為於此復孫也且夫人與公同出而公弒其敢以魯內難未定而歸乎其不然明矣然則何以必於三月焉書之夫人其以是月始自齊反於魯乎故於其將反而書之以見夫人之久于齊者得罪於魯而不敢入故春秋因責弒君之罪貶其氏姓而曰夫人孫也貶夫人者或去姓或去氏或氏姓俱去焉何也蓋婦人之稱必以氏姓姓正本也氏旁出也婦人既有其父母家而又有其夫家此所以兼氏姓而稱之歟故春秋之例於其不得於父母家則貶其姓於其不得於夫家則貶其氏其兩不得焉者則氏姓俱貶穆姜出姜皆從君於喪娶此不得於夫家者也故貶其氏焉而曰婦姜哀姜之孫齊人殺之此不得於父母家者也故貶其姓焉曰夫人氏至於文姜外淫其兄內殺其夫其毒之甚至於為二國患是其兩不得者也故氏姓俱貶焉而曰夫人也婦人惟以諡配姓不言氏然則吾諸姬紀季姜何以不氏自父母之辭言之不以氏也夫人孫何以不日蓋以罪略之且見夫人久于齊不可以日舉也夫人孫例日夏單伯逆王姬二傳曰逆當從二傳為逆單國伯爵蓋失地之君而寓於魯者也失地之君何以不名凡諸侯之名者以見其失地也今單伯見臣於魯其為失地可知矣禮諸侯不臣寓公今魯使單伯逆王姬是臣寓公矣其不言如京師不正魯之臣寓公故不與其使也傳稱昭公孫于齊齊侯使高張來唁公稱主君此蓋齊欲臣魯侯也然則春秋之時諸侯而臣寓公者有之矣夫諸侯之不相禮也有執而戮之殺而用之者則其臣寓公何足多怪左氏以為天子之大夫故以逆為送然誤矣且下書單伯會伐宋單伯會齊侯單伯如齊單伯至自齊皆我大夫之辭也二傳謂我大夫之命于天子者故不名且天子之元士視附庸之君春秋猶且名之豈有諸侯之命大夫而不名者耶又其後七十餘年而單伯復見則非一大夫明矣齊魯仇讐之國而為之主昏姻雖有天子之命可以辭矣故不月以見譏逆王姬例月秋築王姬之館于外土功曰築木功曰作築臺築囿土功曰築也作南門作雉門木功曰作也王姬之館則何以言築蓋垣之也其言于外何垣之然後于外也築王姬之館淺事也何以書見垣之于外之為禮矣冬十月乙亥陳侯林卒王使榮叔來錫桓公命王之所以稱天者為繼天而王也以桓之大惡天地所不容王生不能正其罪死又錫命以寵之以王為不天矣故去天以見之王姬歸于齊由魯嫁故志之也按本例云內如歸例月知王姬歸亦例月矣仇讐之國而為之主昏姻故不月以見譏齊師遷紀郱鄑郚紀之三邑也不言伐蓋齊劫而遷之二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘餘丘夷國於發語辭猶言於越也秋七月齊王姬卒此莊公所謂服大功者由魯嫁且來赴故卒之也按本例云王姬不日卒蓋闕也凡薨卒有不日者皆類此冬十有二月夫人姜氏會齊侯于禚乙酉宋公馮卒三年春王正月溺會齊師伐衛溺我大夫之未命氏者也此衛侯朔得罪于天子而走之齊齊為之伐衛以納朔而溺往會之不正其逆天子之命故月以見譏凡內伐例時夏四月葬宋莊公五月葬桓王七年而後葬則王室之事可知矣按本例云其不日蓋譏也譏其不及禮而葬也秋紀季以酅入于齊季紀侯母弟而為世子者也紀侯欲去其國乃使紀季以酅入齊自比于附庸所以下齊而存宗廟也其言入何自外入也雖以是而存宗廟然入于齊未可謂得其所也冬公次于滑其不言救紀未成乎救也公有畏矣故不月以見譏四年春王二月夫人姜氏享齊侯于祝丘夫人享齊侯如齊如齊師會禚會防會穀皆書姦也然辭不見譏又不變日月之例何也中冓之事難言之惡春秋所不道亦書其實而已猶若無譏焉為內諱也雖然敝笱載驅之詩存則文姜之惡不患不見于後世三月紀伯姬卒夏齊侯陳侯鄭伯遇于垂紀侯大去其國其曰紀侯大去其國賢紀侯也春秋之所謂賢者宜莫如紀侯以為不失仁義之道也嘗試言之夫守人之土地繼人之統業上不辱其先君下足以為百姓主與民守之效死而勿去此固義者之事然而將甚殘吾民也則又仁者有所不忍度時之所不可量力之所不能不以其地戰其民不以所生害所養杖策而去之如脫屣然此固仁者之事然而將輕亡其先也則又義者有所不肯是以太王去邠而稱其仁諸侯死社稷而謂之義若夫求仁義之全則未也嗟夫春秋之時紀之為國也微而介乎大國迫齊之强自桓五年齊侯鄭伯如紀欲以襲之紀於是乎始懼齊矣紀魯蓋昏姻之國也故明年會魯于成以謀齊難又朝于魯以請王命而求成于齊八年而祭公來遂逆王后于紀明年而紀季姜歸于京師此豈魯為紀謀而求援于王者耶然而天子之威不可恃也鄰國之援不可久也則宜有軍旅之事焉故十二年為曲池之會以結莒魯又明年乃與鄭伯來會以與齊戰而幸勝之會明年齊侯祿父卒紀乃得息肩于齊者數年雖然小國之勝大國之所懲也不可以不修好焉於是下齊而事之故十七年因魯以會齊侯而為黃之盟然則紀倣徨乎數年之間以謀其國家者亦至矣彼齊人抱虎狼之心利紀之肉而未厭越明年乃遷紀之三邑而取其地夫紀之地不盡則齊之求無已社稷之憂近在朝夕紀侯於是焉而謀曰將於此而守之則患力之不足將於此而去之又懼宗廟之不血食也故再嵗而使季以酅入齊所以事齊也又明年而大去其國所以違齊難也君子推當時之事原紀侯之心而善之蓋曰與其效死而莫守不若去之而全民人之為愈也與其輕去而見亡不若下齊而存宗廟之為愈也是以紀侯雖亡國之君而行兼乎仁義足以取貴乎春秋故於其奔亡則為之諱而書曰紀侯大去其國也且以見紀國之亡有義以存之紀侯之去有仁以行之諸侯失地名而紀侯不名蓋貴之也其曰大去焉大之也雖然於文未知其為齊取之故先書齊侯如紀以起其事又書齊侯葬紀伯姬以著其末則無患不明此春秋之義也然又有疑者且自齊侯鄭伯如紀至紀侯之大去蓋十有八年其間紀之所以謀齊者則至矣而未見齊之加兵于紀者何也齊紀蓋鄰國也齊强而紀弱彼朝夕伺隙乘間以侵攘吞噬於紀者未嘗一日而忘也始則欲因朝而襲之中則奪其邑而遷之終則脅逐而取之故齊之得紀終未嘗有顯然大侵伐之事者蓋亦可知已矣夫大去重事而以時志蓋賢紀侯不使與滅國同例且見紀之實非滅也六月乙丑齊侯葬紀伯姬伯姬吾女為紀夫人而乃齊侯葬焉然後知齊之果滅紀也夫葬紀伯姬於齊淺事也而斥齊侯蓋惡之也以見取人之國迫逐其君而葬其夫人不恤其大而治其細以齊侯為僞矣按本例云諸侯葬例月知夫人葬亦例月也此加日而葬隱之也亡國之葬也秋七月冬公及齊人狩于禚公內棄國事外忘父讎而與其微者狩以公為病矣故盡其辭又不月以見惡焉禚內地五年春王正月夏夫人姜氏如齊師是齊侯之師也不曰夫人姜氏會齊侯于某而曰如齊師當時之辭也蓋齊侯數出與文姜㑹淫愧其無名乃興師而出託有征伐之事焉文姜於是會之春秋如其志焉是以書夫人姜氏如齊師也然則齊師何以不地不地然後知齊師之有託也齊無所用其師焉爾屈完國佐如師陳侯如會固先地矣秋郳犂來來朝冬公會齊人宋人陳人蔡人伐衛伐衛所以納衛侯也下書王人救衛衛侯入于衛知此伐衛以納朔也公會四國之微者以敵王之師而納王之所惡以公為罪矣故不月以見譏六年春王正月王人子突救衛禮天子之三公受地視公侯稱周公祭公者是也天子之卿視伯稱祭伯召伯者是也天子之大夫視子男稱劉子單子者是也此天子之寰內諸侯也其未錫爵而命以氏則稱氏與字榮叔家父之徒是也其未命以氏者直書字而已叔服是也皆天子之大夫也士則賤矣不以爵通宰咺石尚之徒是也下士益賤矣不以名通稱人而巳凡稱王人者是也今稱王人蓋其微者而又字之所以進之也善其能救衛也周室之微政令不下行不能撫諸侯也久矣今乃禦諸侯之師而救衛焉故善之善之故詳志而月之也救例時夏六月衛侯朔入于衛其言入何未得其所也彼得國矣雖然因諸侯之衆犯天子之怒以入其國未可謂得其所也其不言諸侯納之何也諸侯有奔亡者諸侯相與納之蓋可矣然不正其逆天子之命而納之此春秋之所不與致公之伐而不與納衛侯則衛侯之惡明矣秋公至自伐衛由僖之前例不致於其有危則致不正公之逆天王之命以是為危矣凡往不月者至亦不月也螟冬齊人來歸衛俘抗王之師納王之所惡又相遺以俘則諸侯之不賓王也甚矣彼言來獻戎捷此言來歸衛俘此獲也我與有力焉歸我而已蓋與齊人分衛之所獲也且以見魯罪焉其為譏明矣七年春夫人姜氏㑹齊侯于防夏四月辛卯夜恆星不見夜中星隕如雨星隕自上下而有見于下者也衆多如雨也秋大水無麥苗無麥與苗兩穀不登矣而傳謂不害嘉榖何哉冬夫人姜氏㑹齊侯于榖言㑹見齊志也此載驅之所為作也八年春王正月師次于郎以俟陳人蔡人其言以俟陳人蔡人何僞辭也辭不必言以而加以焉知其為僞辭也當時之辭也蓋莊公與齊人有伐郕之約故以正月興師然而齊師未至故次于郎以待之然則此俟齊也不曰俟齊而曰以俟陳人蔡人夫兵詭道也公恐郕人聞其謀而得為之備故宣言曰吾師次于此以俟陳人蔡人而已凡言次者有所之而止于是者也今不目所事而直曰以俟陳蔡則其為僞明矣春秋不沒其實焉與書以成宋亂同義且春秋書以有二義如執宋公以伐宋執北宫結以侵衛此以者也以成宋亂以俟陳人蔡人此不以者也蓋彼于文不可不言以而此于文可以不言以如會于薄釋宋公次于聶北救邢之類不言以也甲午治兵正月師次于郎至夏始圍郕嫌于久次而無名故以甲午而治兵所以為久辭也春秋欲終始其事故不沒焉而傳謂兵事以嚴終治兵而陳蔡不至此見以俟陳人蔡人之辭于文不終不得其事而為之說也夏師及齊師圍郕郕降于齊師桓公死于齊魯于齊則讎也郕與魯皆文王之昭魯于郕則同姓也今會仇讎之人圍兄弟之國以莊公為不韙矣故郕人雖量力之不敵然卒不肯為莊公服而獨降于齊師焉傳謂諱滅同姓不言降吾師避之者誤矣秋師還春秋未有書師還者夫莊公以正月興師久次于郎夏而圍郕卒不獲利歷三時而師還蓋曰釋讎以伐親為詐以欺敵暴師逾時敵不為服我專其惡齊享其利師罷而歸國人咎焉故書師還所以終始其事而見其惡也而傳謂師還而君子善之者誤矣冬十有一月癸未齊無知弒其君諸兒無知何以不氏與族非公子而未命氏者也九年春齊人殺無知齊人殺無知猶衛人之殺州吁也公及齊大夫盟于蔇當是時齊無君故公及其大夫盟不恥也其曰齊大夫衆辭也雖然當其無君可以無盟矣故不日其盟以見譏又不正公之釋怨而與讎盟春秋惡焉故又不月也夏公伐齊納子糾晉人納捷菑於邾弗克納不言伐此言伐者起下乾時之戰知以納子糾而戰也下言取子糾殺之知其不克納也然則何以不言弗克納公以四月伐齊納子糾而小白先入襄公已葬君位定矣至於八月猶與齊戰蓋公欲納子糾之志篤矣然後知捷菑弗克納者晉人以義弗克而去之明矣不正公釋怨而納讎人之子故不月以見譏齊小白入于齊不曰公子見小白之不當立也小白君矣其不以歸言之何也篡兄爭國敵者在外未可謂得其所也秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績此蓋公戰也不言公夫戰危事不以公親之尊親之道也然承上公伐齊知戰者公耳且春秋於外有不書敗績於內有書我師敗績而傳獨以為內諱敗舉其可道者何耶夫兵之勝敗不可以為常敗未足為恥何遽諱乎夫春秋之所謂諱者豈徒然已哉蓋於其國有大惡則諱不幸則諱所恥則諱與夫難言之惡則諱於外為賢者則諱其他不諱也雖然其為之諱也亦必有以見之九月齊人取子糾殺之取易辭也不曰公子糾而直曰子糾從在喪之文見子糾之當立故也子糾當立則小白之不當立明矣殺公子例時見魯之不能存子糾故月之以重其譏也冬浚洙十年春王正月公敗齊師于長勺凡言敗某師者未得乎戰也詐戰也不正公一歲而兩敗人之師故皆不日以見譏二月公侵宋三月宋人遷宿自遷者地遷之者不地宋人遷宿宿入于宋也齊人遷陽陽入于齊也夏六月齊師宋師次于郎公敗宋師于乘丘郎魯地不言侵伐見未得乎侵伐也齊師宋師次于郎而獨敗宋師則知未得乎戰明矣秋九月荆敗蔡師于莘以蔡侯獻舞歸春秋之例諸侯以歸者名蓋以其處南面之尊有社稷之任而輕服于人於是為不肖故春秋名而賤之蔡侯以一敗之故而遽服于楚以蔡侯為病矣冬十月齊師滅談談子奔莒國滅不言出奔國已滅矣無所自出故也其不名閔之也力不足而為大國所滅故閔之滅者見閔則滅之者罪矣十有一年春王正月夏五月戊寅公敗宋師于鄑秋宋大水冬王姬歸于齊十有二年春王三月紀叔姬歸于酅紀叔姬紀季之妻也歸于酅季在酅也夫紀已亡而猶繫之紀酅入于齊而不繫之齊凡以見紀之宗廟存焉爾諸女書來而不書歸紀叔姬書歸而不書來蓋非歸寧而來又非見出而來國亡而來也不書其來閔之也而書其歸喜復其所也以月志重其事也夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧以尊及卑也冬十月宋萬出奔陳宋萬弒君之賊也宋人不能即討縱之踰時而後出奔以為其國無臣子矣故月之以志其久且見惡也十有三年春齊侯宋人陳人蔡人邾人會于北杏齊猶未見信于諸侯故皆使微者會夏六月齊人滅遂齊侯猶未見信於諸侯乃滅遂以警之然遂未有罪也古之王者使大邦畏其力小邦懷其德今齊桓圖霸乃夷滅小國以求見畏於大國也則其於懷德逺矣秋七月冬公會齊侯盟于柯當是時魯亦大國而鄰於齊齊欲謀霸而魯不會故齊為柯之盟以求魯也齊桓不能修德以來諸侯而顧為私盟以屬魯故不月以見譏且公前年納其讎而不克親與齊戰今乃從而受盟以公為愧矣故又不日也十有四年春齊人陳人曹人伐宋宋大國不欲齊之霸雖與北杏之會而終以不從所以致齊人之伐也夏單伯會伐宋魯猶不與齊三國既伐宋而後單伯乃往會之秋七月荆入蔡冬單伯會齊侯宋公衛侯鄭伯于鄄諸侯皆在而魯乃使單伯往會見魯之不欲霸齊也十有五年春齊侯宋公陳侯衛侯鄭伯會于鄄魯又不往會夏夫人姜氏如齊秋宋人齊人邾人伐郳鄭人侵宋冬十月十有六年春王正月夏宋人齊人衛人伐鄭宋人伐鄭報見侵之怨也齊人與衛人助之齊侯嘗主鄄之會矣欲以義從諸侯故為宋伐鄭也故先宋後齊以見之秋荆伐鄭冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽公羊曰公會當從公羊加公字諸侯同盟齊始霸也桓盟不日桓會不月蓋信而安之故變例以見之也凡春秋變例以為言者有褒貶存焉邾子克卒十有七年春齊人執鄭詹詹鄭大夫之未命氏者也鄭詹之罪何前年背會而侵宋者豈鄭詹為之歟今齊行霸然後有討於鄭而詹見執也春秋或稱人以執或稱爵以執稱人以執執有罪也雖有罪然人非所以執矣稱爵以執執無罪也彼無罪雖天子不得而執况諸侯乎凡執之志皆譏也諸侯與大夫皆命於天子非天子命而執之是專執也春秋所以為譏矣是以未有書執某人者然則微者之執不譏於春秋夏齊人殱于遂其曰齊人殱于遂無遂之辭也見遂之不能殺齊人而齊人自取殺于遂云爾秋鄭詹自齊逃來鄭詹之逃以來我故書也其曰自齊齊有奉之者也執人之罪不能即治有奉而逃焉則有司之罪矣冬多麋十有八年春王三月日有食之夏公追戎于濟西其言追戎于濟西何蓋戎非伐我也過我于濟西公聞其過而追之至于濟西而已故先不言伐我而後亦不言弗及則異乎齊人侵我西鄙公追齊師至酅弗及也傳者謂不言其來諱之且戎伐我于我未有損焉何遽諱乎至于書狄伐我又何以不為之諱也夫戎之過我未為有罪且亦疆埸之事爾而公顧自追之見公之輕身而妄行故不月以見譏秋有􅈮􅈮蜚非所宜有以有為災也至于螟螽之為害則多與有不足以言之矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟凡內大夫以君命出曰如某今公子結媵而不曰如陳蓋結實欲要齊宋之盟故假媵事以行爾而非有君命矣且媵非所以于鄄者也遂及齊侯宋公盟惡專命也夫人姜氏如莒按本例云是加月以見譏者然公子結遂及齊宋盟不月後事亦不得而月二十年二月夫人姜氏如莒加月以譏是其例冬齊人宋人陳人伐我西鄙此公子結為之也結不終陳人之媵抗齊宋二君之盟此三國所以共怒而魯卒見伐也傳謂大夫出境有可以安國家利社稷者專之可也結一出使而致三國之來伐何以謂之安國家而利社稷哉其說誤矣二十年春王二月夫人姜氏如莒莒魯蓋婚姻之國也故夫人亟如莒夫人亟如莒非禮矣故月之以見譏且春秋譏夫人如莒而不譏夫人如齊與會齊侯則其義深矣夫人如例時夏齊大災大疫也不以月志知其為大疫也火災例月疾災例時秋七月冬齊人伐戎二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚書稱眚災肆赦肆放也眚災非故為罪者則放赦之又稱宥過無大言過誤雖大者亦宥之也則肆大眚之義可知矣癸丑葬我小君文姜陳人殺其公子御冦諸侯之大夫皆命於天子雖有罪必請于天子不得專殺也故孟子稱葵丘之盟戒曰母專殺大夫然則春秋凡書殺大夫者皆譏也有罪而見殺猶以為譏又况無罪而殺之乎故春秋之例稱國以殺大夫舉重者君討之辭也殺有罪也稱人以殺大夫舉微者下殺之辭也殺無罪也陳人殺其公子御冦知其無罪也其不稱大夫未命為大夫也公子貴矣今公之子也尊為之君親為之父而不能保其臣子之無罪而見殺以陳侯為病矣夏五月秋七月丙申及齊高傒盟于防公盟也何以不言公恥與大夫盟也著日而後盟知公之盟也然則高傒何以不貶高傒至防而公及之盟高傒之罪薄矣隱十年取防知防之為魯地也然則異乎及晉處父盟矣按本例云喪盟何以不譏譏喪盟例去日則無以見其為公盟也春秋欲有所見者不嫌矣冬公如齊納幣納幣大夫之事也而公親之又未終母喪而嘉禮是行以公之惡為甚故春秋盡其辭且不月以見惡焉二十有三年春公至自齊當是時公行不致者以桓安之也今公親接于齊則致焉何也公居喪而納幣又親焉其為不孝己甚夫不孝之人霸者所宜討而桓乃親與之為禮雖桓亦危矣况於莊乎故於下觀社逆女皆致也於其行既盡其辭又變例以見之其反也致焉春秋之惡惡如此雖然致莊其有以譏於桓矣祭叔來聘隱元年祭伯來不稱使不目其事知其以私事行也此曰來聘是將公事者也有公事而不稱使知假天子之命以來爾故春秋不稱使而目其事以見其實焉且為人臣而外交罪矣况假天子之命以行者耶故直曰祭叔來聘以惡之其譏明矣夏公如齊觀社外忘父讎內不終母喪而親納幣又如齊觀社以從宴好以公之惡為已甚故春秋盡其辭且不月以見惡焉公至自齊荆人來聘春秋之例外裔略而不人稱人者其君也荆固裔也稱人而來聘何也荆日以彊能行禮於中國故進之也進荆所以傷中國之微矣公及齊侯遇于榖蕭叔朝公蕭叔蓋與許叔紀季蔡季同義彼三者皆入而為君繼兄而當國惟蕭叔其後不經見以理考之而知也周官諸侯之世子誓於天子則下其君禮一等未誓則以皮帛繼子男於是乎有朝㑹之禮矣故曹伯使其世子射姑來朝春秋無譏焉則蕭叔以母弟而繼世明矣向使非弟其可言叔乎不為世子其可言朝乎傳謂小國之君未命者然於例自當稱名邾儀父郳犂來是也未有稱字者知傳之誤矣其言朝公何公在乎榖也見公在榖而蕭叔因朝焉爾故不言使又不言來其譏明矣秋丹桓宮楹丹楹刻桷天子之禮也魯以周公之故得用天子之禮然可以用於周公之廟不可用于羣公之宫丹桓宫楹刻桓宫桷譏僣也宗廟事之輕者例當月此不月以見譏冬十有一月曹伯射姑卒十有二月甲寅公會齊侯盟于扈此公與齊侯會謀昏期故明年夏公如齊逆女也桓盟不日不正齊魯之為是盟故復日之以見譏二十有四年春王三月刻桓宫桷葬曹莊公夏公如齊逆女春秋譏不親迎然則公親迎之為禮也公於齊則有父讎之弗報於內則有母喪而圖昏二者天下之大惡而公能安之然則親迎祗以為罪也故不月以見惡焉秋公至自齊八月丁丑夫人姜氏入春秋之例使大夫逆則曰某以夫人某氏至自某公親逆則曰公至自某夫人某氏入大夫之卑不可以挈夫人故以夫人致焉然夫人不可徒行故又兼以大夫致也曰某以夫人某氏至自某是也公則尊矣夫人挈乎公者也故致公而不致夫人志夫人之入而已曰公至自某夫人某氏入是也夫人從君于喪娶則何以不貶于其入不貶于其孫不貶于其薨不貶而于喪至焉貶舉其重者也戊寅大夫宗婦覿用幣大夫之婦同宗者也宗婦覿淺事也例當時而以日志所以致譏乎用幣焉爾繼日之下不得不别加日以見之也大水冬戎侵曹曹羈出奔陳曹羈蓋曹君也戎侵曹曹君不能守而出奔故赤歸於曹而自立也曹羈之立踰年矣何以不稱曹伯見羈之不當立也莒展輿出奔吳亦是矣鄭伯突出奔蔡亦不當立者則何以稱鄭伯突之不當立前見矣赤歸于曹公子赤也何以不稱公子見其不正而不當立也突歸于鄭亦是矣其言歸何見赤之歸而為君也郭公郭公于文不終疑闕也傳謂赤為郭公誤矣二十有五年春陳侯使女叔來聘其曰女叔蓋字也當時之辭爾見女叔之專也夫女叔之專而春秋無異辭以見之何也變名而為字此春秋所以見之也紀子帛鄭祭仲宋孔父子哀華孫之徒是矣而傳者謂嘉之故不名且裂繻有專命之嫌祭仲有逐君之惡孔父有見殺之咎而華孫子哀有恃貴之罪春秋何以嘉焉推是五者則女叔之有譏可知矣春秋以例見者不疑也夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社禮有救日則詔王鼓蓋求乎陽以勝隂之道也未聞有用牲于社之為禮也社隂也而用牲焉是求乎隂而非所以勝隂之道矣伯姬歸于杞嫁於諸侯則歸之其不書逆逆者微不道故也秋大水鼓用牲于社于門大水而鼓可也求乎陽以勝隂也用牲于社于門是求乎隂非所以勝隂之道矣用牲于社例當月其不月以見譏則知日食而用牲于社是亦不月者也冬公子友如陳二十有六年春公伐戎來而不拒去而不追者治戎之道也且戎未有害於我而公固伐之公不能內治其國而逺事於戎以公為失所務矣故不月以見譏夏公至自伐戎伐戎危矣逺乎中國不能安也曹殺其大夫殺大夫何以不名衆也不可以名舉矣晉殺三郤陳殺二慶猶可以名舉也前年戎侵曹曹羈出奔陳赤歸于曹赤歸而為君豈諸大夫多有不附于赤者邪故赤追治其事而誅殺者衆也然稱國以殺蓋得其罪矣秋公會宋人齊人伐徐按本例云不正公會雨國之微者以出故不月以見譏冬十有二月癸亥朔日有食之二十有七年春公會杞伯姬于洮伯姬公之姊妹婦人既嫁見兄弟不踰閾而公會伯姬于洮非事也故不月以見譏夏六月公會齊侯宋公陳侯鄭伯同盟于幽衣裳之會也凡桓之盟固未有書同者惟十六年與此二十七年幽之盟則言同十六年之盟桓始霸未能同諸侯以同之然後同也至此復尋前日之盟而桓之功德猶未信於諸侯故復言同亦以同之然後同也自救邢盟魯封衛伐楚而後功德具見自是之後凡六會盟而莫有言同者以見諸侯之從桓不待同之而自同云爾夫諸侯之盟以日為信而桓文之盟則不日以為信諸侯之盟以同為美而桓文之盟以不同為美然則春秋變例以見美于桓文者其詳如此雖然幽之盟巳不日矣蓋桓之于已則自信而於人猶有未同故也雖然固不以兵車矣秋公子友如陳葬原仲大夫越國而葬人非禮明矣冬杞伯姬來莒慶來逆叔姬卿自逆也不書歸春秋之例內女嫁于諸侯則書歸嫁于大夫則不書歸為諸侯夫人則卒之不為諸侯夫人則不卒之杞伯來朝公會齊侯于城濮二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績稱人以敗者未至乎甚敗也而傳謂不稱師敗者未得乎師誤矣其不地於衛也凡戰於國者舉國戰于宋是也今不曰戰于衛而曰衛人及齊人戰以見衛人欲戰也春秋之戰及者為主雖然何以知衛人之欲戰蓋衛人欲掩齊師始至未備故以至之日而遂戰甲寅戰之日也知於伐之日而戰矣交譏之也夏四月丁未邾子瑣卒秋荆伐鄭公會齊人宋人救鄭凡救善之也然不正公會兩國之微者以出故不月以見譏冬築郿疑郿下當有囿字或脫之爾傳謂邑曰築都曰城似妄也大無麥禾書無麥苗又書無麥禾或言苗或言禾始生曰苗已秀曰禾蓋謂稻也周之七月夏之五月稻始生而苗周之十月夏之八月稻已秀而禾故彼於秋言無苗此於冬言無禾也然何以名麥而不名稻未成乎穀也何為兼言之兩穀不登則病矣臧孫辰告糴于齊凡先曰如某而後目其事者君命之辭也今不曰如某而直目其事見臧孫自行而非公命者矣書曰臧孫辰告糴于齊惡專命也傳謂國無一年之畜故為莊公諱誤矣二十有九年春新延廄不言作因其舊而新之也因舊而新之淺事也何以書冬大無麥禾至於告糴則其國病矣則延廄雖未新可也譏其不恤民明矣夏鄭人侵許秋有蜚冬十有二月紀叔姬卒紀季之妻隱七年歸于紀者是也紀已亡矣而猶繫之紀凡以見紀之存焉爾城諸及防言及者先後之辭也三十年春王正月夏次于成不目其人蓋微者欲以救鄣而不能者也秋七月齊人降鄣郕降于齊師郕自降也齊人降鄣劫而降之也不正其以力服人故月之以見譏八月癸亥葬紀叔姬按本例所釋與莊四年齊侯葬紀伯姬同九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊人伐山戎三十有一年春築臺于郎夏四月薛伯卒隱十一年薛稱侯來朝今稱伯蓋與滕杞之屬或稱子或稱伯或稱侯同例此皆當時小國於其朝會之際主者得以上下其禮其以侯伯之禮事之則書曰侯曰伯以子禮事之則書曰子此魯史之舊文仲尼從而不更以見周衰之亂典禮不明大國恣橫雖諸侯之爵命不能自有而屢為大國之所遷易雖然於其以卒赴蓋其臣子之辭爾而亦自降何也彼小國習見輕於大國臣子雖愛其君父猶不得不降名以赴也不然魯固以降禮待之乎然則何獨滕薛把為然蓋是時三國之微猶附庸耳而其爵則為公侯此宜為大國之所惡而見卑也築臺于薛六月齊侯來獻戎捷彼云衛俘俘囚也此言戎捷然則捷不獨俘矣獻卑者之事也齊侯為霸主而親獻捷于我非所宜獻也其有警於我乎故月之以見譏獻捷例時秋築臺于秦孔子曰道千乘之國敬事而信節用而愛人使民以時今一歲之間而三築臺以公為盡民之力矣然則何以不變例以見譏一歲三書築臺其為譏亦明矣春秋之義其於辭不足以見褒貶者然後日月之例變焉又其甚惡然後盡其辭復變例也冬不雨謂一時不雨志災也三十有二年春城小穀一歲三築臺冬又不雨而復城邑以公用民之力為已甚矣夏宋公齊侯遇于梁丘秋七月癸巳公子牙卒三家皆謂季友鴆公子牙春秋不言殺為季子諱也凡春秋所為諱者必將有見焉公子牙之殺無見也豈三家之傳失之乎八月癸亥公薨于路寢冬十月己未子般卒弒也何以知其弒以閔公不書即位知其弒也公子慶父如齊公子慶父弒君矣其出不曰奔何也慶父非奔者也春秋志之以見魯國之亂君薨子弒國內無政罪人不討彼得公然而行以適霸國且以罪齊桓主中國之盟不能為魯討賊而受之也雖然春秋之例內大夫以君命出則曰如某公子友如齊季孫行父如晉之類是也非君命出則不曰如某臧孫辰告糴子齊公子結媵陳人之婦于鄄之類是也不然則直曰奔耳今公薨子弒國內無君而曰公子慶父如齊見其怙姦不忌猶假君命以行爾且當其無君而以有君之辭言之蓋春秋變例以見其事焉雖然春秋侵伐之事固有有君命而一皆不以君命之辭言之何也天下有道征伐不自諸侯出自諸侯出已失之矣自大夫出尤失之矣然則不以君命之辭言之無他嫌與諸侯之專征伐也狄伐邢
