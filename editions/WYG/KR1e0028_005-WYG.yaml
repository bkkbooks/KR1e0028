body:
  text: 春秋經解卷五宋崔子方撰僖公元年春王正月僖公之不即位見閔公之弑也齊師宋師曹伯次于聶北救邢古之用兵觀勢而後動次于聶北為之聲援葢救邢也傳謂言次非救似誤矣桓公攘外患而安中國區區以是為己任卒復衞邢春秋與其有功而曰言次非救何也夏六月邢遷于夷儀齊師宋師曹師城邢此當曰諸侯城邢是師也非諸侯也當曰諸侯之大夫城邢是師也不可以稱大夫也當曰諸侯之師然春秋未有稱諸侯之師者必歴數之如桓十三年齊師宋師衞師燕師敗績是也秋七月戊辰夫人姜氏薨于夷齊人以歸凡夫人薨不地夫人之居有當處其薨不必地也其地故也葢齊人以夫人歸至夷而殺之也然則何以不言齊人以夫人歸為内諱也春秋所為諱者必有以見之下言齊人以歸不疑矣成八年書把叔姬卒把伯來逆叔姬之䘮以歸此以歸亦在薨下而不言以䘮歸知非以䘮歸者也先薨而後以歸然後其事見矣楚人伐鄭楚何以始稱荆今稱楚荆以州號楚以國號楚已强能自同乎中國故春秋從而進之進楚所以見南蠻之强而傷中國之微也楚自是而後例以中國矣八月公會齊侯宋公鄭伯曹伯邾人于檉衣裳之會也桓會不月公八月與邾人會九月而敗其師以會為不信矣故月之以見譏按本例云譏喪會九月公敗邾師于偃於會則月於敗其師則不日凡以見譏焉爾冬十月壬午公子友帥師敗莒師于酈獲莒挐傳謂莒無大夫大季友之獲誤矣莒固有大夫矣莒慶莒意恢之類是也即無大夫其接於我也若邾鄫小國亦書其人葢以我事而書如邾畀我邾快鄫世子巫之類是也十有二月丁巳夫人氏之䘮至自齊不稱姜貶夫人不得於父母家故貶其姓文姜之罪其終不見故於其始孫貶焉哀姜之罪其終見於齊人殺之故不於其始孫貶而貶其以喪至生而出見殺而歸以為莫重乎其以䘮至也二年春王正月城楚丘楚丘衞邑諸侯城之以封衞也不言孰城順桓意也狄滅衞桓公以為恥城楚丘以封衛桓公不以為功為之諱其始必為之諱其終夫桓公之功所以從簡書安中國存亡繼絶唯是之為最春秋於其所恥者則順其意而畧之畧之所以重見其美也書邢之事則以詳書衞之事則以畧詳畧不同然後當時之事可知而桓公之功著矣雖然亦必有見焉定之方中之詩存則城楚丘之事亦明矣使後世之人智者晰於理而不疑愚者質於事而不惑是聖人之意也春秋書城者二十九未有以月志者今城楚丘獨以月志見桓公之急於存亡合諸侯之衆曾不踰月遂城衞都云爾變例以為言所以見美於桓公也夏五月辛巳葬我小君哀姜虞師晉師滅夏陽三家載虞虢之事詳矣重以孟子之言而取信焉春秋之例國曰滅邑曰取夏陽邑也而言滅此聖人之深意葢當是時虞虢為唇齒之國虢之有虞猶虞之有虢勢相􅀝也夫夏陽者虢之塞邑而晉師之所由入也夏陽亡則虢必亡虢亡則虞必亡矣故於夏陽不言取而言滅以見夏陽之重繫兩國之存亡夏陽一書滅而兩國之滅不復言矣於虞之滅也則曰晉人執虞公以見虞之滅已久晉人特執一虞公云爾夏陽之役晉為之主而先虞師何也猶曰虞不假晉道則晉不可得而至乎虢晉之得至乎虢者由虞假晉道而先為之率也故春秋以虞首惡焉秋九月齊侯宋公江人黄人盟于貫衣裳之會也見齊桓之盛逺致江黄之人莫不來會也冬十月不雨楚人侵鄭三年春王正月不雨夏四月不雨夫禮有雩雩者求雨之祭也然春秋于書不雨書旱之年則未嘗書雩于書雩之年則未嘗書旱與不雨何也蓋春秋之例凡雩而得雨則書雩雩而不得雨則書不雨為災則書旱今歴三時而三書不雨僖公之憂民閔雨數為之雩于雩而不得雨則又書不雨書之詳以志其勤也彼歴三時不雨而畧曰自某月不雨至于某月于文之世三書之見文公不憂民閔雨而不為之雩則異乎僖公之賢也此詩人所以頌僖公之能務農者歟按本例云於雩之時而不雨則以時志不雨於雩之踰時而不雨則又各以首月志不雨徐人取舒舒葢楚屬邑按諸家皆以舒為楚屬國崔氏獨以為邑葢拘于書取之例也徐人恃齊故取之也及桓徳既衰而後楚亟伐徐徐之禍自此始矣六月雨以不雨為憂則以雨為喜矣故志之也秋齊侯宋公江人黄人會于陽榖江黄小國且逺以桓公之盛曷為數與其微者會盟江黄漢陽之諸姬實附于楚齊桓方欲事楚故數與此二國會然其君畏楚不敢輒出是以皆使大夫至也江黄之禍自此始矣是時齊與江黄謀楚明年遂興陘之師則斯㑹也其有兵車矣故不在九合之數冬公子友如齊涖盟涖盟主彼盟也而我欲之來盟主我盟也而彼欲之其盟强矣春秋譏焉故例皆不月以見之楚人伐鄭四年春王正月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘蔡邇于楚而親于楚自桓之覇數會諸侯而蔡不至故先侵蔡而遂伐楚也其言次何見桓公師止于陘以問楚罪而不遽加兵焉凡桓會不月其月為蔡潰也凡潰例月夏許男新臣卒不言卒于師内桓師也楚屈完來盟于師盟于召陵屈完之來楚子使觀齊師之强弱而欲為之慮屈完知齊侯之義為可服也於是請盟焉以安其國故不稱使以見度事之宜而能求盟者在屈完也春秋與之且是時楚未有大夫而曰屈完葢進之也與齊髙子來盟同例其先言來盟于師又言盟于召陵始求盟之時師在陘也與之盟之時師退于召陵矣故兩言盟也且見楚已求服故桓公為之退舍以禮楚齊人執陳轅濤􅂗賣師不忠者濤􅂗之罪也秋及江人黄人伐陳齊人及之也承上齊人執轅濤塗無他事不再言齊人不疑也不言遂以見其為一事而已猶曰執陳轅濤塗而伐陳爾然則何以不言以不與濤塗俱也江黄本楚與國雖數與齊會盟然而畏楚不敢與陘之師楚既内服然後從齊以伐陳也八月公至自伐楚先侵蔡後伐楚又盟召陵而獨以伐楚致二事偶以其大者致也不以會致召陵之盟盟屈完而已葬許穆公冬十有二月公孫兹帥師會齊人宋人衞人鄭人許人曹人侵陳召陵之會齊人有怒于陳不欲重勞諸侯之師故獨與江黄伐之今又合七國之大夫而復侵陳陳雖有罪執其人伐其國可也而又侵之以齊為已甚故月之以見譏五年春晉侯殺其世子申生忘天性之愛忽社稷之重而殺其嗣子以晉侯為大惡故斥其爵以惡之凡殺世子母弟者目君也把伯姬來朝其子其子何以不名弱也譏不在其子故以略言之其言朝何是為世子者也然則何以不言世子世子者世其世也可以繼把不可以繼伯姬然則何以不言朝杞世子言把世子則疑非伯姬之子也婦人而朝其子非禮明矣夏公孫兹如牟公及齊侯宋公陳侯衞侯鄭伯許男曹伯會王世子于首止衣裳之會也殊會王世子尊之也尊世子所以尊天王也所謂正而不譎也此齊欲會而以公及之變例也見齊之避不主也秋八月諸侯盟于首止再言諸侯見王世子不與盟也齊桓行覇尊王室不敢上盟王世子諸侯自相與盟爾鄭伯逃歸不盟鄭伯與於會矣但不與盟爾是有畏於楚故也當是時楚之强已加乎中國矣楚人滅弦弦子奔黄九月戊申朔日有食之冬晉人執虞公此滅也其不言晉人滅虞何也見夏陽之滅而虞已亡矣晉人特執一虞公而已春秋惟宋以二王後稱公其餘諸侯未有稱公者死則以例稱之凡言葬某公者是也今虞公見執而稱公以見國滅而身死焉故以死例稱之不然則與楚人執徐子晉人執鄭伯同例何以見其國滅而身死乎夫貪賂忘親甘佞言而自取滅亡之禍者虞公之罪也凡執諸侯與内大夫例月執外大夫例時虞執不月凡以見虞之亡也六年春王正月夏公會齊侯宋公陳侯衞侯曹伯伐鄭圍新城責逃盟之罪也秋楚人圍許諸侯遂救許葢上圍新城之諸侯間有楚人圍許于文不屬故再曰諸侯也其他類此冬公至自伐鄭先伐鄭後救許不以救許致二事偶致其大者也七年春齊人伐鄭夏小邾子來朝鄭殺其大夫申侯申侯與陳轅濤􅂗為讎者也齊人伐鄭故鄭殺申侯以說于齊而後世子華受盟于甯母也秋七月公會齊侯宋公陳世子欵鄭世子華盟于甯母曹伯班卒公子友如齊冬葬曹昭公八年春王正月公會王人齊侯宋公衞侯許男曹伯陳世子欵盟于洮王人微者而序諸侯之上尊王命也曹伯在䘮而不降名春秋亦如其志而已洮之盟衣裳之會也鄭伯乞盟鄭伯葢與於盟矣志其乞盟而已如陳侯如會巳與於會矣志其後至而已春秋不失實如此夏狄伐晉秋七月禘于大廟用致夫人致夫人而不稱氏姓畧之也立妾之辭也僖公即位未嘗納幣逆女而下書夫人姜氏知立妾而為之矣其言致何猶致女也父母家之辭也不正公以妾為妻故以其父母之辭致之且畧之也夫宗廟之祭或書祭或書有事何也譏在祭則目祭譏不在祭則書有事而已譏在祭則目祭烝嘗吉禘用郊之類是也譏不在祭則書有事有事于大廟有事于武宫之類是也禘于大廟用致夫人譏致夫人也然復目其祭何也葢兼譏之禮人君三年之䘮畢而祫五年而禘自是以為常今僖公即位八年矣而為禘知非所以禘也其言用致何見為此禘者特用之致夫人而已然則不當禘亦明矣與用郊之言用同意春秋之事於其辭不足以見褒貶與有疑者然後日月之例變焉今禘之譏明矣然復不日何也嫌於致夫人之為禮故又不日以見之致夫人重事例當日冬十有二月丁未天王崩九年春王正月丁丑宋公御說卒夏公會宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘秋七月乙酉伯姬卒九月戊辰諸侯盟于葵丘衣裳之會也夫桓盟不日以為信且葵丘之盟束牲載書而不㰱血加五命以令諸侯此桓之盛而反日之何也周衰之末天下無王諸侯有能興起者則易然也以桓公之盛管仲之賢而不能有志乎此乃區區為伯者之政此孔子所以小之雖然當春秋之時所以攘戎狄安中國九合諸侯一匡天下免民於左袵之患者桓公之功也春秋與其伯而小其不至於王故於九合之會則信之以致其美於葵丘之盟則變例以見譏焉然獨於是盟然後見譏何也猶曰桓之盛極此而已無能為矣故譏之也甲子晉侯佹諸卒冬晉里克殺其君之子奚齊其曰殺其君之子何奚齊葢未立也晉侯始死其國多難大臣各欲有所立故荀息奉君命而立奚齊未果而為所殺也且稱世子則不可稱公子則不見其君之所欲立者故繼之先君而謂之君之子也如蔡侯般已死而有猶稱世子亦以其未立故也傳者謂弑未踰年君之號似誤未踰年之君雖未稱爵然國人固已君之齊公子商人弑其君舎此未踰年而稱君之證也十年春王正月公如齊此朝也而不言朝不與朝也凡公如某而下不目其事者皆朝也内大夫如某而不目其事者皆聘也夫朝聘之設諸侯事天子之禮也於其所以事天子者備然後有中相聘世相朝之禮然亦罕矣春秋之時公之朝齊晉大國者三十有四而朝京師者一大夫聘諸侯者五十有二而聘京師者五夫二百四十二年之間周歴十三王魯歴十二公而朝聘者才至乎五六則是曠世而無一人以往也葢當時諸侯所以事天子之禮略而所以事大國之禮詳以内為失所事矣春秋之所不與故一皆没而不書使漫若以他事往而不為朝聘者雖然於外之來接於我者皆書朝聘焉則於内之往者不患不知為朝聘而或者以為尊魯誤矣狄滅温温子奔衞晉里克弑其君卓及其大夫荀息按本例云失日也弑逆天下之大惡不區區以日月例見也其失日月者闕之志臣子不謹而已後並同夏齊侯許男伐北戎晉殺其大夫里克秋七月冬大雨雪志大也於月有之則書月於時有之則書時時非一志也十有一年春晉殺其大夫㔻鄭父是里克之黨欲立重耳而以三公子之徒作亂者也夏公及夫人姜氏會齊侯于陽穀僖公夫人也未嘗書逆葢致於大廟而後為夫人者也不正公之以妾為妻又且與之出會故不月以見譏秋八月大雩冬楚人伐黄十有二年春王三月庚午日有食之夏楚人滅黄桓始事楚江黄來會今楚伐黄而齊不救以至於滅見桓之徳衰矣秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衞夏四月葬陳宣公公會齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹衣裳之會也秋九月大雩雩或書月或書時葢於雩之月而得雨則以月志於雩之時而得雨則以時志冬公子友如齊十有四年春諸侯城緣陵此會于鹹之諸侯也間有大雩公子友如齊於文不屬故再言諸侯傳謂不書其人有闕者似誤矣夏六月季姬及鄫子遇于防使鄫子來朝下書季姬歸于鄫是始嫁之文然則此時猶未嫁也未嫁之女而乃與鄫子遇又終歸之于鄫此何義哉故月之以見譏然則傳謂季姬來寧者誤矣秋八月辛卯沙鹿崩按自此至僖三十三年永樂大典並闕狄侵鄭冬蔡侯肸卒十有五年春王正月公如齊至是始純用五年一朝之制同于事天子之禮矣按此下經解九條並從黄震日抄檢補楚人伐徐三月公會齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐夏五月日有食之秋七月齊師曹師伐厲按本例云厲楚屬也傳曰伐厲以救徐是也桓以安中國撫諸侯為己任不能却楚以救徐而顧伐厲厲何罪焉伐國以救國未可以公天下也於桓為病矣故加月以見譏八月螽九月公至自會季姬歸于鄫己卯晦震夷伯之廟冬宋人伐曹楚人敗徐于婁林按本例云三年徐人取舒舒楚屬也葢徐人恃齊而取之也桓徳既衰故楚亟伐徐敗之婁林徐之禍有以自取故不月以見譏十有一月壬戌晉侯及秦伯戰于韓獲晉侯十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都按本例云外異例時然春秋晦朔有事則書晦朔謹終始也志朔則不得不志月與日矣又嫌二者同日故加日月以見之凡事之嫌者殊志也三月壬申公子季友卒夏四月丙申鄫季姬卒秋七月甲子公孫兹卒冬十有二月公會齊侯宋公陳侯衞侯鄭伯許男邢侯曹伯于淮按本例云齊桓牡丘之盟陽穀之會淮之會葢有兵車也是時桓徳既衰楚亦内侮伐徐敗婁林之師桓公於是合諸侯以救之又為之伐厲伐英氏以報楚則其有兵車亦明矣故淮之會加月以見譏十有七年春齊人徐人伐英氏敗徐豈英氏有力乎夏滅項秋夫人姜氏會齊侯于卞九月公至自會按本例云齊桓會例不月淮之會譏也故月往而月致冬十有二月乙亥齊侯小白卒齊桓之覇自莊十六年盟于幽至僖十六年盟于淮凡十有二會而孔子稱桓公九合諸侯者舉其不以兵車者而已莊十六年九國盟于幽二十七年五國又盟于幽僖元年六國會于檉二年四國盟于貫五年八國會王世子于首止七年五國盟于甯母八年王人與七國會于洮九年宰周公與七國會于葵丘十三年八國會于鹹凡九合諸侯不以兵車十有八年春王正月宋公曹伯衞人邾人伐齊按本例云不正四國之伐喪故加月以見譏夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊秋八月丁亥葬齊桓公冬邢人狄人伐衞十有九年春王三月宋人執滕子嬰齊按本例云滕子書名失地之君也夫諸侯有失地者諸侯相與納之可也今宋襄圗覇不能懐綏小國又因其㣲弱而遂執之以宋為不義故加月以見譏夏六月宋公曹人邾人盟于曹南鄫子會盟于邾己酉邾人執鄫子用之秋宋人圍曹衞人伐邢冬會陳人蔡人楚人鄭人盟于齊按本例云盟于齊主齊而盟也是時齊桓既卒宋襄圖覇以劫諸侯葢諸侯不肯從宋而後為齊之盟所以未忘桓公之功也春秋善是盟故亦信而不月猶之桓公之志爾傳謂陳穆公請修好於諸侯以無忘齊桓之徳猶信也梁亡按本例云梁之亡也不以月志然後知諸國有以自取滅亡之禍者其不月明矣二十年春新作南門夏郜子來朝五月乙巳西宫災鄭人入滑秋齊人狄人盟于邢冬楚人伐隨二十有一年春狄侵衞宋人齊人楚人盟于鹿上夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋按本例云凡大國執例月此特譏之而以時志為中國恥故畧之也冬公伐邾楚人使宜申來獻㨗十有二月癸丑公會諸侯盟于薄釋宋公二十有二年春公伐邾取須句按本例云邾我之與國也冬伐之春又伐之而取其邑秋又與之戰以内為迫人已甚故不月以見譏夏宋公衞侯許男滕子伐鄭宋公釋乎執而遽伐鄭所以怒楚而致戰也秋八月丁未及邾人戰于升陘冬十有一月己巳朔宋公及楚人戰于泓宋師敗績二十有三年春齊侯伐宋圍緡夏五月庚寅宋公兹父卒秋楚人伐陳冬十有一月把子卒二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭按本例云王者無外然則天王之出見不能乎其家而出也其曰出失内之辭爾然于外猶得其所居焉故曰天王出居于鄭也夫貴為天子而不能容其母弟以得罪于母亦甚矣故春秋盡其辭且不月以見譏晉侯夷吾卒二十有五年春王正月丙午衞侯燬滅邢夏四月癸酉衞侯燬卒宋蕩伯姬來逆婦宋殺其大夫豈嗣君三年喪畢而治泓戰之罪諸大夫有以衆死者乎按黄震日抄云此以宋事臆度之不若闕所不知也秋楚人圍陳納頓子于頓葬衞文公按本例云大國次國之葬例月其越禮而葬者僭也故加日以見之其不及禮而葬者逼也故去月以見之傳稱宋華元樂舉厚葬文公今宋公之葬實日衞文侯之儉也今衞文之葬實不月以類考之可知矣古人以送死可當大事故春秋以葬禮為重於其過不及者明著譏焉按此與經解卒葬不著例之說異冬十有二月癸亥公會衞子莒慶盟于洮二十有六年春王正月己未公會莒子衞甯速盟于向齊人侵我西鄙公追齊師至酅弗及夏齊人伐我北鄙衞人伐齊公子遂如楚乞師秋楚人滅䕫以䕫子歸按本例云傳謂虁子不祀其祖楚人讓之而䕫子終不祀也故楚人滅䕫夫有不祀之罪而且致怒大國者取亡之道春秋譏焉故不月以見之國滅不月則以歸不得而日也冬楚人伐宋圍緡公以楚師伐齊取榖按本例云公恃逺國之師以伐甥舅之國而取其邑致怨之道故不月以見譏公至自伐齊二十有七年春杞子來朝夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入把春接其君秋入其國以内為過于把無譏冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戌公會諸侯盟于宋是時齊桓既没楚人肆横執宋公伐宋國敗宋師獻宋㨗圍宋邑不道於宋已甚今又圍宋宋之盟猶薄之盟爾二十有八年春晉侯侵曹晉侯伐衞公子買戍衞不卒戍刺之按本例云刺大夫例日謹有罪也以罪刺者不言其事言其事者有託也故不日以見譏楚人救衞三月丙午晉侯入曹執曹伯畀宋人按本例云晉文於是失正矣故加日以見譏夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚殺其大夫得臣衞侯出奔楚五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土按本例云晉文始覇也桓文之盟不日以著其信則此何以日為下公朝于王所當日也加日於上知既盟而朝同在癸丑之日耳陳侯如會公朝于王所六月衞侯鄭自楚復歸于衞衞元咺出奔晉陳侯欵卒秋把伯姬來公子遂如齊冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温天王狩于河陽壬申公朝于王所河陽之會三家皆謂再致天王似誤矣温之會天王未嘗與自為河陽之狩耳何以言之彼踐土之盟加朝之日於盟之上知既盟而朝同在癸丑之日則王在踐土明矣此則先書温之會又書狩于河陽然後書壬申朝于王所三者似異日則温之會天王不在温亦明矣然河陽逺矣王適以諸侯會温之時而遽為河陽之狩是王實欲會諸侯假狩之名以行爾温者河陽之地也於諸侯會以其邑言於天子狩以其地言晉文行覇帥諸侯朝王以尊周室春秋予之此所以志公之朝也按本例云有日無月葢月闕又黄震日抄云召王者左氏之言下勞者後世之說以經文為正則諸侯之會在温天子之狩在河陽諸侯既會而復以壬申日朝于王所其事不過如此若王室微諸侯强天王因出狩而就見其迹亦曉然可知也晉人執衞侯歸之于京師衞元咺自晉復歸于衞諸侯遂圍許曹伯襄復歸于曹遂會諸侯圍許二十有九年春介葛盧來公至自圍許夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉秋大雨雹冬介葛盧來三十年春王正月夏狄侵齊秋衞殺其大夫元咺及公子瑕衞侯鄭歸于衞晉人秦人圍鄭鄭不會翟泉之盟時秦晉方睦故相與圍之按黄震日抄云諸家多據左傳謂晉文舊嘗過鄭鄭無禮而報怨考踐土與温之會鄭伯皆在豈至是始責舊怨哉介人侵蕭冬天王使宰周公來聘公子遂如京師遂如晉三十有一年春取濟西田公子遂如晉夏四月四卜郊不從乃免牲猶三望秋七月冬把伯姬來求婦狄圍衞十有二月衞遷于帝丘三十有二年春王正月夏四月己丑鄭伯㨗卒衞人侵狄秋衞人及狄盟冬十有二月己卯晉侯重耳卒三十有三年春王二月秦人入滑齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師于殽癸巳葬晉文公狄侵齊公伐邾取訾婁秋公子遂帥師伐邾晉人敗狄于箕冬十月公如齊十有二月公至自齊乙巳公薨于小寢隕霜不殺草李梅實晉人陳人鄭人伐許
