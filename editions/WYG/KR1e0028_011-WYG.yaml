body:
  text: 春秋經解卷十一宋崔子方撰定公元年春王諸公之元年雖無事必舉正月言人君即位之始王者必班正焉諸侯奉之以從事也當是時季氏專魯昭公逐死而定公未立故無所班其正魯無以奉之所以獨不舉正月也雖然周室之衰豈能果班正於諸侯而春秋書之如此何也嗚呼春秋亦正名而已矣三月晉人執宋仲幾于京師此城成周之大夫也仲㡬之罪不受功也其言于京師何見執之于天子之側也大夫而執人于天子之側見大夫之張矣凡事必繼月月必繼王定無正故不得不以三月繼王也夏六月癸亥公之喪至自乾侯其君旅死於外羣臣將恐懼奔走之不暇今乃七月而後以喪至則魯之羣臣所以事其君者可知矣戊辰公即位諸公踰年正月不日而即位追治之也定公六月日而即位書其實也盖於是定公始得立矣則季氏之專國可知也即位例日秋七月癸巳葬我君昭公九月大雩立煬宫立煬宫非所宜立也有禱而後立之者也故不日以見譏冬十月隕霜殺菽夏之八月未可以霜而且殺菽志災也二年春王正月夏五月壬辰雉門及兩觀災秋楚人伐吳冬十月新作雉門及兩觀及者先後之辭也其月志其工近也按本例云兩觀之僭乆矣今復作之故目事以見譏而加月也三年春王正月公如晉至河乃復昭公如晉至河乃復則略而不月定公如晉至河乃復則月而不略何也昭公之不得入于晉亦已數矣定公之不入容有故焉二月辛卯邾子穿卒夏四月秋葬邾荘公冬仲孫何忌及邾子盟于拔四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之諸侯侵楚而蔡公孫姓於其間滅沈盖諸侯為蔡侵楚故蔡得以滅沈也沈楚之與國殺沈子嘉所以致怨于楚也夫欲怒楚而滅人之國殺人之君以蔡為罪矣五月公及諸侯盟于􅆏鼬是盟也公為之故曰公及諸侯也諸侯為蔡以侵楚然卒不能害楚使蔡去中夏而即楚以吳子及楚人戰是以􅆏鼬之盟不日亦不與同所以譏諸侯之無能為故也杞伯成卒于㑹六月葬陳惠公許遷于容城秋七月公至自㑹劉卷卒劉卷盖劉子也新有同盟之好故來赴而卒之然則何以不稱劉子天子之大夫王命赴之不以爵稱也葬把悼公楚人圍蔡報召陵之役也諸侯並侵楚而楚獨圍蔡知諸侯之侵楚為蔡明矣晉士鞅衛孔圉帥師伐鮮虞𦵏劉文公天子之大夫未有書𦵏者以其來赴也故往㑹而𦵏之冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績吳子夷也有憂中國之心而能為蔡侯之故以與楚人戰故曰蔡侯以吳子及楚人戰于柏舉以吳子吳無利於伐楚矣進吳子也是楚囊瓦而曰人大夫不敵君進吳子也進吳子所以傷中國之亡也晋為盟主因天子之大夫以合十七國之諸侯逺至召陵而不能為蔡釋怨于楚曽吳子之不若進吳子所以傷中國之亡也楚囊瓦出奔鄭柏舉之敗囊瓦為之也庚辰吳入郢郢楚都也不曰入楚而曰入郢見吳之入楚者甚矣且楚於是時特為大國而吳得入焉故變例而言日變國而言都所以甚吳而重楚禍云爾五年春王三月辛亥朔日有食之夏歸粟于蔡於越入吳六月丙申季孫意如卒秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸二月公侵鄭公侵鄭為許也皋鼬之盟故也公至自侵鄭夏季孫斯仲孫何忌如晉秋晉人執宋行人樂祁犂冬城中城季孫斯仲孫忌帥師圍鄆鄆本魯邑先是齊人取之以居昭公故今猶未入乎魯也不言何忌闕文七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衞行人北宫結以侵衛其言以侵衛何執北宫結而與之俱也齊侯衛侯盟于沙大雩齊國夏帥師伐我西鄙為鄆之役也齊人取鄆以居昭公其後鄆潰然而齊未嘗有鄆也今魯圍鄆而齊出師見齊之不直矣九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊公侵齊報國夏之師也以齊師為不直故公雖連月而兩興師猶不譏焉三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦晉師之出為齊伐我故公往㑹之不正以公侯之尊而㑹晉人之師故不月以見譏公至自瓦㣲者之㑹例不致此其致何也重師也師以衆致地以特致此春秋之新例矣秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛葬曹靖公九月葬陳懐公季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮從祀先公從祀先公何以書所以誅陽虎之亂見陪臣執國命也是盖魯禮之復正者而知其誅陽虎之亂何也當是時魯國之政季氏專之季氏之室陽虎有之魯之君臣拱手聼命無敢誰何此孔子所以嘆陪臣執國命而知三桓之子孫㣲也彼陽虎所以能濟其謀者必有所挾也因人之所欲者而假譽焉盖自文公以來魯之逆把乆矣舉國之人皆欲去之然百餘年之間莫㦯修正而改為及陽虎為政一旦而去之彼自謂足以借譽於國人而取恱乎先君也於是遂肆其亂及其不克乃竊夫寳玉大弓而逃焉不然彼陽虎方且迫於為亂而魯之君臣方且謀虎之不暇何暇修百年乆失之禮而正之哉其事盖可知矣夫宗廟之事禮之大者而春秋所書莫詳焉著其日於上書其事於下盖以為禮之大者不敢以畧故也八月丁卯大事于大廟躋僖公夫禮之甚者彼如此其詳也從祀先公得禮之大者此如此其畧也然則聖人之意可知矣盖曰其所有事者無足道焉吾志其從祀而已書從祀先公繼之以盗竊寳玉大弓所以具見當時之事使後世可考而知焉傳曰陽虎欲去三桓而已更孟氏故順祀先公而祈焉禘于僖公其事則信矣然而聖人之意盖沒而不見也嗚呼千載之下奸偽之迹禍亂之變彼得假托以濟私者豈特一陽虎哉宜聖人之丁寧如此盜竊寳玉大弓春秋書盜有二義有不得其人而稱之者曰盜盜殺蔡侯申之類是也有以非其有而取之曰盜盜竊寳玉大弓是也此陽虎也而以盜言之陽虎之賤不載於春秋九年春王正月夏四月戊申鄭伯蠆卒得寳玉大弓不索而獲曰得此魯之分器陽虎無所用故復歸之也魯固知陽虎之竊寳玉大弓矣然而畏虎幸虎之去雖亡其寳而不敢索也使不知為陽虎所竊而疑於他盜耶則豈有亡其國之分器而不索者哉此知為陽虎明矣六月葬鄭獻公秋齊侯衛侯次于五氏魯于齊衛皆有侵伐之怨故二君次于五氏以謀我也秦伯卒冬葬秦哀公十年春王三月及齊平及者内欲之也畏五氏之謀故欲與齊平既平然後為夾谷之㑹矣齊魯比年有侵伐之怨而不直者在齊魯實畏齊而求齊平齊之平强矣故月以見之於平齊則月之於㑹則不月故凡春秋變例以為言者皆以示譏明矣夏公㑹齊侯于夾谷夾谷之㑹齊人伏兵以刼魯侯賴孔子為相而謀不行然則是㑹也亦殆矣故不月以見譏然後知齊之不欲平明矣公至自夾谷晉趙鞅帥師圍衛齊人來歸鄆讙龜隂田夾谷之㑹孔子相焉齊人畏魯歸其侵疆此所以得鄆讙龜隂田也鄆讙二邑與龜隂之田叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈内邑而圍之盖恃大而不聽此十二年所以堕郈也二卿復圍郈則恃大而不聽可知矣宋樂大心出奔曹宋公子地出奔陳冬齊侯衛侯鄭游速㑹于安甫叔孫州仇如齊宋公之弟辰暨仲佗石彄出奔陳言暨見辰之不得已也三臣之奔則何以不月辰非卿也且辰之出强矣十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夫人之從惡之易也辰之奔迫于仲佗石彄之故今其叛也則辰之自為矣故始曰暨而終曰及辰之惡猶未及乎段之為惡也夏四月秋宋樂大心自曹入于蕭冬及鄭平叔還如鄭涖盟内欲平也平六年侵鄭之怨既平然後叔還如鄭涖盟矣十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師堕郈衛公孟彄帥師伐曹季孫斯仲孫何忌帥師堕費郈叔孫氏之邑費季氏之邑城之不度將為國害故堕之也夫二邑二家恃以為保障而肯堕之何也不得已也盖仲由為季氏宰欲張公室而後堕之夫以二家之所恃以為固者而乃不能奪之于仲由見陪臣之執國命矣是以冉有子路相季氏而欲伐顓臾孔子誨之既而發陪臣執國命三世希不失之歎也秋大雩冬十月癸亥公㑹齊侯盟于黄十有一月丙寅朔日有食之公至自黄十有二月公圍成傳曰仲由為季氏宰将堕三都于是叔孫氏堕郈季氏堕費孟氏将堕成而其臣不欲然則成孟氏之邑其弗堕然後公圍之也昭圍成則不月以見譏定圍成則不譏何也圍成則一而所以圍成則異矣公至自圍成内地而致何也見孟氏之强與國為敵公室㣲弱不能制其臣而有其地視成猶外邑也故致公之行以見于内亦危矣昭公圍成亦危則不致何也成在内而鄆在外不以外致内也十有三年春齊侯衛侯次于垂葭夏築蛇淵囿農事方盛而築囿譏也大蒐于比蒲以周之夏當夏之春于是時可以蒐矣而書何也先築囿繼之以大蒐則志在乎從禽而不恤乎國事可知也或言蒐或言大蒐以大書者越常禮矣夫不恤國事而越禮大蒐此春秋所以為譏也衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉趙鞅以晋陽叛而言歸何也見趙鞅雖以邑叛其君不能討反而不失其所焉則昭定之間君弱而臣强豈獨魯國哉是以終于三桓據魯六卿分晋其禍所由來漸矣夫春秋歸入之例雖紀當時之實然而褒貶之意亦具見于其間也薛弑其君比春秋以國弑君者四而三在吳莒薛吳莒薛固無大夫知其為㣲者明矣十有四年春衛公叔戍來奔衞趙陽出奔宋二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸夏衛北宫結來奔五月於越敗吳于檇李吳子光卒吳夷也爵不見于春秋于其有善則進之然而書吳子卒何也欲有所見也是時吳楚僣號以逼天子春秋惡之故不書其葬難言之也書楚卒者六書其弑者二書吳卒者四書其弑者二一皆不𦵏焉然後知其不𦵏者有故也非如他國有𦵏有不𦵏者也春秋不疑于後世如此公㑹齊侯衛侯于牽公至自㑹秋齊侯宋公㑹于洮天王使石尚來歸脤按本例云周官歸脤以交諸侯之福則王使歸脤盖可也用見周之交魯之禮厚而魯所以事周之禮薄上下皆失之矣故不月以見譏與來聘不月同例衛世子蒯聵出奔宋衛公孟彄出奔鄭宋公之弟辰自蕭來奔大蒐于比蒲邾子來㑹公㑹公于比蒲也然則蒐于比蒲何以不言公凡蒐狩固非㣲者之事雖不言公公在焉可知也則公狩于郎公觀魚于棠知其獨行而不與國人共之明矣且公在是而不月志凡以見譏故也蒐狩皆内地故於公之行未有致者城莒父及霄十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛所傷者衆不可以一舉也牛雖不死亦改卜矣二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊五月而郊不時明矣猶異乎九月之用郊也壬申公薨于髙寢鄭罕逹帥師伐宋齊侯衛侯次于渠蒢邾子來奔喪諸侯奔喪天子之禮也譏僣也魯邾皆罪矣秋七月壬申姒氏卒八月庚辰朔日有食之九月滕子來㑹𦵏丁巳𦵏我君定公雨不克𦵏戊午日下昃乃克葬彼言日中而克𦵏此言日下昃乃克𦵏日下昃則僅及乎𦵏爾其難明矣辛巳𦵏定姒定姒哀公之母而定公之妾也哀公即位未踰年未成為君故其母雖書卒𦵏而不稱夫人小君使定公在自以妾不書卒𦵏使哀公即位踰年自尊其母為夫人而以夫人之禮卒𦵏也雖然于禮妾母不得稱夫人凡稱夫人者春秋盡其辭焉以見譏也僖公之成風宣公之敬嬴是也哀姜莊公之夫人則成風其妾也出姜文公之夫人則敬嬴其妾也明矣冬城漆
