body:
  text: 後序或問曰春秋以日月為例信乎何其擾擾紛亂而不可合也應之曰子考之春秋而疑之耶抑將用傳者之説而後疑之也苟用傳者之説是宜擾擾紛亂而不可合矣左氏不著日月之例獨於公子益師卒則著之曰公不與小斂故不書日彼蓋不知經於他事皆以日月為例惟於崩薨卒葬與諸侯之弑者則不著例焉蓋以為人之善惡必見於其行事則亦無事於死而後為之褒貶也彼弑君父天下之大惡矣於春秋之文無所貶以為其惡不貶而自見又奚區區以日月例為哉故自天子崩公薨大夫卒内夫人内女卒中國夷狄之弑君與凡書葬者必從而日焉其尊卑外内輕重大小一皆同之凡以見其不為例焉爾若夫赴告之不備史氏之闕遺然後吾從而闕之不嫌也由是言之左氏考聖人之例亦太疎畧矣彼二傳知日月之例然亦不知崩葬卒薨與弑君之無例也則又强為之説是以其辭至於乖亂而不可信矣或者又曰然則春秋於他事闕日月者少而於卒葬之事闕日月者獨多何耶應之曰凡卒葬之事見於經者幾且三百最多而繁也且又一國之事其來赴之辭一有不備則日月之失史氏遂不可得而書矣若夫其他會盟戰敗入滅之類見於經者大抵不過數十而又非一國之事其來赴者諸國所與有事焉者皆至焉然後可參證而得日月之詳也且嘗謂春秋獨於此不以日月為例者豈以其多闕而後不可為例乎以事言之則如此以理考之又如彼二者其將有得於聖人之意也且夫史氏之記事有常體矣其書必曰某時某月某日某事矣其失日月者則闕之亦必曰是闕日月者也惟聖人修經然後立例焉蓋曰天下有内外國家有大小位有尊卑事有輕重不可得而齊也是故詳中夏而畧夷狄詳大國而畧小國詳内而畧外詳君而畧臣詳所重而畧所輕此春秋之意而日月之例所從生也著日以為詳著時以為畧又有詳畧之中則著月焉此其常也其有當畧而詳與當詳而畧者聖人豈徒為是之紛紛哉蓋有寓於其間而後云爾也故有當日而不日者如公敗齊師于長勺公敗宋師于乘丘禘于太廟用致夫人公子憖出奔齊公及邾儀父盟于蔑公及齊大夫盟于蔇之類是也有不當日而日者如衞侯衎復歸于衞衞侯出奔齊呉入郢公子遂及齊侯盟于郪丘仲孫速會莒人盟于向宋衞陳鄭灾取郜取防之類是也有當月而不月者如臧孫許及晉侯盟于赤棘仲孫何忌及邾子盟于拔按原本作句繹誤蓋句繹之盟不但書月且加日也今改正許凡三遷楚人滅江楚人滅黄呉滅巢滅項公如齊納幣觀社逆女公如晉至河乃復之類是也又有不當月而月者如宋人執滕子嬰齊宋司馬華孫來盟郕伯來奔宋人及楚人平城楚丘取鄫取鄆之類是也至於事有同日而後事屬先事則于先事加日焉如甲午宋灾宋伯姬卒之類是也又有兩事皆當日先事故不日則後事亦不復日如夫人姜氏孫于邾公子慶父出奔莒之類是也其事有同月先事不當月而後事當月則於先事月之如王二月莒人伐杞取牟婁戊申衞州吁弑其君完秋九月楚子圍宋葬曹文公之類是也又有兩事先事當月固自書月後事故不月雖繼月不嫌也如自正月不雨至于秋七月及蘇子盟于女栗正月諸侯盟于祝柯公至自伐齊之類是也又如兩事先事故不月後事雖當月亦不復月不嫌也如春公至自齊祭叔來聘秋公子結媵陳人之婦于鄄遂及齊侯宋公盟夫人姜氏如莒之類是也其有事實異日而嫌於同日則各著日以别之如壬午公子遂會晉趙盾盟于衡雍乙酉公子遂會雒戎盟于暴癸酉大雨震電庚寅大雨雪之類是也有事實同日而嫌於異日則先著日以見之如甲寅齊人伐衞衞人及齊人戰庚申莒潰楚人入鄆之類是也有事不當日以書晦朔則不得不日如己卯晦震夷伯之廟戊申朔隕石于宋五之類是也有一事而再見者其於日月先畧而後詳如冬公如晉十二月己丑公及晉侯盟冬會諸侯伐鄭十二月己亥同盟于戲之類是也有以後事之例證先事者如夏四月甲寅臧孫許卒繼之以公如晉則疑於公如例月者也然於下書秋公至自晉則知公如晉是不月者矣有以先事之例證後事者如夏五月甲午遂滅偪陽繼之以公至自會則疑於公至例月者也然先書春公會晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會呉于柤則知公至是不月者矣考日月之例至於此見聖人之用心其謹且嚴而可畏也彼曰無例云者是未嘗深考乎春秋之例者也使其深考乎春秋之例則亦不遽云爾矣雖然春秋之闕日月者固有之如桓之四年七年無秋冬定十四年無冬桓十四年書夏五而闕其月莊二十二年書夏五月而闕其事僖二十八年書壬申而不繫之月桓十七年書五月而不繫之夏昭十年書十二月而不繫之冬郭公仲孫忌與凡日食而不繫朔與日者皆闕也彼傳者又以為從史之闕文則近於無功故不得不為異説以附之使聖人之㫖汨亂而不可考者諸儒好異之罪也嗟夫不信史之闕文以求聖人之意是猶航斷塹之水而欲至于海亦不可得矣盍亦避礙而通諸理乎左氏之畧也公羊穀梁之鑿也持是三者以考春秋適足以多惑而已矣故余撮其大槩而論之附于卷末使學者得從事焉
