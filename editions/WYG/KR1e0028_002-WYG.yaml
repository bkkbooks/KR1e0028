body:
  text: 春秋經解卷二宋崔子方撰桓公元年春王正月公即位春秋之例繼弑君不言即位蓋曰先君居是位也不得以其道終則已不忍即其位焉爾桓繼弑而即位何也桓弟弑兄臣弑君奪其位而有之則亦無事於不忍矣春秋從而書之以見其意且春秋賤桓於桓之事未有譏焉書即位見其大者不治故也三月公會鄭伯于垂鄭伯以璧假許田其曰假當時之辭也是知其不可而為之者然春秋不正其名何也夫以物當物是易矣豈曰假之云乎春秋於桓無譏直書其事而義自見焉何言乎許田蓋許國之田而在魯者耳隱公之季年與鄭伯入許而逐其君當是時宜有分田焉故在魯者猶謂之許田也鄭人欲修其封疆則魯之許田固鄭人之所欲矣如此而後得其實而三家之説則謂非以璧假田也鄭以泰山之祊而易魯朝宿之邑也天子在上諸侯不得以地相與故為之諱而以璧假為文又非許田諱取周田而繋之許也嗟夫春秋之作所以明當時之是非著褒貶而代賞罰以懲勸於後世今以國惡之故而為之諱乃詭其事而没其實使是非不明褒貶不著而後世不知賞罰之所在而不為之懲勸豈聖人之心哉且凡春秋之所為諱者必將有見也或以其辭而見之或以他事而見之未有沒其實焉故善觀春秋者以情度當世之事以理逆聖人之言未有不得者也按章如愚山堂考索引林氏云文武子孫孰非有功而親者安得皆有朝宿湯沐之邑蓋祊近魯故鄭莊來歸以結魯許田魯隱伐許所得故乘魯桓簒立而脅取之也意蓋本此夏四月丁未公及鄭伯盟于越秋大水冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父孔父字也何以不名當時之辭也蓋孔父擅貴而專國國人稱之不敢以名而以字云爾故春秋因之以見其事焉惟其擅貴而專國此督弑君而遂及孔父也滕子來朝按本例云桓弑逆之人諸侯所共惡今滕子實始修禮而朝事之故加月以見譏三月公㑹齊侯陳侯鄭伯于稷以成宋亂成猶平也與周官調人以民成之之成同義其言以成宋亂何辭不必言以而加以焉偽辭也當時之辭也且㑹于薄釋宋公次于聶北救邢皆不言以此獨言以者知其為偽也夫桓公之不肖知宋之亂姦臣懼討公觀釁而動兾得所利故與齊陳鄭為稷之㑹而謀之病其無名乃曰吾為此㑹用之平宋亂而已三月而為㑹四月而取鼎其間於宋之事未有與焉然則斯㑹以平宋亂為名而志在于得賂矣書以成宋亂于上書取郜大鼎于下則貪偽之迹較然不疑豈假吾譏貶之文而後見之㢤是以孔子因當時之辭而直書之以不没其實焉與書以俟陳人蔡人同意夏四月取郜大鼎于宋戊申納于大廟桓無譏亦直書其事而已宗廟之事故以日志也秋七月杞侯來朝桓之不肖弑君自立固宜諸侯所疾也把侯乃屈體而朝焉豈小事大有所不得已與然又不能盡禮以事之輕侮不肖之人自取兵入之禍以杞侯為過矣桓無譏譏其與桓者而已不月入把而月把侯之朝凡以見譏故也按下文入把實書月此云不月誤蔡侯鄭伯㑹于鄧九月入把傳曰入把討不敬是也彼有以自取之矣譏在杞侯也猶衛師入郕宋人衛人入鄭譏在郕鄭也是不月者也春秋以例見者不疑矣且春秋有所謂大國者晉宋齊秦之屬是也有所謂次國者陳蔡衛鄭之屬是也有所謂小國者曹許邾杞之屬是也又有所謂附庸㣲國者向極鄫鄅之屬是也故春秋之例於小國則畧於次國則詳於大國益詳而於附庸㣲國則益略獨於其事之尤重然後詳焉以為有國者之禍莫重於入㓕故小國與㣲國之入滅例皆月凡以著其重也公及戎盟于唐冬公至自唐凡公行致者臣子之辭也殆其往而喜其反故觀其致之疏數則時之盛衰君之賢否可考而知矣隱之不致者例也桓之不致者故也何則當春秋之始天下未至於甚敗亂魯猶有周公之遺徳而隱又賢君其行不至於甚危其臣子以為安故隱凡十一出而未有致者至桓之不肖内行簒弑之禍天子不能討諸侯不能禁肆然不忌數出為㑹假田受賂背盟助簒親不類之人叛天子之命其行皆甚惡未有一不可致者也然其不致者可知矣蓋曰桓弟弑兄臣弑君而立乎其位危莫甚焉則其餘莫足致也且以為其義不足以臣子致焉爾雖然非事君親之義故以其甚危者三而致之以教後世為臣子者不可以惡逆絶其君父也是以莫危於背中國而親外裔伐正而助簒逆與入人之國而見殺故此與戎盟則致十六年伐鄭則致十八年喪至自齊則致也見臣子以是為懼矣桓與戎盟固罪也則致隱與戎盟亦罪也則不致春秋賤桓故以不致隱者而致桓然後知桓之行皆在所致其不致者故也春秋之義不嫌同辭故隱以不致為美桓以不致為惡也善觀春秋者亦深考其志而已矣其致何以不月蓋其盟也略則其致也亦畧春秋之例也按本例云内地例不致其致者例不月文十七年至自榖定十年至自圍成是也唐内地三年春正月公㑹齊侯于嬴夏齊侯衛侯胥命于蒲其曰胥命何蓋相命也古者朝覲宗遇㑹盟之禮皆同於王及周之衰諸侯强大國自為政上無所出命下無所禀令㑹遇不同於王盟約各私其國於是有相見郤地之㑹未及期相見之遇涖牲㰱血之盟皆非先王之制也然猶有主其事者故春秋因而為之法凡㑹者外為主及者内為主如曰公㑹某侯于某彼欲㑹也彼為主焉如曰公及某侯㑹于某我欲㑹也我為主焉則主者制命而主之者聽命今曰胥命于蒲則齊侯衛侯失賓主之道也蓋二君者不能相下莫適為主㑹遇之禮不修盟約之好不講苟然以事相命而已是匹夫之行也故春秋志之以見譏焉六月公㑹把侯于郕秋七月壬辰朔日有食之既公子翬如齊逆女三家皆謂翬與桓弑隱者也于春秋有見焉故翬兩見于隱之篇而皆貶其族是也蓋曰是隱之罪人耳夫弑君之罪終不可赦今于此則稱公子何也蓋桓公與之同惡不以為罪反親任之使出聘逆女故文無所貶而義自見焉夫春秋于桓無譏則與之同惡者亦不譏矣蓋不譏所以深惡之也春秋之例逆夫人例月以為國之重事惟不正其使大夫逆然後不月以見譏然則公子翬之逆女例不月也九月齊侯送姜氏于讙諸侯非民事不越境而齊侯送姜氏于讙見齊侯之失正矣讙魯地公㑹齊侯于讙夫人姜氏至自齊翬之逆女其反也不以翬致何也夫人得見乎公矣致夫人而已是以知公㑹齊侯于讙為受夫人也冬齊侯使其弟年來聘有年書有年書大有年書饑書大饑此繫有國者憂喜而書也有年以僅喜而書大有年以甚喜而書則饑以僅憂而書大饑以甚憂而書也凡人之于喜也緩其于憂也迫聖人之書辭亦如之五榖皆熟書有年有是年也蓋人有食然後能保其天年故其書辭也亦緩五榖不登而書饑饑者㡬也蓋人之饑則死矣故其書辭也迫君子于其言無所苟如此四年春正月公狩于郎隱公觀魚于棠則不月以見譏桓公狩于郎則猶月何也桓無譏直書其事而義自見矣夏天王使宰渠伯糾來聘其曰宰渠伯糾何也宰官渠國伯爵糾名也是天子之卿而為冢宰者也冢宰統乎政事通命于四海今且下聘諸侯失其職矣與稱宰周公同義又天子之卿未有名者夫桓之罪天子所當誅而冢宰得行其事者也今固不能而又躬來聘之以糾為罪矣故名以惡之且桓無譏譏其與桓者而已春秋譏杞侯來朝與伯糾來聘其餘朝聘則不譏何也朝聘或有國事不得巳者春秋亦譏其可譏者而已無秋冬蓋闕也其諸類此五年春正月甲戌己丑陳侯鮑卒甲戌之下或有他事史之闕文不可復補故孔子存之以見史氏之闕遺而傳信於後世故曰吾猶及史之闕文也而傳以為陳亂而再赴然則是魯史之舊文魯史當時所聞見必審擇而書之豈敢著兩日之例哉且三年七月稱壬辰朔推而數之則甲戌當是四年十二月二十一二而已丑當是此年正月六七假如再赴自當以兩月書則知其不然也然則甲戌日誤而事闕明矣聖人欲傳信於後世如此夏齊侯鄭伯如紀外相如不書此以起齊之滅紀也夫齊鄭大國而乃朝于紀此其意欲以窺紀明矣傳曰齊侯鄭伯朝于紀欲以襲之是也天王使仍叔之子來聘武氏不言之子仍叔言之子何也曰武氏子知其為武氏之子也曰仍叔子則未知其為仍叔之子也故加之焉以見之其曰仍叔之子何父老子代從政也其子不名非天子之命士不以名通也春秋以是為譏矣葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭此王伐鄭而三國從也其不首王伐鄭何也以天王之尊而從三國之㣲者伐鄭春秋之所不與故以略言之也其曰蔡人衛人陳人從王伐鄭於王略辭也又不月王之行所以見譏焉爾大雩春秋祭祀之事或書或不書何也蓋常事不書非常則書有所譏焉則書與變而合於禮則書書大雩者二十一以非常而書也論語稱暮春者春服既成風乎舞雩謂建辰之月也傳稱龍見而雩蓋蒼龍之宿昏見東方謂建已之月也三月四月春夏之交萬物始茂待雨而長故噫嘻之詩序云春夏祈穀於上帝是也夏之三月四月周之五月六月也故春秋未有書五月六月而雩者蓋常事不書故也螽冬州公如曹為天子之三公者也外相如不書此為下寔來起也六年春正月寔來寔猶是也言州公如曹是欲來魯故也不再言州公承上文間無異事不疑矣不正其妄交諸侯故月之以見譏按本例云州公自曹猶以好來于我故書來然以月志則其來奔不疑矣夏四月公㑹紀侯于成秋八月壬午大閲蔡人殺陳佗其曰殺陳佗討賊之辭也佗弑君者也與齊人殺無知衛人殺州吁同例不直曰佗而曰陳佗以蔡人殺之不得不舉國也春秋以弑君之辭討賊而傳者謂佗殺太子免似誤矣弑君何以不書陳不以赴魯史不記春秋不得而書焉詩春秋皆傳當時之事相為表裏墓門之詩序曰陳佗不義惡加於萬民夫一人之惡而加于萬民也非弑君而何按陳佗弑君之説三傳及諸儒皆無之崔氏亦以例决之耳九月丁卯子同生猗嗟之詩存則子同生之義可考而知也冬紀侯來朝傳曰紀侯來朝請王命以求成于齊是也七年春二月已亥焚咸丘咸丘魯邑内叛不聽故焚之也然其為虐已甚故日之以見譏夏穀伯綏來朝鄧侯吾離來朝諸侯失地則名榖伯鄧侯蓋失地之君也其言朝何彼以朝禮來我不得不與之朝也八年春正月己卯烝天王使家父來聘夏五月丁丑烝礿祠烝嘗之祭見於經者惟烝嘗而不及礿祠郊社之祭見於經者惟郊而不及社故知常事不書有所譏焉則書故也春烝矣夏又烝其以譏亟明矣秋伐邾冬十月雨雪周之十月夏之八月而雨雪志異也祭公來遂逆王后于紀是蓋紀迫齊人之難􅁆來諮謀於魯魯為之求納女於王以結王援故祭公逆王后而先至於魯也其曰祭公來遂逆王后于紀以見魯實主其事云爾然則何以不稱使祭公受命逆王后而因至乎魯也九年春紀季姜歸于京師逆曰王后自天子之辭言之歸曰季姜自紀之辭言之王后之行何以不月自紀言之故略也夏四月秋七月冬曹伯使其世子射姑來朝周禮諸侯之世子誓於天子則下其君禮一等未誓則以皮帛繼子男則世子射姑用朝禮可也春秋于文無譏焉十年春王正月庚申曹伯終生卒夏五月葬曹桓公按本例云僣禮而葬者加月以見譏也小國之葬例時春秋變例者九而四在曹蓋曹之出㑹序盟常居鄭衛之後邾滕之前以為次國則不足以為小國則其尤也故例與小國差異宜其僣禮者獨多也不然曹固得從次國例耶按此與經解卒葬不著例違異秋公㑹衛侯于桃丘弗遇其曰弗遇何衛侯約㑹而意變故不欲㑹公也與齊侯弗及盟同意公㑹例月其不月不成為㑹也桓之㑹獨于此不月蓋亦以例言之冬十有二月丙午齊侯衛侯鄭伯來戰于郎彼欲戰也不約而來戰不約之戰罪矣郎魯地十有一年春正月齊人衛人鄭人盟于惡曹是齊侯衛侯鄭伯也彼三國恃强陵我不約而來戰又復同盟以固其惡春秋惡焉故貶而人之然不於其來戰貶何也欲見稱人以盟者實諸侯也且外人盟例時此加月焉然後三君之貶不疑矣夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲祭仲字也當時之辭也春秋有因當時之辭以見褒貶者多矣稱字之例如紀子帛宋孔父子哀華孫之徒是也蓋祭仲實鄭之權臣擅貴而專國國人稱之不敢以名而以字云爾彼以字赴史以字書春秋因其實以見罪焉夫能出君而納不正如反手之易則祭仲之權可知也而傳者謂春秋書字以為褒誤矣彼獨不因其事以觀之乎夫突宋出也宋人之所欲立宋以為不得祭仲則忽不可出而突不得立故執祭仲以要之仲不能以已殉國守節而死難於是廢正立庶徇人之私彼其得罪宜何如則無為稱字以褒之也故知因當時之辭以見惡明矣善觀春秋者因事以考聖人之辭因辭以推當時之事則事可以無疑而辭可以不惑矣突歸于鄭突不稱公子見其不當立也不冠以國見挈乎祭仲也其言歸何得其所也此宋奉之則何以不言自宋歸先書宋人執鄭祭仲繼之以突歸于鄭則宋有奉焉可知矣且祭仲為之援則何以不言復歸仲在外也見仲之脅乎宋也鄭忽出奔衛忽已立矣何以不稱鄭伯未踰年之君不以爵稱也衛侯為孫林父所逐則不名以臣逐君天下之大惡故不以罪君而長亂臣也鄭忽見逐於祭仲則名之何也忽不稱爵又不書名則莫知其為忽矣故春秋之例欲有所見者不嫌也然則何以不稱鄭子以見未踰年而失位者不成為君爾柔㑹宋公陳侯蔡叔盟于折蔡叔蔡侯之弟也蓋蔡侯無子立其母弟以繼世者耳使直書曰某侯之弟則不見其繼世直書曰世子則不見其為弟故變文而謂之叔以見之凡書某侯之弟者繼君之弟也今曰某叔是繼國之辭矣與書某世子同義然則何以不名名之則將書曰蔡叔某稱叔某則於字嫌矣聖人不疑於後世如此陳侯溺卒而招不稱弟鄭伯寤生卒衛侯元卒而忽與蒯聵猶稱世子則弟以繼君而世子以繼國明矣公㑹宋公于夫鍾冬十有二月公㑹宋公于闞十有二年春正月夏六月壬寅公㑹紀侯莒子盟于曲池二傳曰紀侯當從二傳紀侯㑹魯莒以謀齊難故也秋七月丁亥公㑹宋公燕人盟于穀丘八月壬辰陳侯躍卒公㑹宋公于虚冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒十有二月及鄭師伐宋丁未戰于宋孰與戰與宋戰也城下之戰也凡戰未有舉國者舉國而戰知其為城下之戰矣不言敗未及乎敗也傳謂與鄭人不和而戰且明年魯又㑹鄭伯與宋公戰然則魯鄭非不和明矣十有三年春二月公㑹紀侯鄭伯已已及齊侯宋公衞侯燕人戰齊師宋師衛師燕師敗績何以不地于魯也于魯則何以不言來戰來戰者彼欲戰也及者何我欲戰也是役也紀侯之謀也于郎則地而此不地城下之戰也可言戰于宋不可言戰于魯春秋之例將尊師少稱將將卑師衆稱師將卑師少稱人將尊師衆稱某帥師今戰稱人而敗稱師何也凡稱師以敗者甚敗也稱人以敗者未至乎甚敗也不言敗者未敗也外内一辭耳三月葬衛宣公夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹無冰周之正月夏之十一月當是時無冰志異也夏五闕月字又此下當有他事亦闕之蓋來盟例時故知月下有他事也鄭伯使其弟語來盟秋八月壬申御廩災乙亥嘗常事不書壬申御廩災乙亥嘗見以災之餘而事宗廟志不敬也且桓無譏而七年焚咸丘八年烝與此嘗則譏何也於桓躬行之事則不譏於國中之事猶譏焉蓋譏其為國者而已豈以一桓公之故而棄書魯國哉冬十有二月丁巳齊侯禄父卒宋人以齊人蔡人衛人陳人伐鄭四國之人為宋所用也四國無利于伐鄭矣十有五年春二月天王使家父來求車孔子正取假之名於季氏曰君取於臣謂之取今不曰取而曰求知非所取也求之為言未必得之辭也譏在周也以天王之命而下求其譏明矣三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭忽未踰年而失國不成為君故其歸復曰鄭世子且見忽之當立故也其言復歸何内有援也凡言歸者得其所也入者自外入而已未得其所也自某歸入者某有奉焉故也復歸復入者内有援焉故也歸入者外辭也復者内辭也有復之者也其褒貶善惡各隨其事見焉此春秋之例也許叔入于許許叔許君之弟也不曰許男之弟而曰許叔繼國之辭也猶蔡叔之稱爾傳載鄭莊公入許之辭曰奉許叔居許東偏以撫柔此民向使許君有世子自當奉許世子不當奉許叔也則許叔之立而繼世明矣是歸而為君者也然則何以不言歸自隱公之季年三國入許其後歴十四年而許復見於此信傳者之言則鄭固有許矣許叔居于東偏因突忽爭國之亂然後得入于許其始入也豈遂得其所哉此所以不言歸而言入也公㑹齊侯于艾邾人牟人葛人來朝春秋之例天子之㣲者稱人大國之大夫稱人小國之卿亦稱人降而至於四外則其君乃稱人而已牟葛蓋淮夷之國今稱人而來朝知其為君也邾君不能從中國而下同牟葛廢先王之典禮故亦從而外之秋九月鄭伯突入于櫟其曰入未得其所也諸侯出而去國與入而得國者皆名謹之也衛侯入于夷儀不名見未得乎國也鄭伯突入于櫟亦未得國則何以名當是時鄭忽已入而立矣故不得不名突以見之其後突之得國與忽之出亡皆不見何也彼不以告魯史不記春秋不得而書焉冬十有一月公㑹宋公衛侯陳侯于袲伐鄭先㑹而後伐也伐鄭所以納突也然則何以不言納鄭伯突入于櫟矣十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衛侯陳侯蔡侯伐鄭曹之㑹所以謀伐鄭也且陳蔡衛三國數㑹而莫適序何也蓋其㑹則主㑹者為之方是時上無方伯諸侯之㑹莫能相下爭為長雄故其先後不齊如此至二伯之後諸侯少序矣然而亦以國之大小彊弱為等而不正王爵焉故雖侯伯之尊有不得先伯子男者春秋因之以著當時之亂而垂信史於後世至於欲有所見然後聖人之辭見焉秋七月公至自伐鄭桓㑹不致致其甚者也且突始以宋人之故刼鄭而得立又不能守位而出奔今復入櫟以逼鄭其為簒惡已甚公乃與諸侯兩興伐鄭之師以求納突是抑正而助惡也公内弑其君外助人為亂長惡不悛曽不自省以桓之行為危甚故春秋致之見臣子以是為懼矣冬城向十有一月衛侯朔出奔齊十有七年春正月丙辰公㑹齊侯紀侯盟于黄二月丙午公㑹邾儀父盟于趡五月丙午及齊師戰于奚六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡季蓋蔡侯之母弟而繼世者也故封人卒則季歸于蔡而為君矣十一年盟于折曰蔡叔此曰蔡季叔與季皆次也豈兄死而弟及乎而傳者謂凡稱季稱叔者皆字也嘉之也賢之也考其所事未有以取貴於春秋然則何為字之賢而嘉之乎其不然明矣癸已葬蔡桓侯凡諸侯葬稱公者皆僣也惟蔡桓稱侯以葬蓋與其不失禮桓侯之見與則諸公之僣者罪矣及宋人衛人伐邾冬十月朔日有食之不日闕也此天變固無事於褒貶然則春秋之日月固有闕者而傳謂不言日夜食也是亦鑿矣十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊不言及非公意也言與見公寵夫人許其往而與之俱焉爾夏四月丙子公薨于齊丁酉公之喪至自齊隱桓閔皆弑也其不言弑諱之也隱閔之弑以不地而知之今桓公弑于齊則地何也外内辭也于内不地痛之也有所不忍言也于外而地怨也言之以致怨於彼也雖然為之諱必將有見焉莊公不書即位知其繼弑君也喪入則致生而往死而歸莫痛乎其以喪至也秋七月冬十有二月己丑葬我君桓公凡外葬以内往葬為辭内葬以外來葬為辭不直言葬某公而言葬我君某公加我君以見外之來葬也凡弑君不葬而桓葬何也桓弑于外於内未有亂焉猶得其葬焉爾然桓之十八年其不書王者十四何也桓無王也春秋書王蓋以王法治諸侯之事春秋賤桓於桓之事未有致意焉一皆以例而書故其出不譏其至不致書即位以如其意蓋曰是不足以王法治之云爾故去王以見之使其以王法治之耶則桓之罪自當誅絶於春秋當時無王不能治也夫大者不治則其小者烏足治㢤是以出不譏至不致書即位以如其意焉凡以見不以王法治之故也然而四書王者何也元年春王正月公即位此蓋以例而書見其大者不治也二年十年十八年三書王凡桓之篇非獨桓事亦有他諸侯之事存焉故春秋於桓之事不治於諸侯之事則治之不書王者以賤桓其書王者以治諸侯也元年書王以例書為桓也二年書王以正始十年書王以正中十八年書王以正終為諸侯也且春秋不為魯作豈以一桓公之惡而絶天下諸侯㢤
