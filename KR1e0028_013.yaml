body:
  text: 春秋經解附録宋崔子方撰春秋例要春秋之為書辭約而例繁欲其嚴也故其辭約欲其明也故其例繁例者辭之情也然則學者當比例而索辭然後可也例不勝其多故有與為例而疑於義者著之無與為例而不疑於義者不著也其要在是矣嗚呼不知例要而欲知春秋是猶舍舟楫之用而以濟夫川瀆者也繼天曰天王失其所以繼天則直曰王不當位曰王某王在曰王所王之居曰京師非所取曰求遣使需索之謂求王命曰王使某來求非王命則直曰某來求君見曰朝諱朝曰如公朝于外曰如某朝于京師亦曰如某凡如某而不目其事者朝也外諸侯朝曰某侯來朝王在外曰公朝于王所公在外曰某朝公世子朝曰某使其世子某來朝內女與其子俱曰來朝其子諸侯同時俱至兼言之同時異至殊言之諸侯朝而名之者失地之君也相期曰㑹外為志曰㑹某于某公在外而諸侯㑹之曰某㑹公于某公在內而諸侯㑹之曰某來㑹公諸侯已㑹而我後期曰不見公諸侯後期而及于㑹曰如㑹不及㑹曰未見諸侯兩言㑹者主彼而㑹也言㑹又言及者兩主而㑹也言及又言㑹者原注齊桓㑹王世子例按崔氏原文間于發之下引經事以實之然多闕漏今姑仍舊文避不主也涖牲曰盟內為志曰及某盟于某外為志曰㑹某盟于某彼盟于我曰來盟我盟于彼曰蒞盟聘而後盟曰及某盟請與曰乞盟後期曰㑹盟有故不盟曰弗及盟非故不盟曰不與盟有所畏曰逃歸不盟凡盟自五以上言同微者之盟雖五以上不言同言同見非微者也桓文之盟不言同言同者未同也來盟涖盟不地於國也以國地者主國與盟也兩言及者殊盟也適彼曰如凡公適他曰如某夫人適他亦曰如某內大夫以君命出亦曰如某非君命則不曰如某適㑹曰如㑹適師曰如師外相如不書其書者欲有見也於外曰在公居他國曰在反國曰至凡公行各以其事至盟以㑹至離㑹以地至自參以上以㑹至二事偶以大者至二事非偶以後事至內地不至於辭足以知其反者不至有所諱不至出踰年遂行不至夫人之行危甚則至大夫執而公與之俱則不至桓文之㑹有兵車則至由僖之前例不至其至者故也由僖而後例皆至其不至者故也公行不以其事至者欲有見也反彼曰還未至乎國曰還自某凡還者事畢之辭也師還者志其久也又曰始班師之詞譏久役也凡言次者有所之而止于是者也於內先目其所事而後言次于某目其所事而言次于某未得其所事者也目其所事而言遂次于某得其所事者也於內而直言次於某見其不能乎所事者也按此條之首有脫文內為志曰及某救某外為志曰㑹某救某先言救而後言次不以救者也先言次而後言救以救者也救而言至者不及乎救也伐某以救某者權也按此條之首有脫文辭位曰孫公夫人皆曰孫內諱奔也壞聲曰薨公夫人皆曰薨公薨不地故也夫人薨地故也有終曰卒外諸侯曰卒其不卒不赴也內大夫曰卒弒君不卒其後不為大夫不卒內女未嫁卒其歸于諸侯卒歸于大夫不卒王姬由魯嫁則卒外大夫不卒王臣有好于我來赴則卒諸侯卒其封內者地非其內不地在㑹曰卒于㑹在師曰卒于師在他國曰卒于某於桓文之世不言卒于師于㑹者內之也凡諸侯卒名其不名不著乎史也藏死曰葬外葬曰葬某某公內辭也內葬曰葬我君某公葬我小君某氏外辭也禮葬稱侯僣葬稱公其不葬不赴也內弒君不葬吳楚之君不葬內女不為諸侯夫人不葬外大夫不葬惟王臣有好于我來赴則葬諸侯稱爵而葬人譏也輸入曰納納幣於外曰某如某納幣於內曰某使某來納幣凡輸物曰納取女曰逆公親迎曰公如某逆女公至自某夫人某氏入使大夫逆曰某如某逆女某以夫人某氏至自某使大夫逆而夫人先見於公則曰夫人某氏至自某姑逆曰逆婦某于某內女為其子逆曰某姬來逆婦為子謀曰某姬來求婦外大夫為君逆曰某來逆女其自為逆曰某來逆某姬內書某逆王姬某來遂逆王后于某者魯主之也王后非魯主而書逆者譏士逆也夫人謂出曰歸原注夫人姜氏歸于齊內女謂嫁曰歸嫁于諸侯則書歸嫁于大夫不書歸始嫁諸侯其終見出而來歸始亦不書歸始雖不嫁諸侯其終不失有國者始亦書歸始嫁曰某姬歸于某來而復歸曰某某姬歸于某書王姬外女歸者魯主之也內女謂出曰來歸凡曰某姬來歸凡以其罪出曰某人來歸某姬按原本此條有脫文考某人來歸某姬全經止有成十五年齊人來歸子叔姬一事崔氏解云叔姬有罪齊人歸之以致責于我故加月以見譏此文凡以其罪出五字當與下某人來歸某姬連屬則曰某姬來歸之上有佚文明矣內女歸寧曰來凡女已嫁書來而不書歸其不書來而書歸者賢也女來而大夫及之者譏也從嫁曰媵外媵內曰某人來媵內媵外當曰某如某媵按此經文所無崔氏以例推而知之耳其曰某媵某人之婦于某者惡専命也同姓媵禮也異姓媵非禮也臣問曰聘內大夫聘於外曰如某聘於京師亦曰如某凡如某而不目其事者聘也外大夫以君命來曰使某來聘不以君命則直曰來聘進外裔曰某人來聘適及是曰至凡言至者有所之而適及是者也內地直曰至某外地曰至某乃復其言如某不至而復者未及乎國也未及彼而反曰復地而後復者逺也不地而復者未出乎國也凡復者事未畢之辭也繼事曰遂公出踰年不言遂見其非異事不言遂大事遂者惡之也有請曰告糴其曰某告糴于某惡專命也不目罪以刺刺有罪也目罪以刺刺無罪也按此條之首有脫文祀天曰郊有禱而後為之曰用郊繫牛曰牲牲傷曰牛居神曰廟逆上曰躋彼以與我曰歸彼意曰來歸原注鄆歡龜隂田是也我與有意則直曰歸我以與彼曰歸歸物曰歸某于某歸諸侯曰歸某君某于某不索而獲曰得原注得寶玉大弓放火曰焚有建曰立原注立宫立君衆欲立之則曰某人立某非衆欲立則曰某氏立王子某凡書立者不當立也適我曰來凡外有事于我皆曰來王臣非天子命而私覿皆曰來諸侯朝而公在外不得行禮則曰來不與其亟朝亦曰來逺裔之人不能行朝聘亦曰來內以諸侯來曰以某君某來外有所議曰某使某來言其曰實來者是來也內大夫有曰來者外之之辭也內大夫有稱來歸者內之之辭也拘之曰執稱人以執執有罪也稱爵以執執無罪也稱行人以執罪不在行人也執諸侯不名執而以歸者名執外裔之君則名執而與之俱曰執某以伐某執某以侵某國君執而名者弱也大夫執而字者貴也執而舍之曰㑹于某釋某執而置之曰執某舍之于某挾而與歸曰以歸執而歸者曰執某以歸非執而歸者則曰以某歸以歸者名執而以歸者不名歸內夫人之喪而言以歸者內諱也歸之于者决辭也歸于者辭未决也違國曰奔自內曰出奔外相奔亦曰出奔奔我曰來奔以地曰某以某來奔於其國有奉而奔者曰自某奔諸侯出奔者名無罪不名為其臣所逐不名稱官以奔專也稱子以奔貴也稱氏以奔世也入而得其所曰歸內有援焉曰復歸外有奉焉曰自某歸其言自某復歸者外內辭也曰歸自某者志其所自者也諸侯歸者名歸自某者不名歸而未得其所曰入內有援焉曰復入外有奉曰自某入其言自某復入者外內辭也諸侯入而得國者名未得國者不名反之曰復原注復歸復入强入曰納凡言納者不受而强致之謂遂納曰納某于某不遂納曰伐某納某不納曰弗克納納而得國者名未得乎國不名其得國而不名者不著乎史也納而不言納者不與其納也凡興師以送之曰納非專則言自某入自某歸原注莒去疾羣公子召之陳公子黃楚屈建從陳侯圍陳皆不書苟言故則不言所自原注赤歸于曺上言戎侵曹晉欒盈復入于晉下言齊侯遂伐晉潜去曰逃於彼曰逃歸於我曰逃來掠地曰侵潜師入境曰侵外為志曰㑹某侵某先㑹而後侵曰㑹于某侵某外侵內曰侵我某鄙殺人曰伐聲罪致討曰伐內為志曰及某伐某外為志曰㑹某伐某先㑹而後伐曰㑹于某伐某諸侯先伐而我往曰㑹某伐某外伐內曰伐我某鄙伐而言次者未伐也於師亦曰伐於人亦曰伐一人而言伐者見殺其徒也曰某人從王伐某者不以王首伐也破國曰入造其國都曰入內為志曰及某入某伐而後入曰伐某入某俘邑亦曰入其言我入者别外入也亡國曰滅毁其宗廟社稷曰滅㑹而後滅曰㑹于某滅某國滅其君奔者不名國滅以其君歸者名夷狄滅而以歸者亦名國滅而奔其名者罪也邑不言滅邑而言滅者重之也君戰而亡曰滅原注吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅重辭也掩奪曰取悉虜而俘之曰取攬有曰取凡言取者得非其有之稱直取曰某取某師于某伐而後取曰某師伐某取之伐國而後取邑曰伐某取某敗師而後取邑曰敗某師取某田曰取某田不伐而取者易取也侵國不言取邑曰某人取某殺之病內也凡取者不義之辭也密取曰襲戰擒曰獲書戰書敗書獲敗而後獲也不敗而獲失民也不戰而獲羅得之也外殺大夫曰殺稱國以殺殺有罪也稱人以殺殺無罪也殺今君之子曰殺公子某君殺世子曰某君殺其世子某大夫曰某殺某世子某凡殺世子母弟者目君也天王殺大夫不志其下相殺曰某殺某討賊曰某人殺某外討賊曰某人殺某國某不與討賊曰某國某殺某治其罪而後殺之曰某執某殺之不得其人曰盜殺某凡殺大夫不名者衆也不稱大夫者絶也稱官以殺者專也火甚曰災不言及者同時而災也言及者先後之辭也不甚曰火隕而有見于下曰雨盡而有繼為既原注日有食之既
