body:
  text: 春秋經解卷七宋崔子方撰宣公元年春王正月公即位宣公之即位正也公子遂如齊逆女文公之喪未期而公逆女以公為忘哀之蚤也春秋不正使大夫逆者例不月宣公之喪娶其惡為甚雖其親逆猶不月也莊公如齊逆女不月是也然則此不特譏使大夫逆矣三月遂以夫人婦薑至自齊何以不稱氏貶之也夫人不能以禮自防而從君於喪娶此不得乎夫家者也故貶其氏焉夏季孫行父如齊晉放其大夫胥甲父于衛稱國以放放有罪也君放之之辭也公會齊侯于平州公會齊侯于平州昏姻之故也不正公之喪娶又與齊會故不月以見譏然則何以不致內地例不致也平州蓋魯地傳曰會于平州以定公位蓋公以庶立國人未信故齊侯以大國之權而來定我也知平州為內地明矣公子遂如齊六月齊人取濟西田公新昏于齊又為平州之會兩卿荐聘齊魯親矣而齊取濟西田知魯以與齊也不正魯之以田與齊而齊之受田於魯故月之以見譏秋邾子來朝楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衛侯曹伯會晉師于棐林伐鄭此趙盾也何以不言會晉趙盾公侯尊矣趙盾據其所而會公侯故貶之也貶大夫者或稱師或稱人以師出則稱師不以師出則稱人冬晉趙穿帥師侵崇晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元秦師伐晉夏晉人宋人衛人陳人侵鄭秋九月乙丑晉趙盾弒其君夷臯三家以為趙穿弒也趙盾不討賊故書趙盾弒焉夫春秋謹名分别嫌疑今加弒君之罪於人而不為異辭以見之恐非聖人之意而傳或失之也傳又以為弒君者不復見而趙盾復見然齊商人弒君其後商人復見公子羽父弒隱公其後羽父復見則此例亦未可用也冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望不言傷之者牛自傷也魯怪牛之自傷又懼改卜牛而牛死之異乃不復繫牛故于牛死而遂知其不郊也以常禮言之當四月而郊郊而後三望魯人以為望郊之細也故不復待其時於正月以不郊之故而遂三望焉此又失禮之甚者彼惡知無望之為愈也葬匡王楚子伐陸渾戎二傳曰陸渾戎當從二傳去之字按公羊春秋作賁渾戎與穀梁異夏楚人侵鄭秋赤狄侵齊宋師圍曹冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向莒小國也大國欲為我平而不肯致伐之道矣故曰莒人不肯公伐莒取向齊魯大國以好平兩小國之怨而且不能信不足故爾不知自反而復取邑以致怨於人以內為過矣其不言弗肯何也肯可辭也言不肯則其為故可知矣雖然向我故地桓十六年城向是也蓋其後或入于莒豈魯與莒有好故向屬莒至此莒不肯平然後公復取向也以不致公之行知向之為內邑明矣秦伯稻卒夏六月乙酉鄭公子歸生弒其君夷赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊四年秋公如齊今又如齊不正公之亟朝大國故不月以見譏亟朝之譏自宣始矣當是時魯益弱故數事大國以自固也夏公至自齊秋九月齊髙固來逆子叔姬二傳曰逆子叔姬當從二傳為子叔姬今公之女而大夫自為逆者也叔姬目我女也蓋自我之辭言之叔孫得臣卒冬齊髙固及子叔姬來子叔姬來歸寧也髙固及之為非禮矣楚人伐鄭六年春晉趙盾衛孫免侵陳夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟夏公會齊侯伐萊秋公至自伐萊大旱不言不雨旱則不雨不足以言之也大旱志災也冬公會晉侯宋公衛侯鄭伯曹伯于黑壤夏會伐萊秋而至冬又會黑壤春而至其間大旱之不恤且古者凶荒殺禮不舉今公區區以侵伐期會之為急則不知務矣故皆不月以見譏八年春公至自會夏六月公子遂如齊至黃乃復言至黃以見遂有志至乎齊比至于黃而後復也不言而言乃乃難辭也見遂之有疾難于進云爾下書仲遂卒于垂知遂之有疾也大夫受命以出雖死有以尸將命者然則遂之有疾而復亦罪矣猶異乎公孫敖之不至而復也辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥仲遂公子遂也不曰公子前見也其曰仲死而後命以氏也後有仲嬰齊者其族也猶叔肸之命氏云爾生命以氏生則稱之死命以氏於其卒而稱之猶者可以已而不已之辭也彼籥入矣而叔弓卒故去籥卒事為得禮此仲遂卒矣明日猶繹萬入而去籥則知為失禮矣不譏有事而譏繹也戊子夫人嬴氏薨晉師白狄伐秦楚人滅舒蓼秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬雨不克葬禮也不為雨止庶人之禮也其克葬則志日之蚤暮何也禮葬既封主人贈而祝宿虞尸既反哭主人與有司視虞牲有司以几筵舍奠于墓左反日中而虞葬日虞弗忍一日離也今日中而克葬則僅及乎是日虞也彼日下昃乃克葬則不能乎是日虞矣此春秋所以志日蚤暮而書克葬也春秋愛其禮如此城平陽楚師伐陳九年春王正月公如齊按本例云八年六月夫人嬴氏薨此喪朝也何以不譏宣公以庶立故也然後知妾母不得稱夫人明矣且下十年兩如齊而此不譏亟朝春秋欲有所見者不嫌也公至自齊夏仲孫蔑如京師齊侯伐萊秋取根牟根牟萊邑齊取之也按根牟左傳以為東夷國公羊以為邾邑無以為萊邑者崔氏所云亦據例以臆決之耳八月滕子卒九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈不目會而目地見扈之為晉地也冬十月癸酉衛侯鄭卒宋人圍滕楚子伐鄭晉郤缺帥師救鄭陳殺其大夫泄冶十年春公如齊不月公之行譏亟也公至自齊齊人歸我濟西田此公朝齊而親受之也不言來歸見齊之使未嘗來也不直言歸見魯之未嘗求之也故言歸我以見其事焉此蓋齊人喜公之來朝而後歸其田也且公以列國之尊親朝而受田以公為病矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛譏世卿也當時之辭也公如齊五月公至自齊癸巳陳夏徴舒弒其君平國六月宋師伐滕公孫歸父如齊葬齊惠公晉人宋人衛人曹人伐鄭期年之間一救一伐然則晉非能撫諸侯也徒與楚人爭一旦之忿而已秋天王使王季子來聘王子貴矣不名故以伯仲稱之此王之季子也公孫歸父帥師伐邾取繹大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘飢楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵楚子與陳侯鄭伯參盟然於冬入陳於明年圍鄭不正其不信之甚故不月以見譏公孫歸父會齊人伐莒秋晉侯會狄于櫕函冬十月楚人殺陳夏徴舒丁亥楚子入陳楚子伐陳以討弒君之亂罪人斯得可以毋入陳矣而且入陳故見譏于辰陵之盟以見楚子有利陳之心非真能討賊也納公孫寧儀行父于陳十有二年春葬陳靈公楚子圍鄭夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績此戰蓋救鄭也且楚子圍鄭而荀林父帥師及楚子戰于邲春秋之戰及者為主是晉欲戰也晉欲戰則知以救鄭明矣其不言救鄭何不及乎事也楚已服鄭而晉師乃戰爾秋七月冬十有二月戊寅楚子滅蕭晉人宋人衛人曹人同盟于清丘春秋有同盟之例微者不言同不衆不言同自五以上然後與同也今曰晉人宋人衛人曹人同盟何也欲有所見也傳曰晉原縠宋華椒衛孔達曹人同盟於清丘曰恤病討二於是卿不書不實其言也其亦信矣且今日四國共盟而明日宋衛相反於陳明年楚伐宋而晉不救則不信其盟已甚故貶而稱人焉然未有以知其貶也故加同盟以見之微者之盟不言同言同則知其非微者明矣彼傳者知卿之不書而不知同盟之例蓋凡春秋之事隱者必有以見之而先儒未之或知也宋師伐陳衛人救陳十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠今年晉殺先縠眀年衛殺孔達而皆以其罪則清丘之盟其不信固也十有四年春衛殺其大夫孔逹夏五月壬申曹伯夀卒晉侯伐鄭秋九月楚子圍宋葬曹文公冬公孫歸父會齊侯于榖十有五年春公孫歸父會楚子于宋夏五月宋人及楚人平是時楚為不道圍人之國踰年而不解致宋有析骸易子之禍而後與之平以楚之虐為己甚故月之以見譏平例時且楚子在宋其曰人平何也人衆辭也相與平者必衆也按本例云平在下故加月以見譏六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸春秋之例外裔之君不爵而國滅不日此曰潞子嬰兒而又加日何也夫國莫禍於見滅君莫辱於以歸是以國滅君死之正也其奔則不正矣以歸則惡又甚焉夫既不能守位而死又不能避難而去輿櫬面縛為之係纍獻俘于其廟以苟一旦之生此亦天下之大戮也彼不肖之君猶或甘心而不悔是以春秋之例於國滅而以歸者必謹而日之賤而名之以致惡焉雖在微國在外裔猶特變例而從之其意以為雖微國與外裔之國猶以是為惡况於中夏有國之大者乎此聖人所以深警乎後世之君也且諸侯之見執者亦辱矣而不名國滅而奔者亦罪矣而不名獨於以歸則名所以賤而惡之亦眀矣而傳謂以歸猶愈乎執者似誤矣秦人伐晉王札子殺召伯毛伯此下相殺也不可曰周人殺其大夫故直書王札子殺召伯毛伯也秋螽仲孫蔑會齊髙固于無婁初稅畝蓋履畝而稅也古者方里而井井九百畝其中為公田八家皆私百畝同養公田及其成則公取其公私取其私而謂之助蓋曰借民力以治吾田而已方其盛時民知先公而後已曰雨我公田遂及我私及其衰也有法以治之曰公田稼不善則非民又其甚也法不足以治之矣此宣公之時所以舍公田之不善履民之畝而稅其善者也上不知節用以裕民民或不致力以事其上上不知自反而取責于民此春秋所以書初稅畝譏其壞法以自便也凡重事例月其不月以見譏冬蝝生冬非蝝生之時也以生為異矣飢秋螽冬蝝生以至於飢則公田之不善豈民之罪哉而宣公乃履畝而稅見公之不恤其民矣十有六年春王正月晉人滅赤狄甲氏及留吁夏成周宣榭火言成周以别西周則西周有故宫廟矣宫廟之火故志之也外災以月志然而火之為害則微矣故時志也志其不謹而已秋郯伯姬來歸冬大有年十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道秋公至自會不以月致有譏者也春秋以例見者不疑矣按本例云宣公之立事齊而不事晉豈斷道之會晉有責于我乎故不月致以見之冬十有一月壬午公弟叔肸卒公弟公母弟也曰叔肸蓋卒而後命以氏者其後叔老叔弓者其族也十有八年春晉侯衛世子臧伐齊公伐杞杞於魯昏姻之國而公伐之以公為不韙矣故不月以見譏此成五年杞叔姬所以來歸也夏四月秋七月邾人戕鄫子于鄫鄫微國未嘗見卒于春秋以邾人戕而後見之也邾人戕鄫子于鄫則鄫之臣子有罪矣戕國君重事例當日又諸侯卒則名戕鄫子不名不日微國赴告之禮或不備也甲戌楚子旅卒吳楚僣號以逼天子故春秋不書其葬難言之也僣諸公猶可言也僣天子不可言矣雖然安知非赴告不時魯不往會而後不葬乎蓋是時吳楚方強諸侯不敢不會葬又楚子昭卒而襄公在楚亦不書葬則知春秋于吳楚固不書葬矣公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊不稱公孫前見也其地見未入乎國也比至於笙聞公之薨畏罪而奔齊然則歸父有惡於新君矣廢命逃刑於是乎不臣故曰遂奔齊以惡之
