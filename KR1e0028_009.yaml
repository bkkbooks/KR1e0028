body:
  text: 春秋經解卷九宋崔子方撰襄公元年春王正月公即位仲孫蔑會晉欒黶宋華元衞甯殖曹人莒人邾人滕人薛人圍宋彭城其言圍宋彭城何前楚子鄭伯伐宋宋魚石復入于彭城矣嫌此遂非宋地故復繫之宋也且不與楚取人之之邑而長人之叛臣云爾夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫次于鄫所以為晉師之援也秋楚公子壬夫帥師侵宋九月辛酉天王崩邾子來朝冬衞侯使公孫剽來聘晉侯使荀罃來聘二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒晉師宋師衞甯殖侵鄭晉士匄侵齊聞齊侯卒乃還而春秋善之此鄭伯睔卒而晉宋衞侵鄭知其為罪矣晉師宋師不書其人貶之也然甯殖何以不貶方欲致貶乎大國故不貶甯殖以見晉宋之皆卿云爾春秋欲有所見者不嫌矣亦猶澶淵之會而獨稱鄭良霄也傳謂稱衞甯殖如是而稱于前事是則以怨報怨者非春秋之義也然春秋伐䘮者多矣或譏或不譏何也春秋之法亦原情而已彼之伐䘮者或䘮已踰時又或已葬則其伐者非以䘮為利也今三國之侵鄭則不然今日聞䘮而明日師興矣是利其䘮而伐之則其不仁已甚故於此獨貶以見惡焉秋七月仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚己丑葬我小君齊姜叔孫豹如宋冬仲孫蔑會晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢此葢取之鄭而城之也比年諸侯亟伐鄭而未得志故取虎牢而城之以偪鄭於是雞澤之會而鄭伯受盟見晉之不能以徳綏鄭服楚數事侵伐又城其良邑以偪鄭而强與之盟也下書戍虎牢而復繋之鄭知不與諸大夫之城虎牢明矣楚殺其大夫公子申三年春楚公子嬰齊帥師伐吳公如晉按本例云譏亟且䘮朝夏四月壬戌公及晉侯盟于長樗公至自晉六月公會單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤此亦一事而再見不先略何也嫌於出會在四月故不得不舉六月以見之然則凡一事而再見其舉時者謂首月也春秋不煩文如此陳侯使袁僑如㑹陳先從楚欲叛楚即晉故使袁僑如會而請從五年戍陳楚公子貞伐陳是也戊寅叔孫豹及諸侯之大夫及陳袁僑盟袁僑如會而諸侯已盟故别以戊寅而使諸侯大夫盟袁僑也夫諸侯已盟則大夫可無盟矣然而又盟見諸侯之微而大夫之張也故日之以見譏至於湨梁之會則諸侯不復有盟而專在大夫矣秋公至自會公以月往而不以月致何也譏不在往會而在於已會葢不正其使大夫盟故譏之也與湨梁之會不以月致同例冬晉荀罃帥師伐許四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人弋氏薨葬陳成公八月辛亥葬我小君定弋公羊作定弋當從公羊為定弋冬公如晉不月公之行譏亟也陳人圍頓五年春公至自晉夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉叔孫豹何以先鄫世子而叙鄫微國不能自達于大國且欲屬我故叔孫豹覿之于晉也仲孫蔑衞孫林父會吳于善道秋大雩楚殺其大夫公子壬夫公會晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚吳未有稱人者此稱人葢吳子也或者以為進吳且戚之會吳未有善焉春秋何遽進之其後因其行禮于中國與其有援中國之功然後與其爵號而正其君臣之名如吳子使札來聘蔡侯以吳子及楚人戰于柏舉公會晉侯及吳子于黄池之類是也其無所善者則亦復外之公會吳于橐臯吳伐我公會吳伐齊之類是也鄫之稱人者何也鄫無大夫其稱人者固也春秋尊中國而黜僣竊不然吳不得先鄫而叙矣按本例云先吳於鄫諸侯之罪也故不月以見譏與經解稍異公至自㑹冬戍陳諸侯戍也其不言諸侯何也先書諸侯會于戚下又書諸侯救陳知諸侯之戍不疑也楚公子貞帥師伐陳公會晉侯宋公衞侯鄭伯曹伯齊世子光救陳公比年朝晉秋又會戚冬又救陳區區奔走之不暇而莫䘏其國事以公為失所務矣故皆不月以見譏按本例云救陳之譏猶成七年救鄭之譏也十有二月公至自救陳辛未季孫行父卒六年春王三月壬午把伯姑容卒夏宋華弱來奔秋葬把桓公滕子來朝莒人滅鄫鄫滅何以不月見鄫之有罪焉爾鄫葢莒屬也背莒而親魯故前年叔孫豹鄫世子如晉傳所謂魯請屬鄫是也夫小國之政不安其舊而新是圖以致怒於人者取亡之道也故春秋譏焉冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊萊姜姓也齊侯滅萊不名則知衞侯燬滅邢非為同姓而名明矣七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費秋季孫宿如衞八月螽冬十月衞侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衞侯曹伯莒子邾子于鄬鄭伯髠頑如會未見諸侯丙戌卒于鄵髠頑何以名卒之故名也未見諸侯而曰如㑹致其意也諸侯行而卒其封内者地見猶在其國爾非其封内則不地鄭伯如會稱未見諸侯則知陳侯如會而見諸侯明矣此公會何以不致公遂如晉也然則何以不言遂踰年不言遂猶曰天地已易四時已變凡天地之間莫不更始焉我之行不可以遂也明年不致戲之盟亦是也陳侯逃歸陳介二大國之間楚方來圍晉又召會欲與晉則畏楚欲背楚則慮晉之不足恃也此陳侯所以逃歸也歟八年春王正月公如晉按本例云公比年救陳出會曾未息肩而又朝于晉夫内棄其國事而區區以侵伐朝聘之為急亦不知務矣故加月以見譏十年伐鄭戍虎牢十一年夏伐鄭盟亳城北秋又伐鄭會蕭魚其不月亦皆譏也夏葬鄭僖公鄭人侵蔡獲楚公子燮不戰而獲羅得之也季孫宿會晉侯鄭伯齊人宋人衞人邾人于邢丘魯君在晉而晉侯與魯大夫會舍君而與臣則季氏專魯而公不得為政矣公至自晉公内不能制其臣外見鄙於大國故不月致以見譏莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士匄來聘九年春宋災疫也夏季孫宿如晉五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜冬公會晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭按本例云不月譏䘮師十有二月己亥同盟于戲戲之盟不致公未嘗歸也猶之鄬之會不致也公役于外踰年而遂行則不能治國而事宗廟可知也其不致則其譏明矣楚子伐鄭十年春公會晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤於彼主吳也柤吳地猶之鍾離之會爾是時楚方伐鄭故諸侯會吳以謀楚不正諸侯主吳而逺會故不月以見譏大夫之會則月而公之會則不月其以見譏明矣夏五月甲午遂滅偪陽於會主吳則遂滅偪陽者吳事也不正諸侯從夷狄而滅中夏故日志以見之滅偪陽例月者也公至自會不以滅致然後知滅偪陽者非諸侯之事明矣楚公子貞鄭公孫輒帥師伐宋晉師伐秦秋莒人伐我東鄙公會晉侯宋公衞侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭此役也齊世子光先滕薛之君明年之役又先邾莒葢世子益驕而主會者莫制以見文公之業衰而晉不能主諸侯也不正諸侯之亟伐鄭故不月以見譏此伐鄭及明年兩伐鄭是也按本例云不月譏䘮師冬盜殺鄭公子騑公子發公孫輒曰盜不得其人者也未知其國人耶非其國人耶故先目盜而後目其國也當是時鄭方迫畏晉之見伐喜楚之來救未有適從而三卿鄭之執政者是宜有盜殺之矣戍鄭虎牢襄二年諸侯亟伐鄭而城虎牢知取之鄭而城之也此又諸侯亟伐鄭而戍虎牢知戍之以逼鄭也其不言諸侯戍之上下皆言諸侯伐鄭知諸侯之戍不疑矣其言戍鄭虎牢何前諸大夫城虎牢矣嫌此遂非鄭地故復繫之鄭也且見不與諸侯奪人之邑而彊戍之云爾楚公子貞帥師救鄭公至自伐鄭十有一年春王正月作三軍魯次國而作三軍過天子之制也以見三家之强分公室而有之而各征其軍焉爾戎事例日此不日以見譏夏四月四卜郊不從乃不郊郊之用辛也於祭之月卜其上辛不吉則卜中辛不吉則卜下辛三卜不從則已矣而四卜過也五卜則又甚矣彼有五月而郊者是其過卜者也惟七年三卜郊不從乃不郊為合於禮矣春秋著是以見其非焉按黄震日抄云崔氏以郊之常禮言若魯之卜而不從乃天之不歆其僣也鄭公孫舍之帥師侵宋公會晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭此先伐後會而不以會致是會也所以謀伐鄭也葢諸侯相與伐鄭而未得志乃會而謀焉故其歸曾未及解甲息肩而諸侯之師已復至於鄭之城下矣凡以後事致致其終也今未踰時而兩興伐鄭之役而間為此會以謀焉是未得志於鄭也不可以致終故公之還致伐而已至蕭魚之會然後得志於鄭故以會致也且致伐之下書楚子鄭伯伐宋葢鄭尚從楚而内伐知諸侯之不得志於鄭明矣致會之下書楚人執鄭行人良霄葢鄭既背楚而從諸侯使告於楚楚怒而執其行人則知諸侯之得志于鄭亦明矣楚子鄭伯伐宋公會晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚公至自會楚人執鄭行人良霄告從於晉故楚人執之也鄭雖有背約之罪而非行人之過矣冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台為下入鄆月也季孫宿帥師救台遂入鄆既救吾邑遂入莒邑以報之也文十二年城鄆是魯邑耳此知為莒邑何也是葢莒魯之邊邑二國數以為爭故其在莒魯者不常豈成九年楚伐莒莒潰楚人入鄆是時魯遂失鄆乎宿受命救台而遂入鄆見政之逮大夫也故月之以見譏夏晉侯使士魴來聘秋九月吳子乘卒冬楚公子貞帥師侵宋公如晉公比年出會伐鄭曾未息肩今又朝晉夫内棄其國而區區以期會為務以公為過矣故不月以見譏十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防十有四年春王正月季孫宿叔老會晉士匄齊人宋人衞人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向夫衞鄭班列同皆次國也衞之大夫不得先鄭之卿今衞人而先鄭公孫蠆葢見齊宋衞皆卿貶而後人之也傳謂齊崔杼宋華閲衞北宮括以惰而不書其亦信矣以鄭公孫蠆不當後衛人故也十六年伐許之役衞甯殖先宋人則大國之人不得先次國之卿明矣月而後會猶之鍾離之會也二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衞北宮括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦衞北宮括不書於向而書於伐秦豈能其事耶然後知向之會稱人者實貶明矣己未衞侯出奔齊諸侯失地名而衞侯不名見孫林父之逐之也臣逐其君而罪其君則是臣可以逐君矣故不名以見之加日焉以謹之也凡春秋於其所甚惡者既見其辭又復變日月之例者謂是類也莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士匄宋華閲衞孫林父鄭公孫蠆莒人邾人于戚十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊劉姓夏名葢天子之士士賤非所以逆王后者也王后天下之母而使賤者逆是不月以見譏者也不書齊姜歸于京師非魯主之然後知紀季姜魯主之明矣夏齊侯伐我北鄙圍成為莒故也公救成至遇其言至何葢公救成比至于遇齊侯或已解圍而去故公不進也與追齊師至酅同意傳謂公畏齊不敢進似誤矣若公實畏齊不敢進自當書次不當書至也何以不月以為不及乎事故畧之猶之弗遇弗及盟也遇内地季孫宿叔孫豹帥師城成郛帥師而城畏齊故也秋八月丁巳日有食之邾人伐我南鄙邾黨於莒而畏於齊故有南鄙之師也冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公會晉侯宋公衞侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟晉侯在䘮而出會又不降名見晉侯之失禮矣主諸侯之盟而且失禮宜乎諸大夫之張也諸侯為會而大夫盟諸侯失正矣其不曰諸侯之大夫而直曰大夫不繫之諸侯見大夫之益張也易曰履霜堅氷至葢雞澤之盟其漸矣此孔子歎政逮於大夫四世者謂此也故特日之以見譏晉人執莒子邾子以歸大夫主盟而執諸侯見大夫之張也夫邾莒雖於我有罪然晉大夫執之其可乎齊侯伐我北鄙按自此至襄三十一年永樂大典闕夏公至自會按本例云與雞澤之盟不月致同例五月甲子地震叙老會鄭伯晉荀偃衞甯殖宋人伐許秋齊侯伐我北鄙圍郕大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒宋人伐陳夏衞石買帥師伐曹秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來夏晉人執衞行人石買秋齊師伐我北鄙冬十月公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊曹伯負芻卒于師楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯按本例云諸侯患齊之强數事侵伐故同欲圍之然而不能而遂為此盟其盟也有不同者矣此邾子所以執也故不書同又不日以見譏焉晉人執邾子公至自伐齊取邾田自漷水季孫宿如晉葬曹成公夏衞孫林父帥師伐齊秋七月辛卯齊侯環卒晉士匄帥師侵齊至榖聞齊侯卒乃還八月丙辰仲孫蔑卒齊殺其大夫髙厚鄭殺其大夫公子嘉冬葬齊靈公城西郛叔孫豹會晉士匄于柯城武城二十年春王正月辛亥仲孫速會莒人盟于向按本例云莒魯之怨自屬鄫始其後莒與齊邾比以為我患魯無歲不受兵及仲孫速為此盟然後兵怨始解幾二十年莒魯不交兵則是盟也實國之所喜故詳録而加日夏六月庚申公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵秋公至自會按本例云月往而不月致公與邾子盟澶淵比至於國而大夫已伐邾矣不正公之渝盟而亟伐故以見譏也然後知澶淵之盟故不與同明矣仲孫速帥師伐邾蔡殺其大夫公子燮蔡公子履出奔楚陳侯之弟黄出奔楚叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庻其以漆閭丘來奔夏公至自晉按本例云月往而不月致豈公如晉朝以謝背盟伐邾之故而晉猶有責於我乎故以見譏也秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子于商任二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨按本例云傳稱會于沙隨復錮欒氏信也前年秋欒盈出奔楚晉私以一大夫之故期年之間再合諸侯見晉之失正而非所以合諸侯也齊人於是不賔明年伐衞遂伐晉則當時之事可知矣始合猶可再合而譏矣故沙隨之會不月以見之公至自會楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月己巳把伯匄卒夏邾卑我來奔葬把孝公陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳晉欒盈復入于晉入于曲沃秋齊侯伐衞遂伐晉八月叔孫豹帥師救晉次于雍榆按本例云受命救晉畏齊不進止于雍榆故加月以見譏己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈齊侯襲莒二十有四年春叔孫豹如晉仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒大水八月癸巳朔日有食之公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹陳鍼宜咎出奔楚叔孫豹如京師大饑二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弑其君光公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘公至自會衞侯入于夷儀楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒二十有六年春王二月辛卯衞甯喜弑其君剽衞孫林父入于戚以叛甲午衞侯衎復歸于衞按本例云辛卯而剽弑甲午而衎入剽之弑衎與有力焉故加日以見之夏晉侯使荀吳來聘公會晉人鄭良霄宋人曹人于澶淵按本例云不正公與大夫會故不月以見譏秋宋公殺其世子痤晉人執衞甯喜八月壬午許男甯卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋衞殺其大夫甯喜衞侯之弟鱄出奔晉秋七月辛巳豹及諸侯之大夫盟于宋按本例云加日者猶雞澤湨梁之盟冬十有二月乙亥朔日有食之二十有八年春無冰夏衞石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚夏五月公至自楚庚午衞侯衎卒閽弑吳子餘祭仲孫羯會晉荀盈齊髙止宋華定衞世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把晉侯使士鞅來聘杞子來盟吳子使札來聘秋九月葬衞獻公齊髙止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘按本例云公前朝楚故楚使薳罷來聘以報之葢自文公九年至此厯七十餘年楚未嘗致聘于魯今薳罷之來欲報公明矣不正大夫之答君故加月以見譏夏四月蔡世子般弑其君固五月甲午宋災宋伯姬卒按本例云加日于災上見伯姬以災死也天王殺其弟佞夫王子瑕奔晉秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄冬十月葬蔡景公晉人齊人宋人衞人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故直為宋災之故而為會其無補于宋明矣按此條從黄震日抄檢補三十有一年春王正月夏六月辛巳公薨于楚宮秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來會葬癸酉葬我君襄公十有一月莒人弑其君密州
