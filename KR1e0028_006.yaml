body:
  text: 春秋經解卷六宋崔子方撰文公元年春王正月公即位凡君薨子繼於是即位矣必踰年正月然後書即位何也一年不可有二君故不於先君之年書即位而於嗣君之年書之追治之也春秋之例國之重事則日即位固君之重事其不日何也追志之事不可以日志也至於定公則異是矣然後以日即位也二月癸亥日有食之天王使叔服來㑹葬叔服天子之大夫而未賜采者故直稱其字而曰叔服也夏四月丁巳葬我君僖公天王使毛伯來錫公命此錫僖公也不言諡蓋上承葬我君僖公間無異事不疑矣於莊元年錫桓公命於文元年錫僖公命皆死而後加之也不然文公始即位在喪王豈遽以寵命錫之乎惟成公八年天子使召伯來賜公命者生命之也按崔氏此說與三傳迥異晉侯伐衛叔孫得臣如京師拜錫命也受天子之命而使大夫拜當是時文公在喪雖使大夫拜可也衛人伐晉秋公孫敖㑹晉侯于戚冬十月丁未楚世子商臣弒其君頵公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績丁丑作僖公主禮虞亦有主練亦有主僖公薨十有五月矣而作主不及乎事也其非禮明矣三月乙巳及晉處父盟公盟也不言公恥與大夫盟也大夫主盟而盟公此陽處父所以貶其族也為之諱必有見焉者日於上不地於下而貶處父之族所以見之也此蓋公在晉矣不言公如晉亦諱之也何以知公之在晉以其盟不地而知之凡來盟於我不地晉侯使郤犨來聘及郤犨盟之類是也我往而盟不地公如晉及晉侯盟之類是也今處父未嘗來知其不盟於我矣傳曰晉人以公不朝來討故公如晉晉使處父盟公以恥之是也此晉主盟而以及言何也以見晉雖使大夫盟公以見鄙而公且畏晉幸晉之與盟而欲之云爾按本例釋此條經文與莊二十二年及齊髙傒盟于防同夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴此五國之盟何以不言同晉方使處父盟公又使士縠盟諸侯晉之罪也故不言同以見公侯主大夫而盟非所同也垂隴晉地猶之七年扈之盟爾扈之盟不叙諸侯不名晉大夫此則叙諸侯而名士縠何也扈之盟公在是而垂隴之盟公不在是其為譏也薄特以見非所同而已自十有二月不雨至于秋七月僖之憂民閔雨故春秋之書辭亦詳文之不憂民閔雨故春秋之書辭亦略各如其志焉豈徒志一不雨之異哉文十八年之間三書自某月不雨至于某月未有特書不雨者見文之不憂民閔雨而不為雩也八月丁卯大事于大廟躋僖公春秋之例譏在祭則目祭譏不在祭則書有事而已今三年之喪未畢而事宗廟其可譏也然而不目其事而曰大事何也曰大事者所以目祭也人君三年之喪畢合羣廟之主于大祖而祭之禮謂之祫蓋祭之大者莫盛於祫故直目曰大事周官曰朝享春秋曰大事其實一也蓋兼譏之矣且禘于大廟致夫人則言用大事于大廟躋僖公則不言用何也彼禘也特為致夫人而為之也此大事也因之以躋僖公而已蓋是時魯人短喪於僖公之薨二十一月而已去喪於是而大事乃躋僖公焉故於冬則公子遂如齊納幣則其短喪明矣故知大事於大廟非用躋僖公因大事而遂躋僖公云爾升下曰躋言躋則非禮明矣冬晉人宋人陳人鄭人伐秦公子遂如齊納幣未終喪而圖昏非禮明矣三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰夏五月王子虎卒是嘗與魯有好故來赴而卒之元年叔服來㑹葬乃王子虎耶秦人伐晉秋楚人圍江雨螽于宋自上下也有見於下者也冬公如晉凡一事而再見者先略而後詳下書十二月己巳公及晉侯盟是也其諸類此按本例云譏亟朝也周官之制諸侯有世相朝之禮春秋之時天下無王霸主更盟故一君有再三朝者春秋權事之宜猶與之至於比年亟朝則為己甚然後譏焉故皆不月十有二月己巳公及晉侯盟先書公如晉則不地者盟於晉也晉陽處父帥師伐楚以救江楚被兵則釋江以自救故伐楚所以救江也四年春公至自晉夏逆婦姜于齊宋蕩伯姬來逆婦謂姑逆也今曰逆婦姜亦姑逆之辭也其不言夫人逆何也為國君母踰境而逆婦失其為尊春秋之所不與故以略言之也婦姜何以不稱夫人以尊逆卑厭之也不書至難言之也然又何以不稱氏君薨而夫人出也夫人不終為夫人不得乎夫家者也故貶其氏焉然則何以不於其出焉貶始以不正終不可得而正矣故貶其始逆也哀姜不貶其孫而貶其以喪至出姜不貶其出而貶其始逆皆舉其重者一貶焉此春秋之義也逆夫人例月此略之以見譏狄侵齊秋楚人滅江春秋之例以為有國者之禍莫重於見滅故雖在微國與外裔猶且以月志蓋謹之也然僖十二年楚滅黃與此滅江皆不月何也以為江黃之禍有以自取之夫江黃漢東之國世屬於楚聞齊桓之興不內自度遽故背楚而親中國桓公方欲事楚故貫之盟陽穀之㑹實從江黃之人以謀楚於是明年興召陵之師楚既內服江黃又㑹伐陳則楚之有怒於兩國可知矣故僖之十二年楚伐黃而遂滅黃至此楚圍江而遂滅江也夫為國不知所以自謀而致怨大國者取亡之道也春秋譏焉故不月以見之晉侯伐秦衛侯使寧俞來聘冬十有一月壬寅夫人風氏薨互年春王正月王使榮叔歸含且賵彼言歸惠公仲子之賵而此不言其人承上夫人風氏薨間無異事不疑也其言歸含且賵何且者兼事之辭含賵異事而兼之非禮明矣凡言來歸者彼意也直言歸者我與有意焉蓋見魯有求於周而後周歸之也魯人以妾祖母之故恐王之不來賵也故使求焉然則春秋何以不書魯求賵言求賵則未知其歸賵也言歸賵而不言來則知其求賵可知矣此春秋書辭之法也成風莊公之妾而僖公之庶母莫尊於繼天而王莫賤於為人之妾以天王之尊而下賵諸侯之妾以王為不天矣故去天以見之三月辛亥葬我小君成風於禮妾母不得稱夫人春秋正名分謹嫡庶而不可亂者也然成風稱夫人以薨稱小君以葬何也當時之辭也盡其辭以著其事然後其譏見矣故於王歸含且賵使來㑹葬則見之於秦人歸禭則見之王使召伯來㑹葬使大夫歸賵以為不可而又使卿㑹葬以王為不天甚矣夏公孫敖如晉秦人入鄀傳曰鄀叛楚即秦又二於楚故秦人入鄀鄀有以自取之故不月以見譏則知傳之猶信也秋楚人滅六春秋滅國變日月之例者八江黃䕫六巢徐鄫項是也蓋譏其有以自取滅亡之禍故略以見之然六之罪未見於春秋以他國之例考之則六之有罪不疑矣而梁之所以亡者則又甚焉故不書其人以為非亡者之罪然則江黃之屬雖有罪而滅之者亦不為無罪焉爾按本例云或月闕冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳秋季孫行父如晉八月乙亥晉侯歡卒冬十月公子遂如晉葬晉襄公晉殺其大夫陽處父三家皆曰狐射姑殺之怨處父之易其班也然以春秋之例考之似誤矣稱國以殺大夫君討之辭也狐射姑實殺處父而以國討之辭言之何義哉且如處父之無罪耶射姑安得而殺之從三家之論則處父之選任而告於君者可謂忠矣未可以為罪也然稱國以殺知處父有他罪明矣而傳或失之晉狐射姑出奔狄晉以罪殺處父而射姑遽奔狄豈處父之罪有纍於射姑故耶閏月不告月猶朝于廟周官太史之職頒告朔于諸侯蓋王者每歲頒十二月之政於諸侯諸侯藏於祖廟月朔則告廟受而行之十二月有常政惟閏月無常政故王不頒政而諸侯亦不告朔然則朝於廟為告朔也今不告朔而猶朝於廟知其失禮明矣七年春公伐邾三月甲戌取須句遂城郚僖二十二年伐邾取須句今又伐邾取須句不正其再取故特日之且見取須句之日而遂城郚也不月公之伐一事而再見也郚內邑而鄰於邾既取須句即日遂城郚也公伐何以不致遂城郚則公至焉可知也嫌郚為邾邑故不致公以見之按本例云城卑者之事而公親之其日兼譏取須句而遂城郚也夏四月宋公王臣卒宋人殺其大夫殺大夫不名衆也如公及齊大夫盟之類亦舉衆之辭也豈宋公王臣卒嗣君未定而國內亂故其大夫有以衆死者耶國亂而大夫衆死知非由君命矣此所以稱宋人殺也戊子晉人及秦人戰于令狐晉先蔑奔秦不言出在外也且晉人與秦人戰而先蔑奔秦知先蔑之二于秦也狄侵我西鄙秋八月公㑹諸侯晉大夫盟于扈春秋㑹盟有稱諸侯者蓋先列叙之矣間有異事於文不屬故再曰諸侯今此非先有列叙諸侯者而略曰諸侯晉大夫何也是時晉侯新立諸侯相與㑹于晉地而聽事焉晉侯不能降禮乃使大夫抗禮而盟諸侯此諸侯之恥而晉之罪也故不叙諸侯不名晉大夫以略之又不日其盟以見譏焉其不致大夫之盟例不致然後知主大夫而盟明也按黃震日抄云諸家皆祖左氏以為公後至而諱之惟崔氏據經為說冬徐伐莒不稱人蓋微者徐固無大夫矣公孫敖如莒涖盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴大夫盟不以日志嫌同日而二盟故各舉日以見之也再言公子殊事也遂之名嫌矣按本例云特加日譏遂之専盟見四日之間不能復命而再出㑹故兩日以見之欲志乙酉不得不先志壬午也公孫敖如京師不至而復丙戌奔莒公子遂如晉至黃乃復公孫敖如京師不至而復或地或不地何也春秋亦志其實而已遂之行逺矣而敖則不然以乙酉受命而丙戌奔莒知其未出乎國也然則何以不言出奔受命已出在外也此故也何以不言弗至言不至而復又書奔莒知其志存乎莒而不肯往爾則其故可知已矣螽宋人殺其大夫司馬宋司城來奔其曰司焉司城當時之辭也春秋因之以見其事焉雖然二百四十二年之間書諸侯之事州國爵號名字氏族以為是非褒貶之意者亦詳矣他國未有稱官者而獨宋之稱官者三焉司馬華孫來盟殺其大夫司馬司城來奔是也而左氏乃以為其官皆從之與夫握節以死效節而出故皆書以官焉嗚呼其度聖人於褒貶之意亦已淺矣惟公羊以為宋三世無大夫三世內娶而穀梁氏以為稱官者無君之辭也此豈得當時之事而稱之不然深考聖人之辭而知之乎雖然二家之論亦未明了而學其說者又復淺近疏略不識二師之指以失聖人之意試質其所疑而備論之夫三世內娶外戚尤盛政柄下移各専其官則人君者外或制於元舅之尊內或蔽於妃黨之愛拱手備位曽無以令於其國而其大臣者官盛任重往往不名稱是官則足以知其為是人也嗚呼當是時孰謂有君也哉且先古之事不可得而詳矣以後世之事而觀焉夫西漢之時外戚至盛故衛子夫之愛則孝武之間稱大將軍者不問知其為衛青也元后之尊則孝成之間稱大將軍者不問知其為王鳯也夫自天子稱之猶曰大將軍况公卿大夫與天下之人可知矣然則宋之司馬司城何獨異此哉是以宋國之人習而稱之赴於他國以此言之魯之舊史從而書之仲尼修經因而存之蓋聖人修春秋於舊史之書其事不足以為褒貶者則削之其文不足以見褒貶者則修之若夫載當時之事因舊史之文而足以見夫褒貶者吾何加損焉亦因其實而已是故其事則宋人之赴也其文則魯史之書也而吾代賞罰之意已具存乎其間則夫人君內寵之失大臣専官之咎曽不煩吾一辭而已足以垂戒乎萬世嗟夫寵之適以辱之愛之適以禍之是以司城奔亡司馬見殺豈非其明效大驗耶而後世之君猶不知戒而外戚之盛至於使之不能衛身而保家者其禍變可勝悔哉雖然司馬之専官罪矣而不以國討之辭言之何也當是時大臣専官以權相傾宋公莫能令於其國故以下相殺之辭言之以見其事焉此春秋之義也九年春毛伯來求金諸侯有常貢非所貢而求之譏在周也不稱使見其私求也不然王在喪不命使與夫人姜氏如齊二月叔孫得臣如京師辛丑葬襄王天子之葬魯侯當親之者也使大夫譏也且天王書葬者五有天子之葬而周不以訃聞天子之葬而魯不往會是以策書不載春秋因之以徴臣子之罪且見當時之亂雖禮之大者猶不備如此况其小者耶晉人殺其大夫先都三月夫人姜氏至自齊此出姜也十八年夫人姜氏歸于齊者是也夫人不寧于魯故終以見出是行也夫人其幾於出乎臣子殆其往而喜其反故致之不然夫人之行不致也其月見臣子以是為重矣晉人殺其大夫士縠及箕鄭父及箕鄭父鄭父纍也先都之黨也先都以非罪死則士縠箕鄭父亦非罪矣故皆稱晉人殺也楚人伐鄭公子遂㑹晉人宋人衛人許人救鄭夏狄侵齊秋八月曹伯襄卒九月癸酉地震冬楚子使椒來聘椒楚同姓大夫而未命氏者也秦人來歸僖公成風之禭成風莊公之妾而僖公之母也禮妾不得繫其先君故繫之其子以見之襚死者之用五年而後歸其非禮明矣傳謂榮叔歸含且賵不言來不周事之用賵以早而含已晚今五年而後歸襚猶曰來不譏其不周事何也然則誤矣葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉不稱人蓋微者晉伐鮮虞鄭伐許徐伐莒之類是也楚殺其大夫宜申自正月不雨至于秋七月及蘇子盟于女栗蘇子王卿士而內使微者盟見不導于天王矣內大夫及諸侯盟猶不月以見譏况內之微者而盟王卿士哉此其不月者也冬狄侵宋楚子蔡侯次于厥貉十有一年春楚子伐麇夏叔仲彭生㑹晉郤缺于承筐秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹外敗外裔例時略之也然於內敗則以日志凡內戎事例自當日故爾按本例云傳曰鄋鄤也為中國患叔孫得臣射而殺之夫不興師徒以一人之力一朝之間而能除中國患春秋善焉故不書帥師特詳録而加日十有二年春王正月郕伯來奔莊之八年郕降齊師自是郕不復見蓋入于齊也今而來奔齊迫之也不名以郕伯為未有罪爾與晉侯逐衛侯而不名同義微國之奔例時今郕已入于齊而猶從次國之例見不與齊之取郕也按此條係崔氏獨闢之解三傳及諸家俱未之及杞伯來朝二月庚子子叔姬卒凡言子叔姬今公之女也以别姑姊妹此未聘而卒之其在內猶云公子親之故卒之也夏楚人圍巢秋滕子來朝秦伯使術來騁術秦同姓大夫而未命氏者也冬十有二月戊午晉人秦人戰于河曲春秋之戰無主客欲戰者及之宋公伐齊宋師及齊師戰宋欲戰也齊人伐衛衛人及齊人戰衛欲戰也及齊師戰于奚我欲戰也齊侯衛侯鄭伯來戰于郎彼欲戰也河曲之戰不言及莫適為主兩國皆欲戰矣於是時秦晉亟交兵故而國皆欲戰也春秋無義戰欲戰者罪矣季孫行父帥師城諸及鄆十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月大室屋壞大室魯公之廟也謂之大室始封之廟世世室也始封之廟亦重矣其屋不治而後至於壞則事宗廟之禮不敬可知也冬公如晉衛侯㑹公于沓按本例云公方修禮于大國而遽與他國私㑹失事盟主之道故不月以見譏狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐十有四年春王正月公至自晉文三年冬公如晉四年春公至自晉一事而再見者也而不以月致以往不月則致亦不月也今此則以月致何也公還自晉鄭伯㑹公于棐有繼事矣嫌於繼事之有譏故不得不月致也按本例云春秋以為卒事于大國然後可與他國㑹故特月致見卒事而㑹不譏始往而㑹者譏耳邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城七年公㑹諸侯晉大夫盟于扈略而不書此則列叙諸侯晉趙盾何也新城之盟蓋諸侯為㑹趙盾以國事聽命于㑹而因得與盟非如扈之盟晉大夫主㑹而盟諸侯也故扈之盟不言同以見主晉大夫而盟非所同也秋七月有星孛入于北斗公至自㑹晉人納捷菑于邾弗克納捷菑以名見蓋以晉事書也其不以國氏又不稱公子知其不當納者也春秋未有言弗克者知義之不勝引而去之是弗克納也春秋之例遂納曰納某于某不遂納則直曰納某今弗克納而以遂納之辭言之以見晉人力足以遂納而故弗納也九月甲申公孫敖卒于齊大夫出奔例不卒此為下歸其喪也下書齊人歸喪不言來蓋見魯生已許其歸死則請其喪也齊公子商人弒其君舍商人繫以公子弒君之惡不貶而自見故春秋盡其辭焉舍雖未踰年然於其國固巳君矣然則未踰年之君但不稱爵耳而傳者異焉似誤也宋子哀來奔子哀之字當時之辭且今年子哀來奔明年華孫來盟華孫之盟私於子哀故也然則二人固同黨者其擅貴而専國可知矣此子哀所以得罪來奔華孫所以非君命來盟也魯人以其貴故皆從而字之春秋因之以見其事焉此其三世內娶之弊而至此乎冬單伯如齊單伯以莊元年見至此七十餘年而復見此蓋寓公而繼世者也禮諸侯不臣寓公寓公不繼世今魯臣寓公而又使繼世皆非禮矣彼逆王姬下言如京師不與其使也此言如齊則與其使何也寓公之子可以臣矣特譏其繼世而已禮稱古者寓公不繼世則今之寓公有繼世者也齊人執單伯不稱行人以執見單伯有罪焉爾凡稱行人者未失奉使之道也叔孫婼稱行人以執何也蓋晉人自以國事為討非使人之罪矣然則稱行人以執者罪在其國而不在行人故也此不月以見譏齊人執子叔姬子叔姬今公之女也今公之女未有在齊者而曰齊人執子叔姬見與單伯之俱往而執也傳所謂道淫者是也不言子叔姬歸于齊春秋之例內女嫁于諸侯其終見出而來歸則始亦不書歸則子叔姬之不書歸亦宜矣其不言執單伯及子叔姬而殊言之使若為異罪然為內諱也雖為之諱然而辭不疑矣季姬及鄫子遇于防而不為之諱彼之為罪也隱而此之為罪也顯春秋亦諱其難言者而已按本例云執內大夫例月知執內女亦例月矣其不月以譏內也十有五年春季孫行父如晉三月宋司馬華孫來盟稱官而字之亦當時之辭也稱官以其尊也稱字以其貴也蓋魯人不敢慢之如此然其來也私於子哀之故非有君命故不書使以見之則其専官而擅貴可知矣彼屈完髙子來盟春秋以為姜司馬華孫來盟春秋以為惡何也不嫌也且華孫方加司馬以見其専官之罪則亦何善而字之屈完之進也有服中國之義髙子之賢也有平魯難之功則異乎華孫之來私盟矣春秋猶恐疑也故復月之以見譏焉雖然華孫之稱官猶之司馬之見殺司城之來奔也然而復稱字者雖當時之辭且見與子哀同例故也然則子哀何以不官子哀之官未貴而權已重與華孫之字為子哀也猶之公子友稱季子為齊仲孫故也蓋春秋於事之難明者則比例以見之夏曹伯來朝齊人歸公孫敖之喪不言來歸魯請之也敖內棄君命外廢王事從己之私而出奔莒其罪固當誅絶今其死也請其喪而歸之見魯之失政刑矣其曰齊人歸公孫敖之喪內辭也與齊人歸歡及闡不言來同意六月卒丑朔日有食之鼓用牲于社單伯至自齊大夫執則致危之也單伯有罪則何以致蓋盡其事所以致惡焉晉郤缺帥師伐蔡戊申入蔡秋齊人侵我西鄙有怒於子叔姬故也季孫行父如晉訴齊之有事于我也冬十有一月諸侯盟于扈此晉為我謀齊而後不能者也故十二月而齊侯復侵我西鄙諸侯不叙蓋略之以見譏十有二月齊人來歸子叔姬郯伯姬杞叔姬來歸皆以自歸為文今子叔姬則曰齊人來歸見叔姬之有罪焉爾叔姬有罪齊人歸之以致責于我數年之間兵難不解由乎子叔姬此特月之以見惡焉齊侯侵我西鄙遂伐曹入其郛前年曹伯來朝于我故齊伐之以絶我援十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟弗及盟不逮乎盟也不曰不及而曰弗及齊侯之不逮盟者故也夏五月公四不視朔其言四不視朔於終舉之也見公之怠於政矣六月戊辰公子遂及齊侯盟于郪丘是時齊强魯弱齊人方以叔姬之罪致責于我魯再受兵諸侯不能救求盟而不得魯於是病矣郪丘之㑹以得齊盟為喜故詳録其事而日之也按本例云與襄二十年仲孫速㑹莒人盟于向加日同例秋八月辛未夫人姜氏薨毁泉臺楚人秦人巴人滅庸冬十有一月宋人弒其君杵臼十有七年春晉人衛人陳人鄭人伐宋四國伐喪而文不貶何也與其討弒君之亂也夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于穀諸侯㑹于扈十五年扈之盟與此扈之㑹皆不序諸侯何也蓋公所不與特以譏諸侯之無能為而罪晉焉爾何則十五年秋書齊人侵我西鄙書季孫行父如晉冬十一月書諸侯盟于扈十有二月又書齊侯侵我西鄙然則當時之事可知矣蓋我有齊難於是季孫行父訴于晉晉以盟主之故故㑹諸侯而為我謀齊然而遂盟則知其不能有為矣故未幾而齊復侵伐此傳所謂齊人賂晉侯故不克而還是也齊人謂諸侯之不能故來歸子叔姬以深責我罪又伐曹以絶我援魯固知晉之不足恃也於是下齊而事之故明年春使行父為陽穀之㑹以求齊盟而齊侯不肯至公子遂復為郪丘之㑹然後得與之盟矣雖然齊之輕晉怒魯之心未已也㑹我有小君之喪齊明年於是復背盟而伐我西鄙夫强國恣橫同姓見伐用賂賈直不忌盟主此齊之甚惡而晉之深恥也晉人於是懲前年之無功故復合諸侯于扈又將為我討齊然而魯亦懲前年諸侯之無功遂自下齊而為穀之盟矣㑹明年公薨齊侯見弒大夫交聘然後兩國之難平然則晉主諸侯之盟而曽不足以令之也以見晉文之業衰而征伐之事益以失矣此以譏諸侯之無能為而罪晉明矣秋公至自穀不月公之至見穀之盟非得意之盟也冬公子遂如齊十有八年春王二月丁丑公薨于臺下臺下者泉臺之下也其臺毁矣而下屋存焉故曰臺下公薨于臺下非正也秦伯罃卒夏五月戊戌齊人弒其君商人商人弒君者也而不以討賊之辭言之何也商人之位定矣許弒君以討弒君之罪則後世姦臣有得矯託以濟其私者且其弊相尋而無巳故春秋寧失一商人而絶後世無窮之禍也六月癸酉葬我君文公秋公子遂叔孫得臣如齊冬十月子卒春秋之例未葬稱子某既葬稱子踰年稱爵子卒之不名先君既葬矣而三家皆以為弒也於春秋未有焉且繼弒君不書即位而宣公書即位知其非弒也以宣公與於弒而書即位猶之桓公則春秋賤桓於桓之事無譏焉而於宣無是也知其非弒也以為公子遂弒之凡弒君者貶而公子遂二十見於春秋而辭無所貶知其非弒也與子野卒同辭而已知其非弒也且亦與子般卒同辭而知子般之弒何也以閔公不書即位而慶父貶曰齊仲孫知之也且左氏以為子惡公羊以為子赤彼傳者之未足取信如此然則何信亦信諸春秋而已雖然春秋之例弒君者不貶以為其惡不貶而自見今曰凡弒君者貶何也於外弒君直目其事故無事於貶於內弒君則為之諱而沒其人然豈可遂失賊哉此隱之翬閔之慶父所以皆貶也翬不稱公子而慶父曰齊仲孫又皆不書卒是也夫人姜氏歸于齊婦人既嫁內夫家而外父母家夫人姜氏於齊言歸則于魯為出矣夫人固不寧于魯今嗣子死其庶兄立夫人益以不寧而遂出也夫人之出宣公為有罪矣季孫行父如齊莒弒其君庶其
