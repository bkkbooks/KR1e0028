body:
  text: 春秋經解卷一宋崔子方撰隱公春秋何以始於隱公昔孟子有言世衰道微邪説暴行又作臣弒其君者有之子弒其父者有之孔子懼作春秋又曰王者之迹熄而詩亡詩亡然後春秋作考乎其時驗乎行事則始隱之義可得而知矣平王東遷周室衰微黍離既降而詩不作隱桓篡弒而魯國亂文武之道墜地而周公之業衰矣孔子傷周道之不復愍聖王之不作於是修魯史以明是非正褒貶而代賞罰上以承三聖之緒下以著萬世之憲使亂臣賊子有所畏忌而不敢竊發此春秋所為作而始隱之義也元年春王正月春秋謂一年為元年元者本也謂一月為正月正者正也言人君即位必奉元以端本體正以從事也古之人君莫不然故書稱大甲元年正月上日是也按大甲元年語見書序春秋之義惟書王於二者之中而後聖人之意見矣雖然春秋因魯史而成文而春秋不為魯作其文則魯史而其義則有王者之法存焉故孟子曰春秋天子之事也是以於歲之首必書王以見賞罰之事必自王者出故曰元年春王正月也其先曰元年春而後曰王正月何也蓋事必繼月以見其年則魯君之年而其事則有王法治之云爾然則隱何以不書即位凡弒君不即位也蓋不以其道終猶不能即位云爾閔不書即位亦是也按春秋不即位者有二弒君不即位繼弒君亦不即位弒君不即位不得以其道終也繼弒君不即位不忍以其道始也三月公及邾儀父盟于蔑儀父名也微國之君未王命例不書爵而名介葛盧郳犂來是也何以知儀父之為名公孫歸父季孫行父之徒皆名爾且天子之元士視附庸宰咺石尚皆元士而名之則附庸之君未王命而書名者蓋其宜也其後王命則曰邾子克而列於小國矣傳乃謂始與公盟故褒而字之按此公羊傳説也此書凡引三傳統謂之傳蓋以三傳習見之文不復别白今仍其舊則桓公與儀父盟于趡又何以褒之耶春秋褒貶代王者之賞罰賞罰不可輕用而傳者輕以褒貶與人豈聖人之意哉周官雖有盟載之事然詩刺君子屢盟則夫不自信而區區以盟詛相要者春秋之所譏也公始即位不能自信而顧與邾為盟卒又渝之故不日以見譏公盟例日夏五月鄭伯克段于鄢克僅勝之謂也猶曰鄭伯敗段于鄢云爾以見段之有徒衆而與鄭伯敵也鄭伯不勝其母之故致段失道而弗制至於用兵僅能逐之則鄭伯之勝段難矣春秋欲見其事故變殺之名而謂之克也夫兄弟之間且至於用兵見鄭伯之失教也不稱弟段失為弟之道矣雖然何以知段之為弟蓋聖人以六經相為表裏叔于田之詩存則段為弟可知矣春秋微國之敗例月段之有京以其衆敵猶之微國故例亦月也秋七月天王使宰咺來歸惠公仲子之賵宰姓咺名天子之上士也凡天子之上士例稱名劉夏石尚之徒是也此蓋與宰周公宰渠伯糾稱宰者異矣仲子者何惠公之妻而隱之母何以不稱夫人繼其先君不稱夫人不疑也則異乎秦人歸僖公成風之襚矣成風不繼之莊公妾不得繼其先君母以子貴故繼之僖公云爾王使榮叔歸含且賵不稱天王以天王之尊而下賵諸侯之妾以王為不天矣而惠公仲子之賵於王無譏焉則其為夫人明矣然則何以不稱諡古者婦人猶質或諡或不諡是以春秋內女皆不諡惟宋共姬則諡內夫人雖諡而仲子則不諡且如左氏稱惠公元妃孟子亦不諡也故仲子之不諡無足疑者而或者遂以不諡為妾辭成風定姒亦妾耳而皆稱諡何哉按書王始此故稱天王非無譏也隱母之説尤無據九月及宋人盟于宿春秋之例大國之卿書名其大夫稱人於內亦然然內不可以稱魯人故沒而不書直目其事而已冬十有二月祭伯來祭國伯爵天子之上大夫而有國者也不稱使不目其事以為私行也為天子之大夫而私覿諸侯罪矣故月之以見譏凡來例時公子益師卒按本例云失日後內大夫卒不書日者並同二年春公會戎于潛不正公之會戎故不月以見譏公會例月按本例云兼譏喪會夏五月莒人入向無駭帥師入極無駭我大夫之未命氏者也向極皆附庸微國秋八月庚辰公及戎盟于唐凡外盟例月與戎盟則例時公盟例日與戎盟則例月春秋尊中國而賤外裔詳略之例當然也桓二年戎盟不日是其例矣此變例而日之蓋以深譏乎公之始與戎好也夫外裔交侵中國背叛禮義弛絶事變將窮君子有憂焉記春秋之始而有以啓乎外裔者隱公之罪也九月紀裂繻來逆女春秋之例天子曰逆王后諸侯曰逆女大夫曰逆某姬今裂繻來逆女知其為君逆也然則何以不稱使不正其不親迎故不與使也逆王后自天子之辭言之逆某姬自我之辭言之逆女女通稱也蓋交言之此尊卑之異辭也按程傳云親迎者迎於所館豈委廟社適他國乎此條譏不親迎誤冬十月伯姬歸于紀婦人既嫁外父母家而內夫家故謂嫁曰歸而謂歸曰來其出也有歸宗之義故其謂出曰來歸也紀子帛莒子盟于密子帛蓋裂繻字也當時之辭也傳曰盟于密魯故也魯人以其為我而盟故貴而字之史從而書焉當時以為寵而春秋因之以見其恃貴專命之罪云爾裂繻受命逆女為魯之故而遽與莒盟則其恃貴而專命可知矣故凡春秋諸侯之臣有變名而字者皆見其專僭之罪也按本例云離盟不月後不書月者並同十有二月乙卯夫人子氏薨隱之妻也不書葬蓋未葬也以桓王之崩七年而後葬則子氏未葬或有故爾隱之薨猶不葬則夫人遂不得葬乎鄭人伐衛三年春王二月己巳日有食之其不言朔不食朔也按後序云日食不繫朔與日者闕也與此自相違異三月庚戌天王崩夏四月辛卯尹氏卒二傳曰尹氏從二傳為尹氏當時之辭也春秋因之以譏其世焉昭二十三年書尹氏立王子朝二十六年書尹氏以王子朝奔楚皆譏世卿專權之禍又詩稱尹氏大師王謂尹氏則尹氏世卿也久矣故知因當時之辭明矣凡天子之大夫卒不赴其有好于我則赴王子虎劉卷是也今尹氏於魯未有好而赴之見尹氏之世而專明矣不然春秋之前有好于魯乎秋武氏子來求賻賻喪事之用非所求也求之為言未必得之辭也譏在周矣其稱武氏何見其世也猶尹氏之稱也其曰子蓋未命者未命而且出使則世可知矣不稱使見武氏之專也不然王在喪不命使歟八月庚辰宋公和卒春秋之義尊天子卑諸侯抑大夫故凡日月之例因尊卑以為之詳略而莫有同者惟天子崩公薨諸侯卒與內大夫內女卒則莫為之例蓋以為人之善惡見於其行事亦無俟於卒葬而後為褒貶故其或日或不日或月或不月皆因當時赴告之詳略與舊史之完闕而書焉且春秋於他事必謹日月之例而獨於卒葬則自天子至於大夫尊卑外內一皆同之凡以見其不為例爾使後之學者於此不以例考則春秋可通而無至於惑矣且諸侯不以日卒者三十六而多在曹滕邾莒之小國如曹之書卒者十而其不日者九豈非小國赴告之禮不備歟不然何曹之不日者獨多也冬十有二月齊侯鄭伯盟于石門癸未葬宋穆公春秋諸侯之葬八十六其得日者才十有二而已何其闕之多也春秋之亂惟征伐會盟之事是急而所謂卒葬之重事猶或略之是以赴告之不備如此且又一國之事一使之失辭則其日月遂不可復知夫以天王之尊其不赴崩者三不赴葬者七况諸侯乎故諸侯不赴卒與赴卒而不赴葬者蓋不可勝數由是言之則葬之闕日何足多怪且其得日者十二而皆在齊晉宋衛之大國豈非大國然後赴告之禮為備歟蓋春秋於此不以著例然後闕之多不嫌也凡書葬之例不言某葬某公而言葬某某公者內辭也以見赴告之使來弔賻之禮往以魯恩義所及而後葬之也如公子遂如晉葬晉襄公公孫歸父如齊葬齊惠公叔弓如宋葬宋平公之類是也其不書其人則使者微不道焉故也其不葬者外不來赴內不往會策書不得而紀焉四年春王二月莒人伐杞取牟婁春秋之志或曰侵或曰伐此司馬九伐之法二者而已司馬之法因其罪而為之名春秋之時征伐自諸侯大夫出豈能以義正人之罪哉然其取二者何也曰伐者以人為主曰侵者以地為主蓋斬伐其人民則謂之伐侵掠其土地則謂之侵伐非不侵也以斬伐多者言之侵非不伐也以侵掠多者言之周官之法賊賢害民則伐之負固不服則侵之賊賢害民者有其人故伐其人負固不服者恃其地故侵其地亦春秋之意也雖然凡師之出其殺人者多其取地者少故春秋書侵者才六十而書伐者至于二百一十三也今曰莒人伐杞取牟婁蓋既行斬伐而又取其邑也取邑則侵不足以言之矣外伐例時此為下戊申月也凡先事不當月而下事當日與月者則于先事月之著事之先後不嫌也其諸類此戊申衛州吁弒其君完州吁何以不氏與族非公子而未命氏者也凡弒君卿書名大夫稱人士則略而不書弒君之惡不貶而自見故文無所貶夫君雖不道臣不得而弒也故亦無纍君之文直目其事而已而三家之傳務為異説以失聖人之意使後世姦臣賊子得以藉口而為亂者三家啓之也按三家異説如左氏宣四年傳云凡弒君稱君君無道公羊文十八年傳云稱國以弒者衆弒君之辭穀梁成十八年傳云稱國以弒其君君惡甚矣之類且易曰臣弒君子弒父非一朝一夕之故其所由來者漸矣由辨之不蚤辨也則夫被弒之君春秋豈固與之是以內弒君不書即位猶曰不能終其位云爾夏公及宋公遇于清周官有朝覲宗遇會同之禮春秋之時文不足也故一皆謂之朝會而所謂遇者特志其相遇而已禮記所謂未及期相見曰遇者是也當是時諸侯不信期會失時故有未及期而相見者猶詩所謂邂逅相遇云爾凡遇之志皆譏也故不月公之行以見之宋公陳侯蔡人衛人伐鄭秋翬帥師會宋公陳侯蔡人衛人伐鄭翬何以不稱公子為弒隱公貶也於是時翬未有罪何遽貶乎蓋曰是隱之罪人耳雖然以理言之當於弒隱之後貶然見於桓之世方書其族以見桓與之同惡而不以為罪故不得不於隱之篇貶也或以為大夫之未命氏者誤矣且諸侯之子稱公子公子之子然後始命以氏今翬固公子也何以謂之未命氏乎則其為貶明矣九月衛人殺州吁于濮州吁弒君其不以國討之辭言之何也州吁自立為君矣稱人以殺以見弒君之罪舉國之人皆得殺之云爾其地者何也州吁知國人將謀已不安其位故避難于濮春秋不失其實焉齊人殺無知則不月此加月見衛人不即討賊踰八月而後僅能殺之云爾討賊例時冬十有二月衛人立晉嗣子有常位未有書立者此書立又不稱公子見其不正而不當立也書曰衛人立晉蓋曰衛國之人立之耳于義則非所宜立矣尹氏立王子朝亦是也雖然春秋之時以不正而立者多矣何獨于此乎見之春秋于其有爭奪之患然後正名分以治之如突歸于鄭鄭忽出奔衛曹羈出奔陳赤歸于曹莒去疾入于莒莒展輿出奔吳公伐齊納子糾齊小白入于齊之類是也五年春公觀魚于棠二傳曰觀凡搜田之事不言公搜于比蒲搜于昌間之類是也今觀魚稱公與公狩于郎同義見公獨行而不與國人同之也不正公之獨行故不月以見譏夏四月葬衛桓公秋衛師入郕入重辭也夫以兵入人之國必敗其城郭犯其宗社辱其君臣以入為重故謹而日之是以大國次國皆以日入惟小國微國然後以月入郕次國而不日入何也春秋入滅之例有當日月而不日月者以為其國有以自取之今郕不以日入知郕之有罪焉爾傳曰衛之亂也郕人侵衛故衛師入郕夫利人之國之亂而欲得志焉者取禍之道也春秋深惡其為故不月與日以見譏九月考仲子之宫初獻六羽仲子隱之母也隱有孝心故别為其母立宫而祭之此古人所以戒祀無豐于昵而後世有原廟者起於此乎傳曰天子八佾諸公六佾諸侯四佾獻六羽僭諸公也初者始事之辭立煬宫立武宫譏非所立也此不曰立仲子之宫蓋兼譏獻六羽考仲子之宫故獻六羽也考宫例日其不日以見譏邾人鄭人伐宋螟按本例云星孛雨雹雨木冰無冰螟螽之類不著例於月有之則月志於時有之則時志志事之實見災之久近異之疏數也冬十有二月辛已公子彄卒宋人伐鄭圍長葛六年春鄭人來輸平二傳曰輸平當從二傳為輸平輸猶致也蓋鄭人欲致成於我也夫平之為義所以釋前日之怨魯於鄭有狐壤之恥鄭於魯有見伐之怨二國於是交怨方是時魯亦大國也鄭固欲求好于魯恐魯以前日之怨而未聽故來輸平魯於是受之越明年而鄭伯使宛歸祊又明年為中丘之會相與伐宋又明年為時來之會相與入許至桓公元年鄭伯以璧假許田而盟于越矣此足以見鄭人輸平之意也而傳謂墮其成者誤矣夫狐壤之恥見伐之怨前日之成固已敗矣何為更致使而告絶也哉暨齊平及鄭平書已平也此未平也來致平之意而已其不言鄭伯使何也春秋於凡卿來則以君命言之於人則否蓋卿尊矣不以君命言之則嫌也人則微也不以君命言之不疑矣夏五月辛酉公會齊侯盟于艾秋七月冬宋人取長葛圍邑踰年而後取甚之故志之也七年春王三月叔姬歸于紀內女嫁于大夫者不歸叔姬嫁于紀季是不歸者也而歸之何也紀之亡紀季能以酅入齊為齊附庸猶不失有國而叔姬能以婦道自終不失為微國夫人故賢而歸之也春秋之例始嫁于諸侯其終見出而來歸者始亦不書歸不成為婦也郯伯姬杞叔姬是也始雖不嫁諸侯其終猶不失有國而能以婦道自終者則始亦書歸紀叔姬是也此春秋褒貶之深意矣按齊子叔姬見出始亦不書歸崔解未及滕侯卒按本例云失日凡外諸侯卒不書日月者並同夏城中丘內城之也周之四五月夏之二三月方春之時農事始作而用城邑譏奪民時也傳者謂凡城之志皆譏似誤矣夫城郭之不完不足以為國然則凡城者當視緩急使民以時而已齊侯使其弟年來聘秋公伐邾春秋之例以日月為詳略是故詳中夏而略外域詳大國而略小國詳內而略外詳君而略臣詳所重而略所輕故凡公之所有事者皆以月志其事之重者則以日志蓋謹而詳之事尊親之義也其變例者譏也不然欲有所見而云爾此公伐而不月何也公始即位與邾結好而盟今乃親伐之不正公之始渝盟而親伐故不月以見譏冬天王使凡伯來聘戎伐凡伯于楚丘以歸春秋之例以某歸者服之也執而以歸者力不足也故以歸者名執而以歸者不名凡伯不名知其執而以歸者也其不言執不與戎人執天子之使也其言伐見凡伯之有徒衆也書曰天王使凡伯來聘戎伐凡伯于楚丘以歸再言凡伯若異事然見凡伯之既聘歸而後戎伐之也曰于楚丘見衛之不能衛天子之使也八年春宋公衛侯遇于垂三月鄭伯使宛來歸祊庚寅我入祊凡來歸邑未有言入者見鄭伯雖使來歸之而未定于我蓋人民之慮疆場之政必待我入然後定也且入邑未有言我者蓋上言鄭伯歸祊下遂言入祊則疑於鄭伯入之故加我焉以别之也夫鄭伯守天子土地而輕以與人我不度義而受之皆罪矣故加日月以見譏入邑歸邑例皆時按本例云邑人不賔用師入之夏六月己亥蔡侯考父卒辛亥宿男卒春秋諸侯皆以名卒蓋其始嗣位而來告其後或有會盟朝聘交好之事故名在策書及其卒也得以書其名蓋慎終也不然則否是以不名卒者七其三在滕其四在杞薛秦宿秦固罕與魯通而宿特一見於春秋至於滕薛杞皆小國豈或始嗣位而失於赴告其後會盟不與朝聘不時名不載於諸侯之策故其卒不得而書也彼其於交好之義亦薄矣是以不以名卒者七而未有書葬者見魯亦未嘗往會故也秋七月庚午宋公齊侯衛侯盟于瓦屋外盟不日傳謂諸侯之參盟於是焉始故謹而日之然則凡羣諸侯之盟而莫益於事者豈春秋所與哉八月葬蔡宣公九月辛卯公及莒人盟于浮來公與大國之大夫盟則辭為之諱避恥也及晉處父盟不稱公是也大國強與我盟矣公與小國之大夫盟則辭不為之諱不嫌也小國之人非敢盟我我固與之盟爾螟冬十有二月無駭卒春秋內大夫卒三十而闕日者三蓋於是不以日月為例然後闕之不嫌矣雖子卒猶有闕日者也九年春天王使南季來聘周官時聘以諭諸侯之志則天王使南季來聘可也然終春秋之世王之聘魯者七而魯之臣如京師者五則魯事周之禮可知矣魯之所以事周之禮薄而周之所以答魯之禮厚皆失之也故春秋志之以見諸侯之強而王室之弱也凡王使例月此不月以見譏其諸類此三月癸酉大雨震電庚辰大雨雪雨雪震電例不日嫌二者同日故别言之周之三月夏之正月而震電非其時志異也挾卒夏城郎農事方興而造土功譏失時也秋七月冬公會齊侯于防當是時桓公羽父相與謀亂公顧不能靖內難至於身弒而不知乃比年數與齊鄭逺會見公之失所務也故不月以見譏十一年時來之會亦猶是矣十年春王二月公會齊侯鄭伯于中丘防與時來之會則略之以見譏中丘之會則不譏何也防與時來逺矣而中丘內地且彼逺來會我我無辭焉於公可以無譏矣七年夏城中丘知中丘之為內地也時來鄭地防宋地説者以防為魯地誤矣蓋不知今年夏始敗宋師而後取防也夏翬帥師會齊人鄭人伐宋六月壬戌公敗宋師于菅不戰而曰敗未得乎戰也宋師之出報翬之伐也辛未取郜辛巳取防郜防皆宋邑繼之於敗宋師之下知其為宋邑也以見公乘人之敗浹旬之間而取二邑故書日以見譏取邑例時秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之當是時宋大國也鄭不能事大乃與齊魯比而伐之致宋喪師而失二邑此宋所以怒而入鄭也鄭之見入有以自取之矣鄭尚不知自咎乃復掩其不備而取三國之師春秋惡焉故不月與日以見譏宋衛既去鄭乃與蔡人同伐戴鄭伯欲報見入之怨故從而伐之掩其不備而取三師焉與取宋師取鄭師同義而傳者謂鄭伯因人之力伐戴而取之誤矣戴小國也春秋之例國不言取而言滅滅重辭也無彼之辭也猶火之滅而無見矣取易辭也有彼之辭也言取是于彼而已矣冬十月壬午齊人鄭人入郕郕伯爵蓋次國也故日而後入之然則五年衛師入郕其不日者有以見譏明矣十有一年春滕侯薛侯來朝夏公會鄭伯于時來秋七月壬午公及齊侯鄭伯入許按本例云公不能靖內難而顧入人之國亦不知務矣故加日以見譏冬十有一月壬辰公薨公薨何以不地弒也不書弒諱之也有所不忍言也何以不書葬內弒君不葬君弒國亂不得其葬也凡弒君之證有四不書即位繼弒君亦不書即位薨不地不葬是也
