body:
  text: 春秋經解卷十二宋崔子方撰哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡定六年鄭游速滅許今許男復見許楚之與國葢楚復封之也許男之歸不書然則陳蔡之書歸者欲見諸侯之功明矣鼷䑕食郊牛改卜牛夏四月辛巳郊魯之郊禮乎魯之郊禮之變者也成王以周公有人臣不可爲之功故賜以人臣不可用之禮葢不如是不足以爲稱故魯之有天子之禮惟用之以事周公可也而羣公莫得而與焉是以春秋書獻六羽立武宫丹桓宫楹刻桓宫桷邾子奔喪滕子㑹葬之類譏其僣也至於書郊者八皆因郊之變而道之不盡以譏郊也又僖公之郊魯詩頌之孔子取之其詩曰皇皇后帝皇祖后稷享以騂犧是享是宜周公皇祖亦其福女是也然則郊主祭天而后稷爲配周公亦從而祀焉可知矣魯之郊也爲其有事於周公故也不然則僣矣雖然于夏四月而郊禮乎夫周之四月夏之二月而建卯之月也方是時帝出乎震而始用事焉故于郊而祀之禮葢然矣而傳謂不時何哉且自僖公以来郊之見經者八書卜郊者四皆以四月書牛傷者四皆在正月葢帝牛必在滌三月故也由是言之則郊用四月明矣不然魯之失禮者歴數世而皆在四月乎此書曰夏四月辛巳郊葢與其時也著是以見非也考之禮經未有明見者惟郊特牲稱魯君孟春乗大輅旂十有二旒祀帝于郊焉此葢後儒因見春秋之傳而爲之説然則彼之孟春謂周之正月也雖然魯之郊猶降于天子故不及日至之祭而獨爲四月之祭而已猶之不及四望而獨爲三望也秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹魯比年有事于邾今又三卿大舉而伐之取沂漷之田要其君而與之盟明年又復背盟而圍之則魯之于邾爲已甚故日之以見譏夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚戚衛邑也其言于戚何未得乎國也葢爲輒所拒耳蒯聵猶不失世子之稱則輒之不當立明矣此子貢所以知夫子不爲衛君也秋八月甲戌晉趙鞅帥師及鄭罕逹帥師戰于鐵鄭師敗績冬十月葬衛靈公十有一月蔡遷于州來州來吳滅之矣蔡欲逺楚而親吳故遷于州來也蔡殺其大夫公子駟三年春齊國夏衛石曼姑帥師圍戚蒯聵在戚故也彼言圍宋彭城此不言圍衛戚戚未異於衛也圍戚衛事也而以國夏首之何也葢曼姑之罪不貶而自見而國夏助人爲逆不首之無以著其惡焉晉趙鞅納蒯聵于戚而齊國夏圍之又以見齊之不與晉也夏四月甲午地震五月辛卯桓宫僖宫災季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒春秋内大夫例書卒而有不卒者如翬慶父以賊不卒也叔孫僑如臧孫紇公子憖以奔不卒也仲孫何忌叔孫州仇叔還葢未卒也而柔溺公子結於春秋無所見而亦不卒何也葢於内爲大夫然後卒之豈三子者始爲大夫其後以罪黜不爲大夫故不卒歟翬慶父之不卒非以是爲貶也欲見為弑君者而已蔡人放其大夫公孫獵于吳稱人以放放無罪也冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申蔡公孫辰出奔吳曰盜不得其人者也以其賊殺人故目之曰盜也使知盜之在内耶則將書曰蔡弑其君知盜之在外耶則將書曰某人戕蔡侯于蔡今先目盜而後曰蔡又稱殺焉葢漫若不可知者也夫國君而盜得殺之則其臣子罪矣此公孫辰所以出奔而公孫姓公孫霍所以見殺也而傳謂賤者葢誤矣且雖賤烏有不君其君者哉彼言閽弑吳子葢示其弗臣也然猶加弑焉則異夫盜殺蔡侯申矣葬秦惠公宋人執小邾子小邾子之罪未見於春秋然稱人以執知其有罪矣春秋以例見者不疑也夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚戎蠻子之執以晉事而書也不然外裔不以爵見於春秋戎蠻葢楚屬也故晉人執之以歸于楚使治其罪焉執之歸于京師則可以歸于楚則不可以見晉之有畏于楚故也晉雖以歸于楚而猶欲與治其罪故直言歸于而不言歸之于也其名盖賤之也其不月葢略之城西郛六月辛丑亳社災商社也何以言亳社災葢亡國之社屋之此所以有災也亡國之社諸侯皆得立之以自警亳社災爲魯志也以日志知爲魯志也秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公閏者附月之餘不以告朔喪不以數今齊景公以閏月葬見臣子之不懐也六年春城邾瑕瑕邾邑魯未嘗取於邾而遽城之見魯之迫邾也故於冬仲孫何忌伐邾明年秋公入邾以邾子益來也凡地未有繫之國者不正魯恃强陵弱以城人之邑故繫之邾以見譏焉晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及高張來奔叔還㑹吳于柤秋七月庚寅楚子軫卒齊陽生入于齊齊陳乞弑其君荼不稱公子見其不當立也不言歸以爲未得乎所也既入而後君弑爾冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公㑹吳于鄫吳不稱人葢非其君也而公㑹之故不月以見譏凡㑹吳皆譏矣秋公伐邾八月己酉入邾以邾子益來於他國曰以歸於魯曰以來外内辭也伐邾不月葢一事再見畧之日而後入以公之行重之也然則何以不致以邾子益來則公之至可知矣宋人圍曹冬鄭駟𢎞帥師救曹鄭與曹踈矣宋人圍曹而鄭師救曹知欲以報皇瑗之師也八年春王正月宋公入曹以曹伯陽歸吳伐我夏齊人取讙及闡齊未嘗與我怨而取讙及闡何也邾齊之與國入邾之役齊人怒焉故因吳之伐我魯方備吳之不暇齊人得乗間而取我二邑也雖然何以知齊人之怒於入邾以下書歸邾子益于邾而後齊人歸讙及闡知之也歸邾子益于邾秋七月冬十有二月癸亥把伯過卒齊人歸讙及闡其不言來歸何魯人知齊之怒於入邾之故而取其邑乃復歸邾子于邾而求邑于齊齊人於是歸之故不以齊人自來爲文以見魯有求而後得之也與榮叔歸含且賵不言來同意九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘鄭師過宋雍丘而不設備故皇瑗得帥師而取之也掩而獲之曰取夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔邾子前年以來今又來奔以益爲賤而無恥矣故月之以見譏公㑹吳伐齊按本例云㑹吳之㣲者譏也三月戊戌齊侯陽生卒夏宋人伐鄭晉趙鞅帥師侵齊元年齊侯衛侯伐晉晉不能報今以十年之怨而僅能侵齊見晉之益衰不能服諸侯此黄池之㑹所以進吳子也五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛公孟彄蒯聵之黨也蒯聵得罪奔宋其黨見逐故彄奔鄭今蒯聵已入則彄之歸葢得其所矣始奔鄭今歸自齊葢齊有奉焉故也薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳十有一年春齊國書帥師伐我夏陳轅頗出奔鄭五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書吳欲伐齊而公適有國書見伐之怨故因㑹吳伐齊也按本例云亦譏也公與伐而不與戰也前年公㑹吳伐齊則致此不致者葢公不與戰喜公之不親危事臣子安之故不致也春秋之愛其君父如此按本例云凡外裔戰不日此加日見公與之戰也且上言公㑹吳伐齊下言國書及吳戰則公之與戰明矣凡春秋書戰不以公親之尊親之道也按此説全與經解違異秋七月辛酉滕子虞毋卒冬十有一月葬滕隱公衛世叔齊出奔宋十有二年春用田賦周官以九賦斂財賄專言財賄則賦與税異矣葢税以田爲差而賦以人爲等即鄉大夫所謂國中自七尺以及七十野自六尺以及六十有五皆征之而遂師所謂以斂財征者是也而鄭康成亦謂賦者口率出泉若漢之筭民泉矣是以人爲差也然則哀公之用田賦可知矣當是時魯數侵小國又復見伐於大國數侵小則地加廣數見伐則民人耗夫地益廣而民益耗則賦入必不足矣魯於是病之乃不復差民力之多寡務制田之廣狹以取賦於民而民於是無餘力矣故曰用田賦以見古之不以田爲賦而今以田爲賦也直書其事以見譏焉初稅畝始壊法也作丘甲則民無餘財用田賦則民無餘力故税畝言初丘甲言作田賦言用其所漸者然也此春秋書辭之法矣其不月以見譏夏五月甲辰孟子卒此君娶於吳爲同姓謂之吳孟子者不稱夫人而曰孟子當時之辭也春秋從而書之以見其實焉然後知春秋有因當時之辭以褒貶明矣公㑹吳于槖皐秋公㑹衛侯宋皇瑗于鄖不正公之亟出㑹故不月以見譏槖皐鄖皆内地以其不致故知爲内地也且公羊以鄖爲運則其爲内地明矣宋向巢帥師伐鄭冬十有二月螽十有三年春鄭罕逹帥師取宋師于嵒宋師之在嵒也而不設備故鄭罕逹帥師取之以報雍丘之敗也然則師出而不備者皆棄師之道矣春秋譏焉夏許男成卒公㑹晉侯及吳子于黄池何以言及吳子進吳子也定之四年晉侯爲蔡之故合十七國之諸侯于召陵以侵楚而不能害楚蔡於是舍晉而即吳其冬十一月遂以吳子及楚人戰卒敗楚師而入郢吳自是得志於中國救陳伐齊數與魯通自哀公七年以來無歲不㑹而晉侯自召陵之後不復見矣則吳强而晉弱可知也故黄池之㑹吳實主之而春秋先晉侯者不與其主中國也然不可以不見故兩言之曰公㑹晉侯及吳子也其曰㑹晉及吳主晉而賓吳也雖然進吳子矣進吳子所以傷中國之亡也故不月以見焉夫春秋之進吳楚豈所得已哉雖然其進楚也亟而進吳也緩何也春秋亦因其所自爲而已莊十年荆始見至僖之元年遂去荆蠻之號而從有國之稱其後爵號氏族一同乎中國故春秋亦從而中國之至吳則不然自成七年始見然其俗故吳也爵號氏族不同乎中國故春秋亦從而夷之惟其能行禮乎中國與其有援中國之功然後特變其例而進焉楚公子申帥師伐陳於越入吳吳方爲黄池之㑹爭權上國故越得以乗間而入吳也吳越迭興而中國益衰矣秋公至自㑹晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫十有二月螽十有四年春西狩獲麟凡蒐狩則地而此不地畧之也不地而曰西狩見非國中之狩而西鄙野人之狩耳然則西狩不書爲獲麟而書也國風著麟趾之詩而有吁嗟之美則麟之爲王者瑞其亦乆矣此西狩獲麟所以見書於春秋而聖人所以自傷也夫麟之不爲瑞而見獲於野人猶聖人之不見用而窮老于魯國若夫著褒貶作春秋寄大法於魯史特聖人之不得已者故絶筆於獲麟以見夫志焉向使聖人在上則春秋之褒貶皆見於行事而著爲賞罰亦無所事於春秋矣故曰吾自衛反魯然後樂正雅頌各得其所此葢聖人無所試用其道不行然後退而著書以自見焉
