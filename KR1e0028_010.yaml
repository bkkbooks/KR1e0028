body:
  text: 春秋經解卷十宋崔子方撰昭公元年春王正月公即位叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢此陳侯之弟招也而稱公子蓋方列數諸侯之大夫不可獨曰陳侯之弟也且下書陳侯之弟招不嫌不知爲弟矣三月取鄆復取之莒也莒魯争鄆久矣以是而勦民故月之以見譏按夲例云莒有弑君之禍豈魯責賂于莒而後取鄆乎夏秦伯之弟鍼出奔晉六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵秋莒去疾自齊入于莒公子去疾也下書莒子去疾卒知去疾入而爲君矣然則何以不稱公子見其不當立也言入未得其所也此入而爲君其以未得其所之辭言之何也既入而後展輿出奔則其始入未可謂得其所也齊陽生入于齊亦是也莒展輿出奔吳去疾入而簒故展輿棄位而出奔也展輿之立踰年矣何以不稱莒子亦見其不當立也展輿之不當立故去疾得入而簒矣葢莒無適嗣庻子争立曹羈出奔陳赤歸于曹亦是也叔弓帥師疆鄆田是蓋莒魯之邉邑二國數以爲争魯人患焉故既取之而又復疆其田也帥師而疆田莒難可知矣葬邾悼公冬十有一月己酉楚子麇卒楚公子比出奔晉二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黒冬公如晉至河乃復公朝于晉而不得入于晉見鄙于大國故不月以見譏按夲例云兼譏䘮朝季孫宿如晉公如晉而不得入季孫宿如晉而得入見臣之專而君不得爲政也此昭公所以終孫歟三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝八月大雩冬大雨雹雨雹或書月或書時於月有之則書月於時有之則書時時非一志也北燕伯欵出奔齊四年春王正月大雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申不殊㑹淮夷蓋淮夷自來爲㑹非如吳不㑹而中國徃㑹之也楚人執徐子傳曰徐子吳出也而貳於吳故楚人執之徐滅之禍自此始春秋惡焉故不月以見之宋公之執不月以爲畧徐子之執不月以爲譏何也春秋有不嫌同辭者亦觀其事如何而已秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之伐吳而曰執齊慶封見慶封之在吳也不言孰執承上諸侯不疑矣殺陳孔奐殺陳夏徴舒不言執直殺之也此先言執葢治其罪而後殺之故也見慶封之有罪焉爾遂滅賴九月取鄫内取之也鄫國也而不言滅葢取之莒也㐮六年莒人滅鄫則鄫莒邑爾始鄫欲屬魯而爲莒所滅莒之滅鄫魯不能救今取之於莒又不能復其國家而遂有之以魯爲罪矣故月之以見譏冬十有二月乙卯叔孫豹卒五年春王正月舍中軍作三軍三家之利也今公室方弱而舍中軍豈固以利公室蓋欲易爲之制耳是時季氏益强獨專魯國故叔孫豹卒則舍中軍此復欲分公室以自利明矣故不日以見譏楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防兹來奔言及别二邑也莒無大夫以其來我以我事書也傳以爲重地而書誤矣且邾快畀我來奔不以地亦書其人則知以我事而書明矣秋七月公至自晉公得入于晉矣故如以月徃而反以月致也戊辰叔弓帥師敗莒師于蚡泉秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越夷也始見而稱人蓋其君也徐之人何以先越之君是徐子也貶而後人之且徐自入春秋未嘗與中國㑹盟惟前年從楚于申之㑹又貳於吳而見執於楚今遂從楚而伐吳夫恃陋而即夷懷貳以事大國又不能終其惠而反伐之三者皆罪也此三十年吳滅徐而諸侯莫之救其禍著於此矣故貶而人之不然徐之大夫不得先越之君矣戚之㑹鄫人不先吳是也徐子之貶春秋有見焉六年春王正月把伯益姑卒葬秦景公夏季孫宿如晉葬把文公宋華合比出奔衛秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕七年春王正月暨齊平凡言及者我意也變及言暨則知暨者非我意也爾雅曰暨不及是也此葢齊之强與我平故月之以見譏定十年我强與齊平則亦加月矣三月公如楚叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人干徴師殺之凡執而後殺者葢先治其罪而後殺之云爾楚雖以罪殺干徴師然春秋猶不失行人之稱則陳國之亂非干徴師罪明矣陳公子留出奔鄭秋蒐于紅蒐春事也而秋行之志不時也陳人殺其大夫公子過當是時陳無君而公子招爲亂則殺過者招也然則稱人以殺大夫爲下相殺明矣大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐陳侯之弟招何以復稱公子陳侯溺卒矣執而後放治其罪也招有殺世子之罪而反放之陳孔奐之罪未見於春秋而乃殺之見楚之失政刑矣葬陳哀公陳已滅矣孰葬之楚葬之也滅人之國而葬其君不恤其大而治其細以楚爲僞矣齊侯葬紀伯姬斥齊侯以惡之此不斥楚子何也於紀侯之大去未見齊之滅紀也故書齊侯葬紀伯姬以見之而兼譏其葬焉楚之滅陳其罪固也故於其葬不復斥楚子下書叔弓㑹楚子于陳知楚子之在陳明矣九年春叔弓㑹楚子于陳許遷于夷許自此至定之四年二十八年之間凡三遷都焉夫國家之政士民之居何可數遷數遷則下騷動而亦不足以爲國矣以盤庚屢遷而民猶胥怨况許之小國乎春秋不正許之屢遷故此以後皆不月以見譏夏四月陳災陳已滅矣而復書陳災所以閔陳也陳其終復矣秋仲孫貜如齊冬築郎囿十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申般之弑君父天下之罪人也楚子不能正其罪帥諸侯以討戮反爲匹夫之事欺誘而殺之又滅其國而有其地然則䖍之殺般非以討罪也利其土地而爲之耳則其不道已甚故春秋正其罪而名之曰楚子䖍誘蔡侯般殺之于申也夫般之罪易見而䖍之惡難明方且致誅乎難明之惡則易見之罪亦不嫌於不治也楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨大蒐于比蒲周之五月夏之三月三月可以蒐矣葢譏其有夫人之䘮而不慼也仲孫貜㑹邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人把人于厥憖九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之是公子棄疾也而曰師貶之也凡滅國不貶以爲其惡不貶而自見然則此爲執世子有以歸用之貶也且蔡侯已死而有稱世子何也未得乎立也般以誘死則外亂國被圍則内急外亂内急則世子固未得乎立矣猶晉獻公已死而奚齊猶未君也十有二年春齊髙偃帥師納北燕伯于陽北燕伯之納何以不名未得乎國也三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月葬鄭簡公楚殺其大夫成熊秋七月冬十月公子憖出奔齊憖之奔不日見非其罪矣楚子伐徐晉伐鮮虞十有三年春叔弓帥師圍費費内邑而圍之何也葢恃大而不聽故定十二年而卒墮費也夏四月楚公子比自晉歸于楚弑其君䖍于乾谿公子比在晉十三年矣其能一旦自外歸而弑其君乎是葢棄疾爲之謀脅比而立之以成其事比見利而後動故先書自晉歸見比之不與謀也後書弑其君見比之首惡也且棄疾爲謀而比首惡何也夫人受其名已享其利後世姦人苟有藉口以濟其私者莫不皆寘力焉故春秋正名以與比所以絶後世姦人之禍也易曰臣弑君子弑父非一朝一夕之故其所由來者漸也則比之不能自外而歸弑其君明矣歸者得其所也比之弑君而以得所之辭言之何也見有主於内而後歸焉爾然則何以不言復歸見棄疾非比之援也楚公子棄疾殺公子比比弑君自立而不以討賊之辭言之何也棄疾非所以討賊者也不與其討賊見棄疾主謀而比與之同惡也比不失名棄疾不失罪此春秋所以爲法矣夫聖人不輕用其法如此則趙盾許止之弑于春秋無異辭豈以天下之惡而輕被之人哉三家之傳失之明矣秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘八月甲戌同盟于平丘公不與盟此蓋諸侯不與公盟也且公不與盟其曰甲戌同盟何也見公之尅日㑹期而後諸侯不肯與公盟爾諸侯不肯與公盟而曰公不與盟何也諱之也使若公自不盟云爾雖然爲之諱必有以見之凡春秋書弗者然後有故如齊侯弗及盟是也此不曰弗與而曰不與見不盟者非公意也晉人執季孫意如以歸公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳楚八年滅陳十一年滅蔡今棄疾復弑君而自立於是諸侯爲平丘之㑹以謀楚楚雖强大不能不有畏焉乃復二國之封以紓諸侯之難是以蔡侯廬歸于蔡陳侯吳歸于陳也其言歸得其所也其不言自楚見陳蔡之復諸侯之力也冬十月葬蔡靈公公如晉至河乃復公朝於晉以謝不與盟之故晉人辭之而復不得入也吳滅州來十有四年春意如至自晉三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢不曰大夫而直曰公子意恢是宜君者也不然意恢之殺不志於春秋十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事此變而合於禮則書其曰有事于武宫而不目其祭略言之也主書者不在祭也夏蔡朝吳出奔鄭六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞冬公如晉公十二年如晉十三年又如晉皆不得入見鄙於大國猶不自以爲愧而復朝焉故不月以見譏十有六年春齊侯伐徐楚子誘戎蠻子殺之戎蠻以爵見爲楚事而言且以見楚罪也故斥楚以惡之其不名葢其罪薄於誘中國之君而殺之者也戎蠻子不名略之也其不日不地亦略之夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎冬有星孛于大辰有星者非常星也星孛或書月或書時不踰月則書月踰月則書時楚人及吳戰于長岸十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災外災不日見四國同日而災異之甚者故日志也六月邾人入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾夏五月戊辰許世子止弑其君買三家皆曰非弑也世子止不嘗藥而父死故加弑焉夫不嘗藥之過小而加弑君之罪重豈先王之法哉且春秋所以爲法也向使聖人在上豈遂以弑君之罪而殺之耶其不然明矣己卯地震秋齊髙發帥師伐莒冬葬許悼公傳謂書許世子止弑其君買是君子之聼止也書葬許悼公是君子之赦止也然則㐮三十年蔡世子般弑其君固葬蔡景公是亦赦般乎二十年春王正月夏曹公孫㑹自鄸出奔宋鄸曹之封邑見其邑有奉之者也且曹之大夫而有封邑見天子之命大夫明矣秋盜殺衛侯之兄縶稱盜不得其人者也兄是母兄也母兄而不立葢以罪廢者乎其弟爲君則有諂事而盗殺其兄者也冬十月宋華亥向寜華定出奔陳按本例云大國三卿今相與同惡一旦出奔上下不協莫此之甚故加月以見譏十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寜華定自陳入于宋南里以叛其曰宋南里國都之南華向所居里也以其黨叛也南里非地名不得不繫之宋也秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚般以誘殺有執而用焉朱顧不能復讎而又奔之賤之故不月以見惡焉公如晉至河乃復二十有二年春齊侯伐莒宋華亥向寜華定自宋南里出奔楚大蒐于昌間夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂其言王室亂何内亂也王崩促葬大臣擅權諸子争立奔亡簒殺累年而後已故曰王室亂内亂也王室之亂故志之也劉子單子以王猛居于皇景王崩嫡嗣未定大臣争權各欲有所立故劉單立猛以當國三月而葬王欲王位之蚤定也於是尹氏之黨子朝之亂興而猛不得安其位乃居于皇也其曰王猛見其當國而不當立者也其曰劉子單子以王猛見猛之挈乎劉單者也按夲例云王猛非正例不月此承葬景王月秋劉子單子以王猛入于王城王城西周也成周東周也成王始卜洛邑而營都焉至平王而東遷是爲東周則西周故王都也故曰王城按杜預釋例云周平王遷都王城今河南縣也敬王又遷成周今洛陽是也集觧三十二年城成周傳注云子朝之亂其餘黨多在王城敬王畏之徙都成周成周狹小故請城之則平王初遷時未都成周所謂西周指鎬京言崔氏誤今王室内亂大臣争立王猛避難于皇不得入于成周乃入于故都以自立也不目其地而曰王城見猛之因故都而居之云爾其不月知王猛之非正也冬十月王子猛卒先曰王猛後曰王子猛於其生見其假位號而當國故稱之曰王猛於其卒則號位無所假矣故復其本曰王子猛也是不卒者也春秋終始焉爾十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼晉人圍郊夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅𫉬陳夏齧頓胡沈小國而先蔡陳許何也頓胡沈其君而蔡陣許則大夫爾書胡子髠沈子逞知頓胡沈皆君也書陳夏齧知蔡陳許皆大夫也然則其略之何也不以中夏六國之師而敗於一外裔故畧言之也胡子沈子其言滅何重辭也國亡謂之滅君亡謂之滅重辭也外裔敗中國者例月而此日之爲胡沈之君滅也雖小國以其能死難之爲重矣天王居于狄泉敬王也當立者也故正其號而曰天王則異乎王猛之稱矣是必有立而附之者其不曰某氏立其見其當立也又不曰某人以王居于某見附之者正也非所以爲黨也尹氏立王子朝嗣子有常位言立非所當立也王猛不言立當是時嗣子未定故王猛得假位號以當國今天王在狄泉矣而尹氏立王子朝是簒也故書立以見惡焉衛人立晉不言公子今朝言王子何也稱衛人立則疑於當立者也故不得不貶公子以見之此獨稱尹氏立則其不當立明矣不貶子朝則尹氏之罪專也八月乙未地震冬公如晉至河有疾乃復昭公自始即位至此凡五如晉至河乃復於此獨言有疾則知不言有疾者皆以他事而復也葢内爲權臣所制外爲覇主所鄙而不見禮於大國此所以終孫于齊也二十有四年春王二月丙戌仲孫貜卒婼至自晉夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒冬吳滅巢吳滅巢何以不月巢有以自取之也襄之二十五年吳子遏伐楚門于巢卒巢實殺之夫小國不能事大而又殺其君取亡之道也故不月以見譏葬把平公二十有五年春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父有鸜鵒來巢秋七月上辛大雩季辛又雩按夲例云一月再雩白當志日也九月己亥公孫于齊次于陽州内諱奔猶曰孫位而去也此葢季氏之逐君而辭不見焉何也春秋於内大惡諱難言之也且先五書公如晉至河乃復見公之受制於權臣也又下兩書公如齊兩書公如晉三書齊晉唁公五書居鄆三書在乾侯以至于薨其事亦可知矣且公實有國而去之羈孤迫窮彷徨乎二大國之間僅得一邑而居焉則何樂於外而不入且公孫于外終始七年而魯未甞立君則何忌於内而不入葢當是時惟季氏專魯然則公有惡於季氏而不敢入明矣有惡於季氏而不敢入非季氏逐之而何且臣而逐其君此天下之甚惡也亦不待貶而自見故春秋雖爲之諱不疑矣齊侯唁公于野井冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘十有二月齊侯取鄆鄆魯邑齊侯取之以居公故下書公至自齊居于鄆是也當是時齊強魯弱不能責季氏之罪以納君而乃取一邑以居之見齊之無意於納公矣昭公不悟猶居鄆三年以待齊及其不能而後始之晉故月之以見譏二十有六年春王正月葬宋元公三月公至自齊居于鄆齊已取鄆而公猶言居見鄆之不入于齊也按本例云日孫故月致自此徃主皆不月居外亦不月譏失國也夏公圍成成内邑公憾于季氏故圍内邑也夫公實有國而不能制其臣至於見逐而反區區圍其一邑欲以報怨見公之不君矣故不月以見譏秋公㑹齊侯莒子邾子把伯盟于鄟陵齊莒邾把皆魯之與國故爲鄟陵之盟以謀納公夫公實有國而不能處反因他人以求入而卒不能鄟陵之盟爲不韙矣故不月以見譏不言同然後知納公者僞也公至自㑹居于鄆九月庚申楚子居卒冬十月天王入于成周言入見自狄泉而入也不言歸王未嘗去國故也尹氏召伯毛伯以王子朝奔楚曰尹氏召伯毛伯以王子朝奔楚見其黨也二十有七年春公如齊公亟如齊而卒不獲所謀故皆不月也然後知凡公如某而不月者以見譏明矣公至自齊居于鄆夏四月吳弑其君僚不書其人吳無大夫也然後知稱國以弑爲㣲者明矣楚殺其大夫郤宛秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯晉人辭公故次于乾侯而止也夏四月丙戌鄭伯寜卒六月葬鄭定公秋七月癸巳滕子寜卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公不言唁公于鄆見鄆之猶在魯也夫齊晉大國不能逐季氏以納魯君反區區爲慰唁之辭若不得已者則當是之時君弱臣強豈獨一魯國哉公如晉次于乾侯公比如晉而不得入故皆不月也夏四月庚子叔詣卒秋七月冬十月鄆潰公適去鄆而鄆潰見魯之民皆叛畏季氏而不敢寜公也三十年春王正月公在乾侯志公之在外正月以存君臣子之辭也夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚春秋之例國滅而奔者不名閔之也章羽之不見閔蓋其有罪者也徐子之罪見于五年伐吳彼三罪者徐足以亡矣其禍自伐吳始焉故春秋于彼則貶而人之於此則名而賤之凡以見自取滅亡之禍而已然則何以月志其譏已明者則亦無俟于變日月之例也按夲例云先儒以徐爲夷非也春秋以中國例書徐而曰夷者何也三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歴公在乾侯而季孫爲適歴之㑹季孫不見公矣君在外而臣不省則季氏之有惡于公亦明矣夫意如之罪覇主所宜討今乃與之爲㑹且其君在是而㑹其臣見晉之釋君而臣是信也夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯晉侯既使荀躒㑹意如乃使唁公葢季孫有不納君之言故晉侯唁公之不得入也必使荀躒然後意如之意得通于公矣夫不恤見逐之君而信不臣之言則晉侯之不明可知爾彼六卿之强至于分國而有之則晉侯之不克有爲者是亦魯君而已昭公失國豈無他諸侯唁之而獨舉齊晉所以深惡乎大國之無能爲也秋葬薛獻公冬黒肱以濫來奔三家皆曰邾黒肱此不言邾葢字或脫之非例也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞闞内邑公既失鄆而後取闞也夏吳伐越秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周成周與京師一也或稱成周或稱京師葢自周言之則曰成周自諸侯言之則曰京師諸侯不敢斥天子之國故以衆大之辭言之此諸侯之大夫城成周則不曰京師何也當是時天子㣲弱諸侯不王豈復能以義相率而尊周室哉是葢天子有請于諸侯然後諸侯使大夫徃城之耳故曰城成周葢自周言之見天子請而後城之也傳謂王使富辛與石張如晉請城成周是足信矣十有二月己未公薨于乾侯昭公淹恤在外七年于此奔走窮迫可謂極矣而魯之羣臣未有一人盡力于其君者卒以旅死當是之時禄之去公室三世矣爲昭公者尚何以懷其羣臣哉故春秋所書于七年之間未嘗有一言及其君臣之際者爲此也
