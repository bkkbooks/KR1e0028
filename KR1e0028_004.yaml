body:
  text: 春秋經解卷四宋崔子方撰閔公元年春王正月閔之不即位知子般之弒也齊人救邢夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑季子來歸此公子友而曰季子賢之也曰來歸喜之之辭也以見魯人之情有望於季子如此之深子般之弒季友在外賊不得討魯人以為必得季子之賢然後乃能治國而有為故季子來歸以喜書也然而卒受慶父使復為亂而弒閔公又不討賊使彼猶得以公子之親而出蔽兄弟之小愛傷君臣之大義故春秋於公子慶父奔莒文無所貶者所以明著其事以責季子也終有以責之故始有以望之此來歸所以書者歟三家知春秋賢季子而不知其所以深責季子也管叔之亂不及慶父而周公不隱繇是言之則季子之過明矣冬齊仲孫來傳謂公子慶父者是也何以知其然夫春秋欲有所見則文有所變公子友而曰季子加子焉賢之也公子慶父而曰仲孫目氏焉疏之也係之齊者弒君之人其義當絶於魯且以責齊桓受魯賊欲見其自齊而來故係之齊也其曰來者怒之之辭也於季子言來歸則其辭喜於齊仲孫言來則其辭怒可知矣蓋於公子慶父如齊奔莒方責齊桓而慶父之惡未見故於其來而深惡之而曰齊仲孫也後之學者不疑公子友為季子而疑公子慶父為齊仲孫何也春秋恐以慶父為齊仲孫有所疑也故特見之又恐以友為季子有所疑也故於其卒曰季友見之二年春王正月齊人遷陽夏五月乙酉吉禘于莊公是時魯人短喪於莊公之薨二十二月矣遂去喪從吉而為此禘也猶僖公薨二十一月而文公遂大事于大廟則魯之短喪明矣其言吉何未可以吉也目禘譏其為禘也蓋禘者周之盛祭五年乃一行之合羣廟之主于大祖而審諦昭穆者也今獨曰于莊公見其不及羣廟之主也獨于莊公而為禘其為非禮明矣秋八月辛丑公薨不地弒也君弒國亂葬禮有闕故不書葬以徴臣子之罪也九月夫人姜氏孫于邾其不日蓋以罪略之則異乎公孫于齊矣公子慶父出奔莒慶父不貶以責季子也內大夫奔例日謹有罪也夫人與慶父同惡蓋同日而出奔夫人先不日故慶父亦不得日也慶父不日然後知與夫人同日奔矣冬齊高子來盟齊侯使高子之來欲以觀魯之治亂而有覬魯之心高子知魯之援為可親也於是請盟焉以立僖公然則不失奉使之宜求盟以親魯者高子為之也故不稱使以見之又從而賢之曰高子與屈完來盟于師同義十有二月狄入衛此滅也何以不言滅為桓公諱也春秋為賢者諱夫桓公主諸侯之盟任天下之重攘冦亂安中國今狄滅衛而不能救宜桓公以為恥也桓公之所恥故春秋為之諱矣莊公之季年狄伐邢齊人於是乎救邢會明年魯有內亂桓公外平狄於邢內治難於魯區區二年之間君臣會盟聘問之好曾無虗月狄子是間齊之有事于東方也乃乘間而伐衛衛懿公不得於國人敵至而不支一戰而遂亡然則齊人未暇於謀衛而衛已亡矣此固桓公之所為恥也雖然為之諱必將有見焉僖二年書城楚丘城楚丘以封衛也以封衛則衛之滅明矣國風存載馳之詩則衛之滅不患乎不見於後世鄭棄其師鄭伯惡高克使將兵次于河上久而不召師潰而歸高克奔陳鄭人為之賦清人故清人之詩存則鄭棄其師可得而知也不曰鄭伯又不曰鄭人而獨舉鄭焉兼君臣之辭然則鄭伯高克俱罪矣
