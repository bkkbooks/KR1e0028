body:
  text: 春秋經解卷八宋崔子方撰成公元年春王正月公即位二月辛酉葬我君宣公無冰三月作丘甲古者四邑為丘丘有牛馬之賦四丘為甸甸然後有甲士步卒之賦今曰丘甲其以甸賦而賦丘乎然其詳不可考矣經意以見古者于丘不賦甲今于丘賦甲焉爾譏其厚斂而困民也傳謂作為也丘為甲也此誤矣葢丘甲者其法也作者始而為之之辭爾戎事例日此不日以見譏夏臧孫許及晉侯盟于赤棘不正大夫主盟而盟諸侯故不月也雖内大夫猶以為譏况外大夫而盟公者耶此處父所以去族而公子嬰齊所以人之也春秋之謹於名分如此秋王師敗績于茅戎目茅戎而不目其地若王之用師于彼而自敗其績云爾王者之師天下莫敢與校矣而乃戎狄敗之春秋深惡焉故畧而時志之冬十月二年春齊侯伐我北鄙夏四月丙戌衞孫良夫帥師及齊師戰于新築衞師敗績六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衞孫良夫曹公子首及齊侯戰于鞌齊師敗績傳謂曹無大夫而書公子首舉其貴者誤矣春秋小國之大夫不名謂其不命於天子故也當是時周室衰弱諸侯强大小國見侵不能請命於天子而天子亦且不能命之此小國所以無大夫也然考之當時曹莒雖小國然其出會叙盟常次衞鄭之後而居邾滕之前以為次國則不足以為小國則其尤也是或能請命於天子故春秋所書於其無命大夫則闕之於其有命大夫則亦從而書之此曹公子首所以見於經歟不獨此也曹羈公孫會與殺其大夫之類皆是也莒之見於經者如莒慶展輿公子意恢之類是也至於邾滕把薛之屬則未有書其人亦未嘗有書出奔歸入殺大夫者則知曹莒之有異明矣秋七月齊侯使國佐如師己酉及國佐盟于袁婁大夫盟不以日志此嫌國佐如師而遂與之盟且以見自鞌至於袁婁緜地五百里自癸酉至於己酉歴三十有七日然後得盟以迫齊為己甚故日志以見譏也八月壬午宋公鮑卒庚寅衞侯速卒取汶陽田取之齊也戰勝而得地非以好歸故不言齊人來歸而言取汶陽我故田也冬楚師鄭師侵衞十有一月公會楚公子嬰齊于蜀大夫會公而文不貶何也欲有所見也且會小而盟大方欲致貶乎盟故於會有所不貶且以見書楚人者實公子嬰齊貶而後人之也凡會者外為主公子嬰齊抗禮而會公侯公子罪矣丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾人薛人鄫人盟于蜀齊當先陳衞鄭今陳衞鄭先齊何也以見三國皆卿而齊則大夫爾為其會公而盟故例貶而人之向使三國非卿而例當稱人則齊固自先三國而叙矣故凡春秋之事有隠者必將有見也雖然其不没公何也楚合十一國之大夫而公獨會焉非强我也公固與之盟爾且及者内為主見公以人君之尊而下從人臣之盟諸大夫雖貶而公之失正可知矣不言同見公之與大夫盟非所同也大夫盟例不致葢略之也三年春王正月公會晉侯宋公衞侯曹伯伐鄭辛亥葬衞穆公二月公至自伐鄭甲子新宫災三日哭葢宣宫也彼言桓宫僖宫而此言新宫邇故也當時之辭也三年之䘮畢始廟祭矣哀痛之故三日哭也乙亥葬宋文公夏公如晉鄭公子去疾帥師伐許公至自晉秋叔孫僑如帥師圍棘大雩晉郤克衞孫良夫伐廧咎如冬十有一月晉侯使荀庚來聘衞侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟葢公盟也不言及之者大夫不敵公也日而後盟知其為公矣按本例云大夫何以不貶彼以賓客之道來我固與之盟爾鄭伐許不書人微者或以為伐䘮無義背盟無信故狄之夫諸侯伐䘮背盟者亦有矣何獨鄭耶按范甯穀梁注云鄭從楚而伐衞之䘮又叛諸侯之盟故狄之揚士勛疏云謂前年衛侯速卒楚鄭侵衞及鄭背晉為諸侯所伐是也考上文鄭公子去疾伐許直書其事則此條書鄭非因前之伐䘮背盟可知崔氏駁之良是四年春宋公使華元來聘三月壬申鄭伯堅卒把伯來朝告絶叔姬也夏四月甲寅臧孫許卒公如晉葬鄭襄公秋公至自晉致不月知其往亦不月者也譏亟也冬城鄆文十二年城諸及鄆此又城鄆亟城之迫于莒也鄭伯伐許鄭伯在䘮而伐人之國又不降名春秋各隨其所稱而見褒貶焉五年春王正月杞叔姬來歸以叔姬之歸為内過也且杞伯來朝而告絶知把伯之有辭矣女歸例時此月之以見譏焉春秋之責己如此然猶異於齊人來歸子叔姬之為罪矣仲孫蔑如宋夏叔孫僑如會晉荀首于榖梁山崩秋大水冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衞侯鄭伯曹伯邾子杞伯同盟于蟲牢六年春王正月公至自會二月辛巳立武宫武公之宫也明堂位曰魯公之廟文世室也武公之廟武世室也猶之周有文武二祧焉雖魯以周公之故得用天子禮樂然可以用于周公之廟不可用于羣公之宫則魯之二祧非禮明矣立武宫譏其僭也而後之學者猶且以為禮嗚呼是亦惑矣定元年立煬宫何以不日煬宫不世有禱而後立之嫌于其可立也故不日以見焉則異夫立武宫之為譏明矣取鄟衞孫良夫帥師侵宋夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭伐䘮何以不譏鄭之䘮踰時矣楚非以䘮為利而後伐之故不譏也春秋亦原情而已矣冬季孫行父如晉晉欒書帥師救鄭七年春王正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛吳伐郯吳夷也于此始見春秋夏五月曹伯來朝不郊猶三望凡言免牲免牛者知其不郊矣此言免牛又復言不郊何也猶者屬上之辭免牲在正月三望在五月間有吳伐郯曹伯來朝于文為不屬故更言不郊以屬三望也四月而郊于是三望今既不郊矣乃以五月而三望則其失禮又甚焉秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衞侯曹伯莒子邾子杞伯救鄭按本例云春秋不與相侵伐則凡救者可也然陳鄭介二大國之問從楚則晉師至從晉則楚師至晉楚争陳鄭以為强弱一救一伐安有常哉然則救鄭非所以為鄭適以怒楚而致戰耳夫羣諸侯而莫益于事者亦春秋所不與故不月以見譏八月戊辰同盟于馬陵公至自會不致盟而致會凡盟者必會則致會可也吳入州來州來夷國也楚屬也冬大雩衞孫林父出奔晉八年春晉侯使韓穿來言汶陽之田歸之于齊彼曰汶陽田此曰汶陽之田韓穿之辭也吾土也而曰歸之于齊亦韓穿之辭也見晉侯失正奪諸侯之地以相與故書以見譏晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元來聘夏宋公使公孫夀來納幣來納幣不書此譏使卿納幣也伯姬歸于宋不書逆逆者微無足道焉爾使貴者納幣而使微者逆女以宋為失輕重之義矣晉殺其大夫趙同趙括秋七月天子使召伯來賜公命二傳曰錫非也然賜亦錫也變錫而為賜死生異辭故也然則文元年來錫公命知其為僖公明矣天子天王一辭耳冬十月癸卯杞叔姬卒此葢出矣而復繫之杞下書把伯來逆其䘮是未絶于把也春秋之例雖為諸侯夫人而終以見出者不卒也而此卒者亦以把伯來逆其䘮不可不見之晉侯使士夑來聘叔孫僑如會晉士夑齊人邾人伐郯衞人來媵著衞晉之來媵則知齊媵之為非禮矣九年春王正月把伯來逆叔姬之喪以歸生則出之死則歸之非禮矣生不如不出死不如不歸之為愈也公會晉侯齊侯宋公衞侯鄭伯曹伯莒子把伯同盟于蒲中國失道夷狄抗衡自文宣以來晉楚於是争盟而伐鄭鄭從楚則晉師至從晉則楚師至然而自邲之戰鄭之從楚者十年其後晉侯數伐鄭蟲牢馬陵之會然後鄭伯受盟及蒲之會所以尋前日之盟也鄭固未有罪耳而晉人於秋執鄭伯使欒書伐鄭明年使衞侵鄭諸侯又伐鄭葢是時楚方備吳未暇争鄭故鄭之在晉者亦五年及楚人一有討於鄭而鄭甘心于楚葢怒晉之無信不徳不恤小國之難而輕辱其君故與楚比伐許侵宋同撓中夏凡二十年之間諸侯之師侵伐會盟曾無虚歲諰諰然常以失鄭為憂是禍也晉有以啟之以不信蒲之盟故也春秋不日其盟所以起其事而見譏焉公至自會二月伯姬歸于宋夏季孫行父如宋致女古者婦人既嫁三月然後廟見而祭于禰所以成婦也父母家於是使人致之凡以成婦之義也季孫行父如宋致女自我之辭言之也僖之八年禘于太廟用致夫人葢假是禮而為之焉爾晉人來媵秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭討其貳於楚也夫居大國之間而從其强令鄭豈得己哉晉不能服大又不能懐小而顧執人之君以致伐焉鄭雖有罪而晉非所以執也故蒲之盟不日見其不信焉爾冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆潰例月此為入鄆日也葢是日莒先潰故楚人得以入鄆事實在先故著日於上也著日欲有所見也鄆我邑也是葢莒魯之邊邑或在莒或在魯文十二年城鄆成四年又城鄆魯惟迫莒之故而亟城及此莒潰而鄆震焉因不能守故楚得以入我邊邑也此鄆之在魯明矣至襄十二年莒人伐我東鄙圍台季孫宿救台遂入鄆既救我邑遂入莒邑以報之也又至昭元年然後取鄆叔弓帥師以疆鄆田此鄆之在莒亦明矣然則何以不言遂葢楚人非有意於伐我以鄆為莒邑而入之故不言遂以見其為一事而已一事而再則曰楚人何也貶公子嬰齊也不正其妄入我邑故貶而人之按家鉉翁春秋詳說云鄆有三其一莒别邑成九年楚人入鄆是也魯自有二鄆文十二年城諸及鄆此東鄆莒魯所争者也成四年城鄆十六年傳公待于鄆此西鄆魯以備晉者也今考惟莒邑之鄆杜無明文魯東鄆則釋例云城陽姑幕縣南有員亭員即鄆也西鄆則釋例云東郡廩丘縣東有鄆城是也東鄆後入于莒昭元年季孫宿伐莒而復取之西鄆則昭公出孫時所居也崔氏誤合為一故附辨之秦人白狄伐晉鄭人圍許城中城十年春衞侯之弟黑背帥師侵鄭夏四月五卜郊不從乃不郊易曰初筮告再三凟凟則不告况於五卜也先王制卜筮所以教民敬鬼神也今至於五卜則亦䙝矣䙝則慢鬼神也孰甚焉彼卜郊不從則必免牲而此直言乃不郊是不復免牲也以見事天之禮益以畧矣五月公會晉侯齊侯宋公衞侯曹伯伐鄭齊人來媵丙午晉侯獳卒秋七月公如晉冬十月十有一年春王三月公至自晉晉侯使郤犫來聘己丑及郤犫盟夏季孫行父如晉秋叔孫僑如如齊冬十月十有二年春周公出奔晉為天子之三公通政乎天下今不能固其位而奔是失天下之政也失其政斯失天下矣故曰周公出奔晉春秋之為是辭也其以傷周室之亡也故不月以見之王臣奔例月按本例云凡自周無出周公之出不能乎其國而出也周公有國於王畿矣故特從小國例而不月然後知周公之不能乎其國而出明矣按此與經解稍異夏公會晉侯衞侯于𤨏澤𤨏澤之會不月葢譏之也然未有見焉春秋之義以例見者不疑矣𤨏澤内地按本例云或月闕秋晉人敗狄于交剛冬十月十有三年春晉侯使郤錡來乞師三月公如京師公如京師專行之辭也公自㑹晉伐秦道出乎京師而以專行之辭言之何也舉其可道焉志敬也且先書晉來乞師下書公自京師遂會晉侯伐秦則非專行明矣志不敬也辭則志敬而實志不敬春秋之義也夏五月公自京師遂會晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦曹伯盧卒于師秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒夏衞孫林父自晉歸于衞秋叔孫僑如如齊逆女春秋十二公而書逆夫人者五其七不書何也僖之夫人立妾為之昭之夫人諱取同姓閔公之幼未及乎娶也至於𨼆襄定哀之不書或其年已加長未即位而已娶故史氏不追書而春秋不載而或者以為常事不書其書者以有所譏故也是不然夫國君即位逆夫人以著代而曰常事何也春秋所謂常事不書者葢著在典册行之必以其時而不易者是也如祭祀蒐狩之類焉爾按本例云禮有親迎不正使大夫逆故不月以見譏鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊冬十月庚寅衞侯臧卒秦伯卒秦之與中國通葢寡矣所以不得而名也十有五年春王二月葬衞定公三月乙巳仲嬰齊卒癸丑公會晉侯衞侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師稱爵以執執無罪也其言歸于京師何歸之于者决辭也斷在天子也歸于者辭未决也斷在晉侯也執之以歸京師而斷猶在己見晉侯之外託於正而内實以報私怨也故斥晉侯以惡之春秋書爵以為正亦有書爵以為惡者齊侯葬紀伯姬楚子誘戎蠻子殺之晉侯殺其世子申生之類是也何以知曹伯之無罪曹伯之惡未見於春秋又下書曹伯歸自京師變例以為言知曹伯之無罪明矣公至自會夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚山宋同姓大夫而未命氏者也冬十有一月叔孫僑如會晉士夑齊髙無咎宋華元衞孫林父鄭公子鰌邾人會吳于鍾離何以再言會吳主吳也鍾離吳地吳逺中國未嘗與中國會諸大夫欲往會之故於彼主吳也諸侯見吳日强且能害楚故數與吳會焉不正以中國之衆主吳而逺會故月之以見譏許遷于葉此許始遷是猶月者也其後亟遷則不月矣十有六年春王正月雨木冰雨而木冰志異也夏四月辛未滕子卒鄭公子喜帥師侵宋六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績三家皆言楚子傷也其不言師敗君重於師也楚殺其大夫公子側稱國以殺然則鄢陵之敗公子側為之也秋公會晉侯齊侯衞侯宋華元邾人于沙隨不見公其曰不見公何諸侯皆在而公未至是不見公也不見公而曰公會志其意也是葢公有内難故往後期而諸侯不及見爾使諸侯故不見公乎自當言弗見矣以不見公故不月也然則傳謂凡公後會不書誤矣公至自會公會尹子晉侯齊國佐邾人伐鄭沙隨之會公後期晉人以為怒故伐鄭之役公彊與焉此晉所以執季孫行父也即當時之事言之則公葢不與伐鄭矣故春秋以為恥而諱焉不與伐鄭則諱不見公則不諱則知非諸侯故不見公明矣而傳謂不見公譏在諸侯者誤也雖然為之諱必有以見之故於公至不以伐鄭致而以㑹致焉見其未嘗與伐也僅可以致會而已故不月以見之曹伯歸自京師其執斥晉侯見曹伯之無罪也其歸曰自京師見天子之復之也凡諸侯失國而歸者曰某歸于某曹伯不名又不言歸于曹見在天子之所為未失其國也不曰自某歸而曰歸自京師先歸而後自志其所由而已必志其所由凡以見在天子之所而天子復之也曹伯葢得其歸矣九月晉人執季孫行父舍之于苕丘不言以歸然則苕丘非晉地也季孫之罪僑如愬之也冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犫盟于扈何以日志喜其釋執而免乎難故詳録之也且大夫執則致行父不致葢公與之俱焉致公而已公至自會未嘗為會而曰至自會有託焉爾夫沙隨之會不見公伐鄭之役不得與國之宗卿於是見執是禍也僑如為之也故公彷徨于外以求自明於晉僅能使僑如見逐季孫受盟而公免乎難夫方秋而出盡冬而歸始以伐鄭出會而不得與乎其事君辱臣執亦國之深恥也故於其至不可以伐鄭致而僅可以會致焉故託曰至自會而已且以見公之果不與伐鄭也然則求春秋者必委曲而後能得之乙酉刺公子偃是葢僑如之黨也刺得其罪矣内殺大夫言刺取周官三刺之義刺得其罪則不見其事而以急言之刺公子偃是也刺非其罪則見其事而以緩言之公子買戍衞不卒戍刺之是也其日謹有罪也十有七年春衞北宫括帥師侵鄭夏公會尹子單子晉侯齊侯宋公衞侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自會齊髙無咎出奔莒九月辛丑用郊禘于太廟用致夫人言非當禘也用之以致夫人而後為之也然則此書用郊者亦有所用而後為之矣何以不目其事譏不在事在郊也故加用焉以見之且以九月而郊則其不當郊亦明矣晉侯使荀罃來乞師冬公會單子晉侯宋公衞侯曹伯齊人邾人伐鄭公比年伐鄭今又一歲之間而兩伐鄭不正其亟伐故不月以見譏譏公其以譏於諸侯矣十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犫郤至楚人滅舒庸十有八年春王正月晉殺其大夫胥童庚申晉弑其君州蒲晉殺其大夫胥童稱國以殺目君之辭也晉弑其君州蒲稱國以弑目㣲者之辭也尊者以國稱㣲者亦以國稱不嫌矣齊殺其大夫國佐公如晉公亟伐鄭曾未息駕而又朝于晉以公為不治其國矣故譏之也雖然何以知其為譏以下不以月致知公之行是不月者也春秋之事以例見則於日月無嫌矣按本例云兼譏喪朝夏楚子鄭伯伐宋宋魚石復入于彭城十五年魚石出奔楚此楚子伐宋而魚石復入于彭城知楚取宋彭城以居魚石也然則何以不言納不入于宋也不言自楚先書楚子伐宋繼之以宋魚石復入于彭城則楚有奉焉可知矣其言復入何彭城之人有援之者也公至自晉晉侯使士匄來聘秋杞伯來朝八月邾子來朝築鹿囿己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑會晉侯宋公衞侯邾子齊崔杼同盟于虚朾丁未葬我君成公
